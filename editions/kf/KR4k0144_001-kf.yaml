徐娘小岑道痛絕荷生複吟道絕世聰明豈複癡美人故態總遲遲可憐巢覆無完卵肯死東昏只玉兒劍秋道此兩首不堪令若輩見之荷生道若輩那裏還有恥心複吟道追原禍始阿芙蓉膏盡金錢血盡鋒人力已空兵力怯海鱗起滅變成龍心印道追原禍始便也高吟起來第五首是弄權宰相不知名前後枯棋鬥一枰兒戲幾能留半著局翻結贊可憐生荷生道實在誤事複吟道人臘淒然渡海歸節旄齧盡想依稀化灰趁南風便此意還慚晉太妃心印道說得委婉複吟道柳絮才高林下風青綾障設蟻圍空蛾眉若不生謠諑反舌無聲指顧中舊坊業已壞從前遙憶元臣奉使年一字虛名爭不得橫流愈遏愈滔天劍秋道俯仰低回風流自賞荷生心印複吟道瑤光奪婿洗澆風轉眼襖祠遍域中釣闥公然開廣廈神洲湧起火蓮紅小岑笑道關上封刀金丹隕命自古有這笑柄荷生心印複吟道仙滿蓬山總步虛風流接踵玉台徐銷磨一代英雄盡官樣文章殿體書劍秋笑道罵起我輩來了小岑道原也該罵荷生心印也是一笑複吟道高卷珠簾坐捋須榻前過膝腹垂垂有何博得三郎愛偏把金錢洗祿兒劍秋道媚人不必狐狸真令人恨殺荷生心印複吟道絺帷環佩拜璆然過市招搖劇可憐果有徽音光翟茀自然如帝又如天小岑道不成誅執法焉得變危機我倘能得禦史第一折便不饒此輩荷生道程不識不值一錢複吟道暖玉撥弦彈火鳳流珠交扇拂天鵝誰於燠館涼臺地爲唱人間勞者歌心印道朱門酒肉臭路有凍死骨此卻說得冷冷的意在言外複吟道過江名士多於鯽卻有王敦是可兒此客必然能作賊石家粗婢相非皮荷生道嬉笑怒駡盡成文章再看長箋只二首了是山雞舞鏡清光激孔雀屏開炫服招可惜樊南未知意觜蟲雋輕贈董嬌饒心印歎道實在誤了癡珠幾許事業小岑笑道如今秋痕不是董嬌嬈了癡珠一笑荷生心印複吟道炫嫁鍾離百不售年年春夢幻西樓夢中忽作盧家婦十六生兒字阿侯荷生吟完歎一口氣說道冠蓋滿京華斯人獨惟悴心印道這十六首借美人以紀時事又爲詩家別開門徑小畢道楚雨含情俱有托癡珠的詩逼真義山學杜劍秋笑道我只當做帷房暱媟之詞才人浪子之詩看吧四人狂吟高論槐蔭中月早西斜心印先去了大家便攜著癡珠沿著汾堤走來一路水月澄清天高氣爽流連緩步竟爾不記夜深正到大街忽聞雞唱都覺愕然荷生轉笑道好了我如今怕要在街上步一夜的月你道這個時候裏頭還留著門等我麽劍秋道我訪曼雲也怕叫不開門倒是愉園借一宿吧小岑道我和癡珠秋心院去吧正是王衍尚清談自然誤天下折屐謝東山矯情亦大雅欲知後事如何且聽下回分解第二十一回宴仲秋觴開彤雲閣銷良夜笛弄芙蓉洲話說十五日黎明彤雲閣中早有青萍領著多人搬了無數鋪墊器皿以及燈幔和那小圓桌小坐墩鋪設得十分停當已初一刻荷生和采秋來了又親自點綴一番比三月三那一日更雅麗得許多采秋又吩咐跟班傳諭看守芙蓉洲的人備下兩支畫船分派甫畢小岑劍秋紫滄陸續到了一會瑤華也來此時已有午初癡珠秋痕卻不見動靜叫人向對面秋華堂探問說韋老爺天亮就便衣坐車帶著禿頭走了一會丹翬曼雲先後都到差不多午正荷生著急又叫人打聽一會穆升親自過來回道爺早起吩咐套車時小的也曾回過老爺今日請酒爺怎的出門爺笑著說道我難道一去不回來麽荷生詫異大家都說道叫人菜市街走一遭罷荷生打發穆升和李安去又等了好一會荷生吩咐開飯八個人即在彤雲閣下層吃著忽見董慎笑嬉嬉的跑上來回道韋老爺劉姑娘通來了小的在河堤上望見大家便出席往外探看只見禿頭汗淋淋的跟著秋痕進門秋痕一身淡妝上穿淺月紡綢夾襖下系白綾百摺宮裙直似一樹梨花遠遠扶掖而至癡珠隨後進來望著大家都站在正面湘簾邊便含笑說道我肚餓極了荷生笑道你半天跑到那裏當下秋痕已上臺階扶曼雲的手說道他今日同我出城來回趕有四十裏路大家問是何事癡珠秋痕總不肯說見杯盤羅列只道上席了便道我須吃些點心再喝酒采秋道賞仲秋本晚夕的事給我看還是端上飯四下鍾後到閣上慢慢喝酒秋痕說遏采姊姊說得是那一天謖如的局兩頓接連叫人怪膩膩的不爽快荷生見說得有理便催家人上菜端飯大家用些各自散開坐的坐躺的躺閑步的閑步是日晴光和藹風不揚塵癡珠瞧著一群粉黛個個打扮得嬌嬈嫵媚就中采秋珠絡垂肩雲裳拖地更覺得婉嫻端重華貴無雙帶一個小丫鬟名喚香雪垂髫刷翠秋水盈盈伶俏也不在紅豆之下便癡癡的躺在左邊小炕上呆想秋痕卻攜著瑤華站在院子裏望著閣上見正面簷前挂十二盞寶蓋珠絡的琉璃燈兩廊及閣下正面挂的是斗方玻璃燈通是素的便說道今晚卻不要有燈才好呢瑤華道點這樣素淨的燈就也不礙月色翬曼雲劍秋紫滄卻從西廊小門渡過芙蓉洲畔閒逛見洲內蓮葉半凋尚有幾朵紅蓮亭亭獨豔其餘草花滿地五色紛披此時癡珠躺在炕上采秋到閣後小屋更衣從紗窗中瞧見後面小池喂有數十個大金魚唼喋浮萍升沈游泳便招荷生小岑由東廊繞到池邊坐在石欄上悄悄的瞧忽聽得癡珠吟道日月忽其不淹兮春與秋其代序惟草木之零落兮恐美人之遲暮采秋便笑道癡珠又牢騷起來癡珠不答秋痕便掀簾子和瑤華進得屋裏癡珠高誦趙邠卿遺令道大丈夫生世遁無箕山之操仕無伊呂之勳天不我與有志無時命也奈何荷生笑道何物狂奴故態複作采秋輕聲道他今日出城到底去什麽地方正往下說忽然翬曼雲一路笑聲吱吱跑人屋裏鬢亂釵斜裙歪衣汙向椅上坐下喘作一團大家忙問緣故兩個一邊笑一邊喘半晌翬才說道你們看