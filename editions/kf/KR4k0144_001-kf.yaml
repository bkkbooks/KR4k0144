名我的春鏡樓是我自已杜撰的怎麽那庵的簽上有秋心院三字那老尼偈語又說出春鏡敢莫這支簽和偈語通是癡珠編出來也不可知想到此陡然心上冰冷不知不覺吊下淚來又想道說是癡珠編的他何苦自己講那不吉利的話左思右想便合著眼聽著雨聲淅瀝竟模模糊糊的好像到了秋心院突見秋痕一身縞素掀著簾迎出來采秋驚道秋痕妹妹你怎的穿著孝秋痕淚盈盈道采姊姊你不曉得麽癡珠死了我替他上孝哩正在說話忽見荷生閃入采秋便說道癡珠死了你曉得麽荷生吟吟的笑道癡珠那裏有死不就在此采秋定神一看原來不是荷生眼前的人卻是癡珠手裏拿個大鏡說道你瞧采秋將喚秋痕同瞧秋痕卻不見了只見鏡裏有個秋痕一身豔妝笑嬉嬉的不說話卻沒有自己影子正在驚訝忽一陣風過塵沙眯目耳中只聞得呼呼的響又像是波濤滾滾的聲心上覺得突突的亂跳一會悄然開眼一看只見白茫茫一片大海自己立在一個山上四顧無人十分害怕沿著徑路走來見一峰插天蒼翠欲滴上面有古篆三字一字方圍有一丈多大卻不認是何字想道我今日也有認不得的字了轉過山坳海也不見了瞥見癡珠同兩個麗人俱是一身縞素立在前頭一個麗人好像秋痕采秋歡喜迎上前來說道怎麽你兩個卻跑到這裏來再一審視那裏有三個人卻有三片白石擋住去路想道原來就是這石作怪再要轉身恍恍惚惚是個屋裏見個丫鬟搶過來扶著叫道娘快醒來天冷得很和衣睡不得撐眼一看卻是紅豆因起來說道我略躺一躺竟睡著了迷迷惑惑做了幾多的夢紅豆細問采秋不說只叫他取表來看已是四下多鍾香雪向熏爐中倒碗茶遞來采秋喝了回憶夢境猶覺歷歷紅豆端上素菜隨便用些遂向佛前燒了晚香悶坐聽雨便和紅豆說起夢來正是秋心春鏡一刹罡風情天佛國色色空空欲知後事且聽下回分解第三十七回廷推嶽薦詔予清銜風暖草熏春來行館話說關隴叛部自去年大受懲創以後善良者自然回籍重謀生業就中單身的也受地方官安插洗心滌慮去作良民只有一班狡黠的酋豪或逃亡在外複出爲非或雖受招安家來已蕩便糾合亡命就近作個強盜擄掠鄉民牛畜搶劫過往行旅地方官只怕多事隱忍不報這叛民嘯聚得多去年逆倭據了廣州叛民得信因又跳梁起來想並州富足又是春和時候這番真個要由草地竄入雲州等處雁門關總兵于正月三十得了確信是夜子正三刻五百里加緊稟報前來因此經略請荷生計議荷生道這番不比前次只要以防爲剿前次彼已破了潼關故不能不痛加剿洗今日彼尚在三關之外只有迅速將關外各口隘嚴防彼來則剿彼去亦不必追野無可掠自然解散然口外各隘炮臺溝壘及望台探卒是緊要的荷生一面說經略一面點頭道是隨說道這事只好請先生督兵一行荷生辭道只怕才力不及經略那裏肯依又問起荷生納寵之期荷生即以采來的事相告經略大喜說道先生此行公私兩得須帶多少兵呢荷生道兵不在多就左右翼中挑出千名著顔副將林總兵兩人管帶前往便夠調遣只此行卻要仗大人洪福兩件事都能如願才好不然五臺山近在咫尺誓將披緇入山不復問人間事矣說著眼皮一紅經略笑道先生何必如此叛民餘孽先生一出馬到成功至先生私事怎樣辦怎樣得手更屬無可疑慮而且先生氣色大好指日還有喜事不過這兩天便可得信哩荷生道晚生還有什麽喜呢經略道這會且不必說破我是從氣色上看得十分准荷生只得撂開說用兵的事了是晚經略就留荷生小飲一面檄召顔林二將於明日卯正三刻帶領左右翼兵赴教場挑叠一面差員提令箭諭知糧台辦餉軍需局預備軍裝俱限明日巳刻齊備次日卯正荷生下了教場到得辰正已將一千名兵挑出面諭顔林二將午刻給餉給裝申刻管帶出城十裏駐紮初四日辰初二刻長行顔林二將得令自去行辦回荷生回營順路訪了癡珠告知一切癡珠笑道夫子有三軍之懼荷生不待說下截住道你還說這些人家百忙中找你坐一會你卻有工夫講頑話我和你說我到雁門公事或者辦得了只我私事有些爲難倘是不諧我便上五臺山出家了我的詩文稿和柳巷園子一起交給你你替我收掌吧便噙著一眼眶的淚向靴頁中取出一個摺子遞始癡珠癡珠接著放在案上說道你這話從何說起我和你說你再不要這般胡想你從此是一派坦途你想要跑一遭雁門就出有這一件事替你做個錦上添花湊巧不湊巧呢我這會正替你喜歡你何苦說出這些話倒是我和秋痕不曉後來是怎樣變局荷生道你只聽心印的話和李太太商量給了身價是正經的事至秋痕替你打算都行不去我勸你不要聽他這數句就是我臨別贈言你須記著便站起身匆匆的走了回到營來正待禦下冠服簾外的人報道大人穿著公服過來荷生迎出只見跟班捧著折匣經略笑吟吟的步上平臺拉著荷生的手進入屋裏即向荷生一揖說道先生大喜荷生只道是給他送行便回一揖道全借大人平日的威德此去或不辱命經略笑道喜事重重便向折匣中取出一本奏摺來遞給荷生荷生見上面朱批道覽奏均悉這所保五品銜舉人韓彜著授兵科給事巾即留營參贊軍務欽此閱畢將摺子安在上面幾上九呼謝恩便向經略行下禮去道大人栽培經略趕忙還禮荷生起來說道仰荷天恩不次拔用只怕村不勝任辜負大人一香盛意經略掀髯笑道我保舉總不錯而且這摺子上得也妙我的摺子是十九到京十八謝小林侍禦早有一折密保了你內閣於二十日奉著上諭也行文來了說著便走向幾子將摺子展開檢出一張紅單條遞給荷生見上面寫的是兵科抄出正月二十日奉上諭河南道禦史謝嘉樹秦稱五品銜舉人韓彜學富韜鈐材堪將帥現爲並州大營延理軍務前年元夜蒲關奏凱悉伊運籌之力與明祿年終密保折內語悉相符著即授兵部給事中仍留本營參贊該部知道欽此瞧畢說道幸是小林摺子是先一日遞的譬如小林折子後一日大人摺子先一日倒象小林附聲氣了經略道這都是先生的福大又附耳道聽說秦王召見時也曾保過先生荷生接著道如今求大人別這樣稱呼論統屬大人是個堂官論保舉大人是個恩師經略道好好我們兄弟稱呼吧坐一會就也進去自此荷生算是並州小欽差遂趕緊備了謝恩的折由經略代奏經略即將此次荷生督兵出關防剿情形也一併奏明次日卯刻拜發當下通省官員本地鄉紳及營中幕友將校賀喜者麇至遝來荷生有見有不見直鬧到定更多天剛欲歇息又是癡珠來了說道何如班生此行無異登仙說得荷生也笑了執行數語而別次日紫滄是卯正匹馬先生四站趕作兩站荷生爲著經略暨文武官親送出城到得未正才抵青龍鎮是日大風一隊轎馬行土嶺間蜿蜒逼仄兼之土無泉脈僵峙枯立經風簸揚塵垢岔集將至忻州界風刮愈烈飛土如雨荷生轎中口占七古是祖龍鞭石石未盡破碎棄置西山涯生公說法不到晉遂令千載成頑沙行人策馬頻來往輪蹄誤聽風波響誰信元戎十丈旗借作桃根兩枝漿剛才吟完前行帥字旗轉出山坳三聲炮響忻州文武官接出界上荷生不免不轎酬應一番此時天色將黑等得燈籠火炬一起點著再走十餘裏已經八下多種燈火中遙見遠遠一簇人馬知是顔林二將排隊迎接望著帥旗到了吹起角來炮聲一響撾鼓三通行館門前奏著細樂荷生的轎軟步如飛進行館去了青萍傳出令箭安營森嚴甲帳燈火齊明刁鬥傳更旌旗閃影二更後荷生自出營外查了一回頗覺整齊嚴肅心中高興便作了一詩題在壁上雲陌上何人賦草熏無端祖帳感離群天連野戌生邊氣風卷平沙作浪紋斷澗經年惟積雪空山有用是生雲獨憐天下方多事鴻雁中宵不忍聞第二日風定卯正起馬按隊上石嶺關遙望忻州城郭在高岡陂陀之際繞鐵笄山下行河灘沙石中三十裏外路始平坦春融冰釋土脈上浮途間往往水溢度田間阡陌到了忻州城人煙稠密百貨畢全帥旗一到父老扶杖婦孺聯裙道旁頓加堵牆州官迎人行館打塵塵後行平野中時方東作只見扶犁叱犢者于於而來喁喁而視正如一幅圖畫那崞縣官員又接來界上了第三日由金山鋪起馬五裏忻口兩山盡處鑿石爲關一夫當之萬夫莫敵遂沿滹沱河至紅崖灣塵北賈鎮不一時過了崞縣城在土嶺之巔土多崩裂城亦傾側不整道途觀聽自不及忻州熱鬧四下多種到得行館轎子剛進屏門鉦鼓聲中忽見紫滄行裝站在臺階上荷生喜極打著護手板護轎營弁忙將轎扶下紫滄搶迎過來荷生趕著下轎道你怎的又轉回來紫滄正侍答應荷生瞥見上屋有個豔妝侍兒出來凝眸一視卻是紅豆站在簾邊荷生這一喜如陡見家裏的人一般說不出話連紫滄怎樣說也不聽見只拉紫滄向月臺上走來才上月臺又聽得簾內環佩之聲珊珊已到門側更是心花怒開向紅豆道你來接我麽紅豆打開簾子笑道娘也來了荷生早見采秋倩影亭亭臨風含笑兩人執手喜極而悲各自盈盈淚下半晌荷生向紫滄道我不是做夢麽紫滄道坐下再說吧方才坐下青萍回道代州官員稟見采秋紅豆退入里間紫滄也退出東廂荷生一起一起的接見直至上燈才有空和采秋暢談看官聽著人生富貴功名一字是少不得的正有時賈氏何等刁難這回紫滄自省趕來進城已是初三黃昏時候竟不到家先來見過采秋將荷生的信遞給他瞧先是雁門郡人心惶惶訛言四起鬧到初三下午得著韓荷生帶兵出來資訊才稍安靖這賈氏見時事如此深悔前非後聞荷生帶兵來了又怕惹下禍事早啞口無言受藕齋抱怨如今聽得荷生做了官是個欽差喜到十分就也怕到十分那追悔更不用說了轉自己出來招認不是只求紫滄領采秋迎上一站來采秋道這卻不必紫滄道也好此去崞縣只四十裏地知縣又是我舊東家可以據實說給他預備也免得荷生進城一遭招搖耳目且此事是經略知道的原來到雁門關是由代州陽明堡西行不走郡治打郡治北門二十裏至雁門關是個小路荷生與紫滄打算是到了崞縣教顔林二將帶兵先行自己換車私往采秋家一探即連夜出北門趕到關上不想賈氏轉叫采秋接出來當下說明賈氏藕齋都在廂房伺候紫滄領他夫婦出來叩見荷生也還了一揖前事不提只面諭兩人將采秋行裝收拾妥貼等候班師兩人答應退下恰好上屋的席是兩席滿漢荷生便撤一席賞給兩人去吃自與采秋同坐一席采秋因問起癡珠秋痕景況荷生略說一遍因歎道你吃長齋他也吃長齋你如今開了葷不知他何時才開哩采秋也爲悵然這一夕崞縣十分討好行館中徹夜燈燭輝煌二更後紫滄自在東廂安歇兩人並枕談著三十來天別緒轉瞬天明營門外角聲嗚嗚的吹個不止荷生只得起來傳令顔林二將先走又見了幾起的客因行館後進有座望樓便與采秋領著紅豆登樓憑眺遙見空際有白雲數片謗視之不動亦不滅采秋指著道這就是雁門關山頭積雪荷生道我少刻便在這山外了說著兩人淚眼相看一會不語忽曉風吹來涼如冰雪采秋道口北地方冷不比內地你帶著大毛衣服沒有荷生道都有采秋又囑咐諸事留心保養倘若要打仗千萬不可輕敵口外叛部是不怕死的荷生道我知道這回不用打仗你放心瞥見塵沙起處一簇軍馬如蟻行蜂擁經豆指著道兵出城了忽見青萍上來回說轎馬伺候已齊荷生遂與采秋訂著班師之期兩人執手含淚采秋嗚咽道我不便下去送你就在這樓上望望吧又囑咐了青萍路上好生