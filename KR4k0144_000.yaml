扶梯邊望下微笑説道來了上來吧這裏荷生剛踏上扶梯早見采秋站在上面荷生便望著説道怎的不見數日竟病了一面説一面步上扶梯見采秋穿一件湖色紡綢夾短襖米色實地紗薄棉半臂雲鬟半身單煙黛微顰正如雪裏梅花比尋常消瘦了幾分説道我也沒有什麼大病不過身上稍有不快此時荷生已經上樓便攜著采秋的手道你一病竟清減了許多采秋接著説道我覺你也清減些荷生道我今天也有些感冒你的詩好得很只是過於傷感我本來昨天要來看你奈密折方才拜發總是這幾天的雨誤人采秋道這幾天的雨實在令人發煩荷生道可不是呢我正要睡他又響起來正説著只聽得窗紙策策起了一陳大風就是傾盆大雨電光閃處一聲霹靂那小丫鬟捧一碗茶剛上扶梯心一驚手一顫便吊下去砸得粉碎不顧命的徑跑上樓來哭了采秋紅豆都愕然問道怎的那丫鬟嚇得不能説話半晌才説道茶碗給雷打了説得三人通笑起來紅豆道不要胡説下去再泡一碗好好端上來吧采秋説道難道屋裏只有你一個人麼他們通跑那裏去了替我叫兩個來小丫鬟答應去了采秋便向紅豆説道這樣大雷你替我到媽屋裏看看再水榭派的婆子丫鬟通走開了這回老爺來竟沒人知道你也替我查點一查點紅豆正要移步采秋道等著就向荷生説道天快黑了你的車叫他回去吧荷生沈吟半晌説道也好於是紅豆也下樓去采秋坐了這一會覺得乏了就向床上躺下教荷生坐在床沿荷生便問起采秋吃的藥采秋向枕畔取出帖子給荷生瞧説道這地方大夫是靠不住的他脈理全不講究荷生道這地方也自不錯正要往下説卻來了兩三個小丫鬟采秋申飭數句那一個小丫鬟也沖上茶來這一陳大雨過了猶是蕭蕭瑟瑟的一陳細雨雷聲轟轟只是不住丫鬟們已掌上燈來荷生走出簾外見一天黑雲如墨便説道今晚怕還有大雨哩遠遠聽得屐聲轉過西廊望下一瞧卻是紅豆披著天青油紬斗篷嫋嫋而來因吟道雷聲忽送千峰雨花氣渾如百和香紅豆望著荷生含笑問道開飯好麼荷生道我懶吃飯有粥燉一碗喝吧紅豆道娘今日喝防風粥早燉有了於是擺上飯采秋勸荷生用些佛手春荷生也只喝一小杯啜了幾口防風粥采秋看著荷生兩頰通紅説道你不爽快麼就將手向荷生額上一按覺得燙手的熱便説道我不曉得你有感冒寄什麼詩纍你雨地裏趕來又傷了寒怎好呢荷生道我也不覺得怎樣不好躺躺吧采秋忙替他脫去大衫伺候躺下把床實地紗薄棉被蓋上自己向床裏盤坐一雙兜羅棉的手自上及下慢慢的捶荷生委實過意不去説道你也是個病人我反來纍你怎麼好采秋道不妨於是采秋紅豆合小丫鬟殷勤服侍一下多鍾荷生汗出人略松些方才睡下雖陽臺春小巫峽雲封而玉軟香溫正不知病相如魂銷幾許到了四更又是一場狂雨直打入紗窗來一會尚有那斷斷續續的簷溜不想醒來卻是紅日上窗天早開霽荷生起來洗了臉漱了口吃了幾口防風粥便説道我要回去了采秋不肯荷生道我在此固好但有兩樣不便一來怕營中有事二來我在此你不能不扶侍我我見你帶病辛苦我又心中不安豈不是更加病了采秋躊躇一會只不言語荷生道你不用為難還是走的好叫紅豆喚人赴大營打轎采秋也不好十分攔阻只是拭淚不一會報説轎子到了便向采秋道你不用急好好保養我回去一半天好了就來看你采秋忍著淚點頭道好好服藥便又哽咽住荷生早起身來采秋同紅豆扶了荷生下樓青萍接著上了轎放下風簾去了采秋坐在樓下只是發呆紅豆勸道這裏風大正待説下賈氏已自進來問道韓老爺是什麼病昨夜我打聽你忙了一夜辛苦了該不要留他在此采秋一聞此言淚珠便滾個不住和賈氏委婉訴説一遍上樓去了從此更加沈重荷生回營後也就躺下一連五日不能起床看官聽著情種不可多得此書既有韋劉做了並命之鴛鴦復有韓杜做個同心之鶼鰈天下無獨必有偶這話不真麼再説癡珠這幾天為雨所阻不能出門他也悶悶不樂只得尋心印間話到了第四日下午南風大作雨更大了前後院通是冥冥的電光開處閃爍金蛇忽然一個霹靂震得屋角都動轉喜道久雨之後有此迅雷明天定必晴了便欣然用過晚飯向燈下瞧兩卷全明詩話呼喚跟人伺候睡下癡珠連夜通沒好睡這回料定明日必要開晴倒帖然安臥並四更天那般大風雨也不知道到得次日起來見槐蔭日影杲杲搖窗更自歡喜忽見穆升進來回道李大人升任江南寶山鎮總兵顔大老爺接署大營中軍也下劄了癡珠遲疑道這一調動李大人就要遠別了言下神氣頓覺黯然穆升不敢再説別話癡珠就吩咐套車用過早點衣冠出門先到卓然公館賀喜然後向謖如衙門來恰好李夫人晨妝已竟便延人後堂不免敘起分手的煩惱來夫人道我們家眷是不走的説著謖如也回來了一見癡珠便説道我此去吉凶未蔔纍纍家口全仗照拂癡珠就慰勉一番擺上早飯換了衣服三人同吃謖如道遊鶴仙前天寄銀一百兩我因得此調動資訊便忘了癡珠道他如此費心教我怎好生受呢謖如道這又何妨癡珠道也罷此款就存你這裏再為我支出兩個月束統托你帶到南邊轉寄家中稷如答應了癡珠怕謖如有事也不久坐順路便向秋心院來此時積雨新霽緑陰如幄南窗下擺四架盛開的木蘭花芬芳撲鼻秋痕方立欄畔望見癡珠笑道我算你也該來了癡珠含笑不語攜著手同入客廳見秋痕穿件沒有領子素紡綢短衫卻也大鑲大滾只齊到腰間穿條桃紅皺褲三寸金蓮甚是伶俏兩鬢茉莉花如雪愈顯出青溜溜的一簇烏雲癡珠便默默的領略色香憑秋痕問長問短總不答應秋痕急起來説道你怎的做個啞巴盡著瞧人不會説話呢癡珠正色道華鬘忉利不落言筌秋痕笑道原來你參禪了只怕你這禪也是野狐禪不然便是打誑語説得癡珠吃吃笑起來恰好丫鬟送進茶來癡珠放開手吟道如今撒手鴛鴦還我自在秋痕瞅著癡珠一眼道你説什麼我卻是鴛鴦結牢鎖心頭哩癡珠笑道算了不説這些我且問你這幾天好雨你不岑寂麼秋痕給癡珠這一問覺得一股悲酸不知從何處起來忍耐不住便索索落落流下淚來倒教癡珠十分駭愕説道怎的秋痕也不言語半晌起來拉著癡珠咽著道我們里間坐吧到了臥室秋痕嗚嗚咽咽的説道若非這幾天下雨只説這一句便向床躺下大哭起來癡珠不知所謂見秋痕前是一枝初開海棠何等清豔這會卻像一個帶雨的梨花嬌柔欲墜正不曉得他肚裏怎樣委曲自然而然也是淒悽楚楚二人一躺一坐整整半個時辰秋痕見癡珠為他悽楚心中十分感激便拉了癡珠的手重新又哭癡珠見秋痕拉著他哭知道是感激他意思便想起秋華堂席間秋痕兩番的灑淚又想道秋痕你有你的委曲你可曉得我也有同你一樣委曲麼癡珠一想到此便似君山之涕阮籍之哀唐衢之慟一時迸集覺得痛心刺骨遂將滿腔熱淚一一對著秋痕灑了出來竟是一場大哭哭得李家的男女個個驚疑都走來窗外探偵那兩個小丫鬟只站著怔怔的看倒是秋痕曉得外面知道了轉抹了眼淚坐了起來勸癡珠收住淚故意大聲道你嘔人哭了你又來陪哭做什麼呢一面説一面教跛腳舀了一盆臉水親自擰塊手巾給癡珠拭了臉癡珠便躺下秋痕喚小丫鬟泡上茶來又停了一回秋痕見癡珠側身躺在床上半晌沒有動撣怕是睡著便悄悄上來叫了一聲只見癡珠撑開眼歎一口氣道要除煩惱除死方休秋痕不覺淚似泉湧咽著聲道不説吧就同坐起來只聽得簷前鐵馬叮叮噹當亂響起來一陳清清冷冷又一陳蕭蕭颯颯飛塵撼木刮地揚沙吹得碧紗窗外落葉如潮斜陽似夢秋痕向外間攬鏡更細勻脂粉梳掠鬢鬟癡珠正襟危坐朗吟東坡的水調歌頭道我欲乘風歸去只恐瓊樓玉宇高處不勝寒此際轉覺兒女俗情卻被那幾陳大風吹得乾乾淨淨無復絲毫挂礙便站起來道天不早了我走吧秋痕牽著衣笑道我今天不給你走就拉著手仍向床沿坐下噙著用説道鬧了半天我的話通沒告訴你一句癡珠沈吟一會道你留我我這會卻有我的心事這一説把秋痕氣極了將鬢邊一條玉叉拔下就雙手向桌上打作兩下癡珠要攔也攔不及只見柳眉鎖恨杏臉含嗔一言不發就伏在床裏薄被上哽哽咽咽的哭此時快上燈了又刮了一陳大風癡珠只得扶起秋痕含笑説道我不走吧接著説道我不是不肯在你這裏住卻是怕住時容易別時為難哩秋痕噙著淚説道住了再説於是癡珠笑道花開造次鶯苦丁寧我也只得隨緣就喚跛腳進來告訴他們叫車回去看官你道秋痕目前苦惱尋什麼事呢原來秋痕自見過癡珠之後便思托以終身他的爹媽也想秋痕看重癡珠能夠來往也免天天和秋痕淘氣後來見癡珠灑灑落落的便沒甚大望頭了十七這一天錢同秀馬鳴盛蔔長俊胡考夏旒五人作隊從張家出來便由李家門口經過恰值狗頭出來一見錢馬趕忙請安邀請進來這鳴盛是花案頭家自然到過秋心院其餘蔔長俊二人都不過公宴中見面同秀是五月初五見過秋痕一面就也無怨無德只有狗頭肚裏那曉得鳴盛是不喜歡秋痕的蔔長俊三人不過是闊蔑片只有同秀是個有名的大冤桶十分仰慕如今有緣扳得進門那一種巴結無庸筆墨形容蔔長俊三人也曉得其意便十分慫恿起來同秀這個人本是傻子那裏曉得察言觀色卻自答應了幸而四下多鍾五人通去了可喜天從人願靠晚竟下起滂沱大雨來一連三日這些人自不能來了秋痕算定天一開晴癡珠必來又立定主意教癡珠住了一夜此圍就解以後慢慢的好商量出身不想癡珠一見面就問他這幾天好雨你不岑寂麼在癡珠不過是句口頭話在秋痕想來一則像他平日喜歡兜攬這冤無處訴二則怪癡珠全不曉得他的心事竟然有此大相刺謬之語所以百感俱集以後癡珠又不許他住下覺得天壤茫茫秋痕一人終久無個結局所以痛入骨髓如今癡珠住下那一夜枕邊吐盡衷腸傾盡肺腑此時更深月也上了咬咬窺窗癡珠歎口氣道你的心緒我無所不知只是我留滯此間是為著路梗路若稍通我便回家看母去了我業經負了娟娘豈容再誤而且你媽口氣十分居奇我的性情又是介介異日怎樣歸結呢説得秋痕又嗚嗚咽咽的哭了癡珠難忍只得説道你的話算我都答應了因吟道莫自使眼枯收汝淚縱橫眼枯即見骨天地終無情又吟道夜闌聞軟語月落如金盆口中高吟心中十分悲憤恰好那五更風聲怒號也像為他鳴盡不平一般正是芳樹多陰雨簾未卷行郎有伴接葉當秋繁香如不自持冷豔誰能獨賞瑤琴楚弄驚簾鈎鸚鵡之霜嚼蕊吹花作天海風濤之曲歌唇銜雨珍伊手底馨香濁水清波墮我懷中明月嫣熏蘭破輕輕語碎羅幃波旋翠寒獵獵風呼綾扇江上之青衫未浣尊前之紅淚又斑蠟燭銷魂窗紗鎪影豈傷心人別饒懷抱知天下事各有難言捧皎日之瓊姿澀雌弦之蠹粉天何此醉我見猶憐護持薄霧之裙遊戲淩雲之筆掃除一切剛逢絶塞秋風憔悴三生莫問殘燈影事到了次日癡珠的定情詩是四首七絶雲揚州一夢已十年猶有新聲上管弦最是荻花蕭瑟處琵琶簾外雨如煙少小飄零恨已多隨風飛絮奈愁何浮萍還羡沾泥好淒絶筵前白練歌畫屏銀燭影搖紅一片春痕似夢中安得護花鈴十萬禁他枝上五更風敢將顔色説傾城但解憐儂便有情夜合花開蓮子苦殷勤還與記分明從此秋痕一心一意屬在癡珠不特生客不接一語就是前度漁郎也不許問津了因癡珠説起采秋帳條縧有八字就寫了結歡喜緣成鸞鳳友一對也親自挑繡挂上其實前生風孽此世清償煩惱無窮得幾多歡天喜地頻伽並命也難比鳳友鸞交正是愛極都成恨情深轉是癡旁觀明似鏡當局幾人知欲知後事且聽下回分解
