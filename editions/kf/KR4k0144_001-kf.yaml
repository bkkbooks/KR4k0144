都是李太太打發人搬來排設的禿頭道李太太爲著爺生好不張羅給小的壹百兩銀吩咐預備明天上下的面菜酒席劉姑娘一定不肯叫小的送還他的管事爺們癡珠將手向秋痕肩上拍一拍道著著只是李太太現有身喜何苦這樣煩擾呢說話之間已到堂中見上面排有十餘對巨蠟只點有兩三對已是明如白晝炕上挂著十二幅壽屏墨香紛郁書法娟秀上首寫的是恭祝召試博學鴻詞科孝廉癡珠夫子暨師母郭夫人四秩壽序下款是誥封二品夫人門下女弟子遊畹蘭端肅百拜敬序因將序文念道壽序非古也說道起句便好又念道後人襲天保箕疇之緒或駢儷而爲文或組織而爲詩雖皇典重無非讕語諛詞畹蘭何取以壽序進且夫孝子之事親也恒言不稱老弟子之事師也莫贊以一詞然則吾師固不欲人之以壽言進畹蘭尤不當侈然以壽言爲吾師進雖然禮由義起文以情生畹蘭于吾師義有不容不爲師壽者即情有不能自已於出一言爲師壽者師聽畹蘭言尚亦笑而頜之乎師爲屏山先生塚嗣先生以名儒碩德見重當途海內名公至其地者訪襄陽之耆舊拜魯繩之靈光門外屨常滿師少聰穎爲先生所鍾受兄弟八人稟庭訓均有聲庠序間而師尤能博究典墳遍窮六藝旁及諸子百家弱冠登鄉薦遨遊南北探金匱石室之藏尤留心於河渠道裏邊塞險要及蕃夷出沒江海關防之迹往歲逆倭構難嘗上書天子有攬轡澄清意格于權貴遊關隴間益肆志於纂述舊聞以寄其忠君愛國之思故所學益閎所著述益繁富今夫水掘之平地雖費千人之勞其流不敵溪曲其用不過灌溉若夫出自大河江漢抉百川奔四海動而爲波瀾瀦而爲湖澤激蕩瀠洄初無待乎人力是何也其所積者厚所納者衆而所發者有其本也師之學術汪洋恣肆其淵源有自蓋如此矣既而奉諱歸倦于遊築室南白下將灌園爲養母計不一年寇起西南蹂躪瀕海諸郡縣師慨然複遊京師翼得當以報國家養士恩卒不遇乃賦西征往歲返自成都以江淮道梗留滯並門向秋痕說道敘次詳悉又念道嗟乎震雷不能細其音以協金石之和日月不能私其曜以就曲照之惠大川不能促其崖以通遠濟之情五嶽不能削其峻以副陟者之欲廣車不能脅其轍以苟通于狹路高士不能撙其節以同塵於流欲師之艱於遇嗒然若喪其偶蓋又如此說道好筆仗又念道比年身遭困厄百端萬緒郁於中人情物態觸於外無以發其憤遂一托之於詩水過石則激鶴戒露有聲鴻鵠伍於燕雀則哀鳴虎豹欺於犬羊則怒吼動于自然不自知其情之過也猶憶早歲待側時酒闌燭燦師嘗語人曰富貴功名吾所自有所不可知者壽耳又有句雲情都如水逝心怯以詩名俊物空千古驚人待一鳴此其顧盼爲何若遭時不偶將富貴功名一舉而空之至假詩以自鳴吾師之心傷矣畹蘭少從問字得吾師之餘緒猶斤斤自愛何吾師年方強仕慈母在堂乃憤時嫉俗競俗屏棄一切泛太白捉月之舟荷劉伶隨地之鍤哉此則畹蘭所謂義不容不爲師壽情不能自已於出一言爲師壽者也師聽畹蘭言尚亦笑而頷之乎笑道也說得委婉又念道師母郭夫人葛覃有儉勤之德樛木有逮下之仁吾師前後宦遊師母上事舅姑以婦代子下訓兒女以母兼師族黨鹹稱賢雲畹蘭違侍二十年矣去年夏五重見於並門吾師丰采大非昔比憂能傷人竟有若是乃者夫婿從軍畹蘭率兩男一女寄居此地天涯弱息依倚之情直同怙恃竊願歌子建詩爲吾師晉一觴也曰願王保玉體長享黃發期念畢又向秋痕道情深文明我不料李太太有此蒼秀筆墨秋痕因指著四盆唐花道這也是太太送的那邊四盆西府海棠是劍秋送的那十二盆牡丹花是池蕭兩師爺送的小岑送你一尊木頭的壽星荷生送你一把竹如意十盒薛濤箋一方長生未央的水晶圖章一塊萬年宮的古磚心印送你一尊藏佛一卷趙松雪的墨迹掌珠瑤華每人送你兩件針黹我都替你收起癡珠正要說話禿頭穆升領著多人送進十數對點著的蠟外面響起花炮一堆兒向癡珠跪起頭來還有顔卓然派來四員營弁八名兵丁都在簾外行禮癡珠只得笑道你們起來吧又向李夫人派來的家人道怎好勞了你們這一班家人起來和癡珠打一千請安就也向秋痕打一千道喜秋痕委實不好意思只得說道難爲你們替老爺費心癡珠早走出簾外招呼營裏的人接著秋華堂當差人等和廚房裏的人一起在院子磕頭癡珠含笑進來秋痕站在簾邊就拉著癡珠向炕上坐下笑道那邊是你家太太坐位說著就居中拜下去癡珠忙站起身拉起說道你怎的也這般鬧秋痕道不過各人盡一點心罷了兩人看一回花玉環也來磕了頭便攜手回來西院院裏早排下席是三個位癡珠向炕上躺下道天不早了差不多一下多鍾還要喝酒麽秋痕道喝杯酒也應個景兒於是恭恭敬敬斟上兩鍾酒安下向著癡珠道你不起來我又要拜癡珠帶笑拉上炕坐下吩咐禿頭撤去席面隨便揀幾個碟幾件菜送上炕几兩人淺斟低酌起來次日李夫人帶著阿寶一早便來荷生值辦密折不便出門心印過來拜了壽就回方丈倒是陳羽侯徐燕卿黎愛山來坐了面席小岑劍秋子秀子善贊甫雨農是不用說了武營中只有顔卓然林果齋二人在座餘外癡珠俱叫人遠遠的就擋了駕晚夕卓然劍秋子秀子善坐了一席小岑贊甫雨農和癡珠坐了一席裏邊是李夫人晏太太留太太阿寶瑤華掌珠秋痕七人坐了一席外面猜拳行令裏邊是大營吳參將送來兩個女尼會耍戲法只見兩尼生得豐豔非常帶個徒弟妖精一般三位太太都不言語掌珠秋痕也不大理會只瑤華盡抿著嘴笑先前變出一盤桃恰恰十五個內外分嘗卻是真的已足詫異停了一會又變出三尾鯿魚俱是活的以後要了十個品碗排在地下紅氍毹