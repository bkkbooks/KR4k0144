一把這會贊甫雨農也到大家幫著點香燭焚紙錢哭個淚幹聲盡心印領著徒子徒孫就在秋華堂念起度人經贊甫雨農領著穆升照料衣衾棺槨用的棺就是停放樓下那一口禿頭諸事不管只在床前守屍痛哭就加孝子一般到了人殮禿頭體貼癡珠生前意思將秋痕剪的一綹青絲一雙指甲縫個袋兒挂在癡珠襟上其餘癡珠心愛的古玩和秋痕的東西俱裝入棺中將靈停放在秋華堂禿頭等輪流在靈幃伴宿次日心印題上一付挽聯是梓鄉極目黯飛雲可憐倚枕彌留猶自傷心南望蓮社暮年稀舊雨方喜高齋密邇何期撒手西歸這且按下看官須知癡珠方才化去秋痕卻已歸來正是鐵戟沈沙焦桐入安道碎琴王郎斫案欲知後事如何且聽下回分解第四十四回一刹火光穢除蟬蛻廿年孽債魂斷雉經話說秋痕自臥病後敝衣蓬首垢面臒顔竟不是個畫中人了那小夥狗頭閒暇無事結識幾個土棍燒香結盟便宿娼賭錢起來先前只乘空偷些現錢後將現銀三百餘兩都偷完了一夜竟把金銀首飾上好玉器皮衣席捲而去次日李裁縫起來見箱籠都已打開急得口定目呆說是被盜要和店主打官司鬧了一天四處找尋狗頭不見個影店主轉說李裁縫父子合謀圖賴又見他帶了家眷來歷不明要見官呈告經旁人勸止牛氏十年辛苦剩得這點家私如今給人搬運一空氣得發昏數日跟尋狗頭沒有蹤迹後來就同李裁縫拚了幾回命到得歸結只是抱怨秋痕當下無可奈何就正定府城裏租了一間小屋暫住四月後秋痕的病略好牛氏想逼他見客無奈地方生疏無論秋痕不肯答應就令妝掠起來也是枉然挨到六月初李裁縫牛氏都沾瘟病此時用不起火伴可憐秋痕要和跛腳自己下鍋煮飯服事兩個病人士寬是就近且個店面做個小買賣正擬寄信太原不想二十二夜牛氏屋裏竟發起火你道爲何牛氏挂了一床夏布帳這一夜就帳中吃煙把件小衫丟在煙燈傍邊昏昏沈沈竟自睡著此時天燥一引就著夏布帳頂紙門烘騰騰的燒起來牛氏李裁縫夢魂顛倒身上著火不曉得奪門走出倒向後壁去尋門路到得街坊來救只救出秋痕跛腳秋痕跛腳亦只搶得一尊觀音小龕一軸癡珠小照其餘都歸毒焰就玉環也隨著兩人化做冷灰管士寬當下接秋痕主婢到了自己店中次日秋痕替三人尋出骨殖買地掩埋想著自己命苦又痛他三個人枉自辛苦一場就也大哭數次二十四早士寬雇了一輛轎車給秋痕跛腳坐了自己雇個騾子隨走一路小心看視秋痕心上感激他也敬重他想道他領我找癡珠去只癡珠的病不曉得好了沒有又想道癡珠倘好了回南我如今是孤身一人投在何處沒得法要向荷生采秋討些盤纏我徑到南邊找他去又想道我命就這樣苦受得大半年罪這回又跑個空譬如癡珠與我真個無緣那兩個老東西就不該燒死咳早曉得有此機會也不該將身子糟蹋到這田地秋痕這般一想飯也飽餐睡也安穩以此路上辛苦身邊空乏全不復覺到了二十八這日秋痕車中心驚肉跳坐臥不安二十九日又好了是晚宿黃門驛屈指初二便抵並州又想道癡珠平素要做衣服給我如今是一下車便要他替我打扮一身本來醃醃臢臢得來東西除個乾淨也好又想道說起也怪二十一夜我穿的是件茶色的縐夾衫怎的冒火起來卻是癡珠給我的小坎肩合著眼迷迷離離的想忽見癡珠笑吟吟的穿著一身的新棉綢的短衫褲站在床前秋痕趕著坐起拉手說道你曉得我回來麽癡珠不應秋痕審視一回見癡珠腳上也沒穿襪一言不發只向襟前解個小口袋秋痕道你坐下我替你解吧癡珠坐下秋痕一面替他解口袋一面說道你怎的又不說話你從那裏來竟不穿襪不冷了腳癡珠只是笑秋痕早把口袋解下檢裏頭紙包原是自己一綹青絲兩個指甲秋痕淒然淚熒道你就長帶在身邊沈癡仍是不語秋痕淚珠紛墜說道你不好也是不說話好也是不說話實在教人難受癡珠盤上腳哈哈的笑秋痕一手抹淚一手摸著癡珠的腳是冰冷的說道何苦呢你看雙腳冷得冰人轉身想將夾被替癡珠蓋上猛回頭卻不見了睜眼看時只有一燈如豆跛腳鼻息如雷起來坐著將夢凝思一回也摸不著是吉是凶見跛腳枕頭推在一邊仰著面開著口鼻孔朝天也不理他剔亮了燈聽得院子裏秋蟲亂叫一陣風吹得怪剌剌的響吃兩袋水煙重復睡下合著眼便見癡珠撐開時又不見了心上十分憂疑翻來覆去想道敢莫癡珠有甚意外之事我去時他原吐血如今四個月了想到此便把日來高興的念頭一時冰冷眥淚珠珠下滴一會又自解道我夢見他都不像病人氣色大約是好了又想道我和他受了一年苦楚自然是苦盡甘來想來想去晨雞早唱燈也沒油昏昏欲滅聽得跛腳喁喁囈語好像兩口子說話一會大聲道這樣講韋老爺是成仙了停一會又說道姑娘原也可憐以後又鼾聲大振秋痕便叫了幾聲推了幾下跛腳才醒過來問道做什麽秋痕道你做什麽夢說起韋老爺又說起我跛腳方揉揉眼坐起道我沒有夢見韋老爺也沒有夢見姑娘我卻夢見玉環向我要錢呢秋痕就不言語此時天也發亮大家起身收拾上車這日秋痕在車裏昏昏沈沈的睡了一天好像是和癡珠住在秋華堂光景醒來卻一些兒也記不清楚是夜宿石坪驛初二日走三十裏地就進城了徑到士寬家下車士寬教侄兒找那姓顧的要秋心院鑰匙自己便來秋華堂報信不想剛到柳溪逢著李福穿件白袍踉蹌前走士寬搶上數步趕著叫李福猛回頭見是士寬慘然道你回來麽姑娘呢士寬道姑娘也來了李福道咳爺不在了士寬驚道怎的李福道爺是前日去世你和姑娘什麽時候到卻不給爺知道士寬此時氣得發昏半晌才能說道姑娘方才下車還在我家就叫我給老爺信如今老爺沒了怎好呢李福道事到這樣真個沒法於是士寬垂頭喪氣跟李福向秋華堂來沒到秋華堂早望見大門上長幡士寬大哭道我只怕遲了老爺已經回南再不料有此慘變門上大家都迎下來探回資訊這日子善才出差回來也在秋華堂幫忙子善的跟班趕著去回一時子善心印翊甫雨農都走出月亮門見士寬只穿件小衫腳上還是草鞋跪在臺階上向癡珠的靈前嚎啕大哭禿頭也哭得悽惶大家見此光景都爲酸鼻一會勸住了士寬哀哀的訴於善歎道緣法一盡就是九牛之力也難挽回心印灑淚道凡事是有安排的定數贊甫道秋痕得了這信可不知要怎樣呢子善道我就同士寬去看且說秋痕在士寬家歇息一會料癡珠聞信必定趕來恰好士寬侄兒找著歸班開了秋心院大門秋痕便過這邊略同歸班說些家難歸班呶呶不休秋痕就不大理他歸班沒趣自去探訪狗頭資訊當下秋痕趕著和跛腳拂拭了幾榻塵土浼士寬侄兒幫著打掃見空宅荒涼又經人住過傢夥位置都不像從前也有給人搬去的秋痕此時雖不暇問只痛定思痛愈覺傷心又想自己空無所有或者今夜就到秋華堂去正在盼望忽見士寬和穆升來了說道老爺病著秋痕正要問話子善進來秋痕趕忙迎坐眥淚盈盈問著癡珠的病子善歎道病是不好只你初到歇一歇再和你說秋痛哭道到底怎樣我吃盡千辛萬苦都是爲他你說吧子善道這兩天卻也不妨你如今只剩下一身怎好的就吩咐跟班和穆升道你看姑娘屋裏應用什麽都向公館取來秋痕道這卻不必我即刻要到秋華堂看癡珠去一面說一面向穆升道勞你替我叫一輛車穆升答應子善只住道此刻已是五下多鍾你要去也等明天秋痕道子善你怎說你想癡珠聽我到了不曉怎樣著急想見我呢子善再三勸止秋痕那裏肯依士寬是個莽撞的人禁不住說道韋老爺早是子善忙行叫他出去秋痕見此光景知道不好呆呆的瞧著子善半晌跳起說道我千辛萬苦止說這一句就急氣攻心昏暈倒了跛腳大哭子善幫著叫停了一停秋痕轉過氣來大哭一陣握著兩拳將心胸亂打大家攔住就向板床歪下子善連連勸慰總不答應不一會子善的跟班和穆升搬取鋪蓋器皿也來了差不多天就黑了秋痕才坐起向子善道你請回吧承你照拂我來世做犬馬報你說畢重復躺下子善只得吩咐跛腳好好照料就帶跟班回家穆升怕家裏有事早就走了士寬被子善叫他出去心中很不自在領著侄兒回家歇息一間空屋只剩下秋痕跛腳兩人只聽得梧桐樹上那幾個昏鴉呀呀的叫個不住又有一個梟鳥在秋心院屋上鼓吻弄舌叫得跛腳毛髮森豎時已新秋天氣晝熱夜涼跛腳身上只一件汗衫十分發冷肚又餓瞧著秋痕就如死人一般合著眼一言不發猛聽得有人打門跛腳答應步下階來見新月模糊西風蕭槭滿院裏梧葉卷得簌簌有聲走到月亮門外不防廊上欄幹有個烏溜溜的大貓跳將下來把跛腳一嚇哎呀一聲栽倒在地那黑貓一溜煙走了跛腳戰兢兢的爬起來開門原來是士寬和他侄兒送來四碟小菜四碗面四個餑餑和那油燭盤香跛腳這回不怕了便來告秋痕秋痕坐起請士寬坐下說道枉費了你大半年的氣力曉得這樣倒不如那一晚也燒死了豈不是好士寬粗人又吃了酒含含糊糊說了幾句他的侄兒點上燈就都走了開門出來恰好禿頭帶個打雜送來簾幕飯菜及點心等件秋痕見了禿頭也是不哭只問癡珠臨死光景禿頭揮淚告訴一遍秋痕長歎禿頭勸秋痕用些飯菜秋痕一點不用跛腳卻飽吃一頓時已有二更天禿頭也走了跛腳拿著燭臺送了禿頭關門進來剛到二門梧桐樹下瞥見上屋有個婦人和秋痕差不多高走入月亮門跛腳只道是秋痕出來也不驚疑還說道娘你也不點個亮到得月亮門見那婦人已上臺階不入屋裏卻由東邊彎去後院又說道娘緩一步我照你走卻不見答應直跟到梅花樹畔冉冉而沒不覺嚇得通身發抖跑入屋裏秋痕還歪在床上不動分毫跛腳回想起來十分害怕又不敢告訴隨說道娘你自清早起身至今不曾吃點東西喝些湯好麽秋痕不應跛腳停一停又說道你要躺起來一坐給我鋪下褥子你也好躺秋痕道你鋪在西屋自睡我就這樣躺跛腳沒法只得伴著秋痕呆坐坐到三更多天十分疲倦歪在一邊恍恍惚惚的覺自己走到一個地方靜悄悄的只見對面一對宮妝女子手持幡蓋引著他娘和個帶劍的女子緩步而來來到跟前轉西去了心上想道娘同這女子去那裏哩趕著跟來卻又不見遙望過去前面有個廟出出進進都是戲臺上打扮的人只沒有塗臉的想道這廟裏敢莫有戲就跟著人進去見寶殿巍峨是個極大的所在月臺上香煙成字寶蓋蟠雲有許多穿戲衣的人也有男的也有女的女的都是少年美貌男的便有老有少看了一會不像是戲又不像是佛殿正想要走只聽得兩邊鼓樂起來說是冤海司來了有一個穿戲衣的男人瞧見跛腳立地攆出跛腳嚇得打戰只見許多豔服女子引一座金碧輝煌的車坐著一個纓絡垂肩的人遠遠的看卻不曉得是誰忽然又有個穿戲衣的人喝道你什麽人敢跑來這個地方閒逛惡狠狠的一鞭跛腳哎呀一聲原來是夢睜眼一看日已上窗卻不見秋痕跛腳只道起來前屋後屋找了一遍只見秋痕高挂在梅花樹上跛腳嚇得喊救兩手抱著大哭士寬隔牆聽得跛腳哭喊知道秋痕不好趕著過來跛腳一面開門一面哭道娘吊死了士寬和他侄兒進來忙行解下見手足冰冷知不中用便赴子善公館告知到得七下鍾秋華堂和柳巷的人通知道了瑤華奔來看視大哭一場街坊的人個個讚歎都說難得子善主意從厚殯殮不用說了看官須知秋痕原拚一死然必使之焦土無立錐之地而後華鬘歸忉利之天這也在可解不可解之間秋痕系戊午年七月初三日寅時縊死年二十歲例斯人於死節心固難安報知己而投環目所共睹遭逢不偶銜大恨於三生視死如歸了相思於一刹留芳眉史歌蒿借孔雀之詞證果情天文梓起鴛鴦之塚正是比翼雙飛頻伽並命生既堪憐死尤可敬欲知後事如何且聽下回分解第四十五回竹竿嶺舊侶哭秋墳樅陽縣佳人降巨寇話說荷生自楊柳青撤防到了青萍驛接見太原各官驚知癡珠秋痕先後去世大爲惘然是夜就枕上撰一付挽聯是萬里隔鄉關望一片白雲問魂兮幾時歸也雙棲成泡影剩兩行紅淚傷心者何以哭之次日進城唱起凱歌打起得勝鼓鬧得一城人觀看熱烘烘的擁擠到了行館采秋迎出並門仙館小別三閱月兩人相見欣喜之情自不用說只接續見客直到二更天甫能退人內寢細談說起癡珠秋痕兩人十分傷感采秋便將挽秋痕的聯句述給荷生聽念道有限光陰丁噩夢不情風雨虐梨花荷生道好我的聯是這十六字癡夢醒時秋深小院劫花墮處春隔天涯采秋也道超脫之至荷生隨把挽癡珠的句也念給采秋聽次早一起寫好分頭張挂去了下午親往秋華堂排上一台祭品換了素服哭奠一番就同子善大家到西院流覽一回琴在人亡十分惆悵見焦桐室粘的詩箋有五月下浣重過秋心院感賦七律二首因念道沈沈綺閣幌雙垂頻蔔歸期未有期杯影蛇弓魔入幻帷燈匣劍鬼生疑搏沙蹤迹含沙射銷骨讒言刺骨悲昨夜落梅風信急紙窗策策益淒其眉峰離恨鎖層層欲斷情絲總未能不恤人言誰則敢可憐薄幸我何曾半生豪氣銷雙鬢九死癡魂傍一燈碧落黃泉皆誑語殘更有夢轉堪憑念畢正向子善說話只見索安回道汾神廟主持心印求見說有韋老爺遺囑面回荷生道甚好我正要往訪就同子善迎了出來心印行禮荷生拉住敘些契闊又謝他經理癡珠喪事心印灑淚道貧僧二十年心交聚首天涯竟爲他辦了這等事說來就可傷心荷生聽了眥淚欲滴心印便將癡珠遺囑述了一遍荷生向子善道這事自是後死者之責但我簡牘紛紜心也粗了學問我又不如他怎能替他纂輯起來只好暫藏在我那裏至詩文集儘管付梓吧子善躬身道是荷生又坐了一會走了次日荷生因禿頭求差健弁齎著癡珠遺劄回南遂作一緘寄給謖如也交差弁帶去此時子秀回省銷差接著餘黻如緝捕鹽梟差務也完竣到省大家商議道南邊道路不通秋華堂又不便久停靈輀不如就葬並州附以秋痕完了他生時心願回明荷生荷生道歸葬爲仁隨葬爲達況時事多虞葬了也完我們一件心事大家道是嗣後心印池蕭看淮南門外竹竿嶺一區墳地就在夫妻廟後於是擇了九月初二未時將癡珠秋痕兩柩安葬就嶺下善人村買一百畝田地五十畝菜園一所房屋將跛腳配給禿頭便令搬往守墓穆升林喜李福三人荷生都收作跟班就贊甫雨農也延人文案處秋華堂仍做遊宴公所汾神廟西院自從癡珠死後都說有鬼沒人敢住後來是韋小珠搬入作寓才把謠言歇了秋心院也紛傳有鬼後來是一邵姓買爲別業這便是癡珠秋痕兩人結局一日采秋和瑤華商量上墳這日林喜李福到夫妻廟伺候采秋瑤華素服只帶了穆升紅豆秋英由甬道坐小轎出城穆升騎馬先走紅豆秋英坐一輛車跟轎而行到了城外采秋瑤華紅豆秋英一起換了馬路上歇一歇便望見竹竿嶺夫妻廟林喜李福迎出兩人下馬進得門來破廟荒涼草深一尺見一群的羊在那裏吃草頹垣敗井廊廡傾欹進了前殿尚自潔淨也排有兩三張破的木幾靠牆一張三腳的桌這是林喜先到教看廟預備的廊下自有行廚供給穆升捧上兩碗茶來紅豆秋英跟著采秋瑤華看了塑像和那壁間畫像殘碑說道去年八月十五癡珠秋痕不到這裏祭奠麽不想今年我和你來祭他瑤華也覺黯然欲絕兩人喝了茶逛到後殿見西邊坍了一角風搖樹動落葉成堆淒涼已極又聞得遠遠有人哭聲紅豆秋英站在倒牆土堆上見牆外桃樹下拴一匹黑騾一人看守李福認是汾神廟的人問道你來做什麽那人道我跟師父來上墳采秋向李福道韋老爺的墳在廟後那裏穆升道只在牆外西邊這裏去不上一箭地瑤華道這般近我們打這裏步行去吧采秋道甚好便攜著瑤華的手步上土坡穆升前引兩人憑高遠眺見平原地遠曠野天低覺得眼界一空到得下來便是廟外疏林黃葉荒徑寒蕪蕭條滿目早令人悲從中來轉向西遠遠的望見三尺孤墳墳前點著香蠟一個穿袈裟和尚正在膜拜禿頭燒紙哀哀的哭林喜跟著祭品的擔也才到墓下采秋道等和尚走了我們祭吧穆升道他們現已哭過想是知道我們上來匆匆要去槐樹下的騾不牽向前麽只見禿頭和林喜說了幾句話和尚點點頭繞向東邊而去紅豆秋英便攙著采秋瑤華到了墳上見墓碑題的是東越孝廉癡珠韋公之墓林喜早排好祭筵采秋灑淚上香拜了一拜瑤華也灑淚行了禮紅豆澆酒秋英執壺林喜穆升焚紙事畢四人以次磕了頭只李福在夫妻廟中照料不曾跟來禿頭盡著哭采秋瑤華十分傷感俱站不住那烏騅和瑤華的馬都扯在墓前伺候就不再到夫妻廟只勸諭禿頭數語上馬走了這且按下待小子表出潘碧桃一番好結果來碧桃自與錢同秀撒賴以後並州是站不住他媽便將碧桃走了絳州又走了澤州走了清化走了汴梁汴梁自古佳麗之地近來黃河遷徒不常又新遭兵燹中州光景就也不可再問但是樊樓之燈火成墟飯甑之琵琶還夥碧桃閱人既多又戒了煙容華遂愈煥發迷香洞裏居然座客常滿一日來個道人授以操縱吐納摩咒頓挫之訣臨行說道你過此便當發迹只這道人去後無論舊寵新歡相對總是味如嚼蠟後來篾片領個豪華公子到門這碧桃放出手段百般討好那公子見得碧桃千嬌百媚就也十分憐愛不想晚夕兩口嬲了一陣一個是渺乎其小一個是廓其有容還是碧桃泥他唱個後庭花到了天明竟自走了數月門庭寂然母女十分站不住聽說樊城熱鬧現在賊退遂帶了猴兒徑行上路這日離樊城不上十裏日早落了對面忽來一隊遊騎車夫望風而遁當頭一個少年望著碧桃便跳下馬搶了飛鞭而去沒有三裏多路天快黑了投一個小鄉村碧桃高叫救命村中的人沒個來理這少年向一家門首停住裏邊有個婦人黃瘦的臉兒手拈盞燈將碧桃扶下碧桃跳擲喊哭那婦人笑道哭也無益喊也枉然這少年也說道娘子安靜我們不是食人老虎碧桃道你還我的媽我便跟你那少年道這是容易的事馬上就到碧桃見他沒甚歹意就停住哭與婦人見禮那少年已將他媽帶來見面碧桃大喜看官你道這隊遊騎又是那一股賊哩原來淮北一帶城池近爲員逆頭目呂肇受竊踞這肇受原是樅陽縣著名劇盜卻極孝順縣官破案一拘他娘便自投到後來積案多了幾斃杖下幸站木籠有個官善於風鑒見他臉有紅光便放了令去投軍不想肇受投賊受了僞職踞了樅陽擁有淮北千餘裏鹽利與河南撚首姚薈琳結爲兄弟以此餉足兵多勢強援衆只是生平有個缺憾是個驢形自做賊以來不知糟蹋了整千整萬婦女卻不曾了一回賬以此四布遊騎到處擄搶這少年擄得碧桃獻了肇受肇受見面也不甚爲奇這日酒後叫來服侍不料碧桃竟禁得起春風一度而且曲盡媚嫵之態這是肇受不曾嘗的滋味當下樂得心花怒開告了他娘擇日成親賞了少年一百兩金差人迎了碧桃的媽連猴兒也得了好趣看官你道人生無論什麽人肯從根本上著點精神再沒有不好呢碧桃那般淫賤終始與他媽相依爲命肇受那般榮華也是終始與他娘相依爲命他娘這會見個粉妝玉琢的媳婦來了喜歡之至這碧桃就珠圍翠繞做起夫人看官你道是好結果不是尤可喜者一夕枕上兩人各訴衷曲碧桃說道你如今富貴極了只是依人自來是沒結果呢你怎不反正將淮北鹽利獻與朝廷必有一番獎勵然後請率所部討賊就這千餘裏地徵稅課做我糧餉金陵守得住我且霸住一方金陵守不住我便做個陶朱翁你道好不好呢說得肇受一骨碌跳起拍掌道上策上策娘子軍我先要投降了次日肇受果然托記室做個降書又遣人私送北帥許多財物後來奉到諭旨著授淮北提督改名藎忠碧桃竟自得了一品夫人的誥命正是羽鎩鳳凰語通吉了腐草爲螢道在屎尿欲知後事如何且聽下回分解第四十六回求直言梅翰林應詔複潯郡歐節度策勳話說這年秋間長星見在西北方光有數十丈直射東南逆賊四眼狗勢大猖獗看官你道這四眼狗是誰原來便是秋心院的班長李狗頭當時癡珠說他會做強盜人都不信不想他卻真做悍賊他自正定括了牛氏箱籠便與他結盟的幾個兄弟跑到淮北適值金陵屠殺之後員逆委任榮合榮法主持號令出榜招賢狗頭夤緣獻策破了烏衣官軍又破了防守七年之六合三河大捷之義師員逆大喜以爲奇才將淮北悉歸管轄其實懷遠一帶呂肇受早反正了狗頭領著數萬人馬只飄泊太湖來往潛山當下朝廷爲著東南糜爛天象告警詔中外文武及軍民人等直言時務這梅歐兩個晉京得著了試差小岑卻轉個禦史想起癡珠臨行送的序文是教他勘破了七品官將天下所有積弊和盤托出做個轟轟烈烈的男子就也鼓動小岑胸中幾多塊壘幾多熱血只是乘不出機會這會言路大開他又得了禦史便悄悄做起一折不但不與劍秋商量便是丹翬也不知道徑自遞了略雲臣梅山奏爲應詔直陳仰祈聖鑒事臣聞古三公有因不旱策免有不待策免而自行引退者何況天象示警於上人事舛迕於下而內閣大臣猶循常襲故旅進旅退於唯唯諾諾之間清夜捫心其能自慰乎夫用人行政其將用未用將行未行之際差之毫釐失之千里天顔咫尺呼吸可通惟有內閣而已身居密勿之地苟懷緘默之風則宰相亦何常之有一切凡人皆可爲之又何藉夢蔔以求也東南軍務稽今二十有餘年矣民生顛沛國帑空虛盡人能言其實盡人不敢言其所以然之故臣私自憤懣急欲明目張膽爲我皇上陳之封疆壞於各道節度各道節度非有唐末之橫也而平居泄遝臨事張皇有喪師者有辱國者有聞風先遁者有激變內潰者有奉熊文燦爲祖師而以撫誤事者有蹈楊嗣昌之覆轍而以鄰爲壑者有擁兵自重而遊弋以避賊鋒縻餉自娛而高居以養賊勢者凡此種種紕繆內閣豈不知之有遇事嚴參以重封疆者乎自倭逆內犯勾結水陸劇盜以及回疆西藏朝廷命將出師不惜捐萬萬帑金爲民除害德洋恩普該將帥宜何如努力戎行乃老成凋謝既無繼起之才結習相沿動有僨軍之將往者金陵淪陷設南北二帥北帥逍遙河上南帥負鍾山轉瞬數年終於覆沒爲宵旰憂方其未敗錦衣玉食倡優歌舞其廝養賤紈綺吸洋煙莫不有桑中之喜志溺氣惰賊氛一動如以菌受斧害于而家凶于而國覆轍相尋曾不知戒內閣耳目猶人有先機議處以肅戎行者乎封疆如此戎行如此此何時哉此何勢哉該大臣等相顧不發一策事事仰勞神算已屬全無心肝乃猶徇情掩飾淆亂是非致令外議沸騰或曰受賄容奸或曰潛蹤通賊聖明之世臣不敢謂然第念該大臣世受國恩身膺隆遇何以坐視時艱悍然於天人之交迫曾無所動於中也今日之事必先激濁揚清如醫治疾扶正氣始可禦外邪伏唯聖鑒俯納芻蕘特伸乾斷則民生自複國計自紓臣不勝感激之至謹奏次日內閣傳旨禦史梅山忠讜可嘉著賞人參二斤原折該大臣閱之各明白回奏小岑謝恩下來滿朝公卿無不改容當下回寓劍秋已早來了接著笑道士別三日當刮目相待小岑也笑道這是癡珠擡舉我得了兩斤人參隨即坐下談了朝中情事劍秋便說道癡珠議論多是行不去呢就如這折議論也是乘此機會才用得著小岑歎道雖有智慧不如乘勢雖有鎡基不如待時自古是這般呢劍秋道前兩天荷生寄來癡珠詩文集副本詩倒罷了那文集中議論都駭人聽聞得很我略瞧兩篇擬疏一是請裁汰一曰汰大員而增設州縣一曰汰士子而慎重師儒一曰裁營伍而力行屯政一曰裁胥吏而參用士人一是請廢罷一曰罷邊防而仍設土司一曰罷厘金而大開海禁一曰廢金銀而更造官錢一曰廢科舉而責成薦主一篇都有數萬字讀之令我小儒舌撟小岑道行原是行不去呢只這議論都是認真擔當天下事的文字人存政舉便自易易你道他迂闊麽就如他說用兵大略是先和倭夷聽其自生自滅再清內寇上保蜀下複武漢做個南北樞紐然後從上游分路剿辦水陸並進力厄賊吭你道是不是呢現在什麽人能了此一局呢劍秋道這一付議論我也聽他說過荷生謖如都將此做個帳中秘本其實一個人是做不來呢小岑笑道天下事那裏有一個人辦得出呢起檣椎牛挂席集衆正待說下門上報有客來你道是什麽客呢原來就是謝小林鄭仲池前個月小林以禦史放了淮海道仲池以理少放了淮北節度兩個俱因地方殘破無處張羅不能出京這日從內城出來得個明經略入閣的信以此同訪小岑到得靠晚見過上諭是首輔予告朝廷以西北肅清詔經略入閣所有未了事件著交韓彜守護帥印辦理到得第三日內閣傳旨湖北漢陽府著梅山補授小岑叫苦連天丹翬便埋怨他上得好折如今得了這個去處上不著村下不著店又是不能不走的倒是劍秋替他張羅出京說是朝廷因你肯說話才叫你一麾出守不久就有好處勸他走了卻說仲池節度淮北與肇受恰是同官肇受此刻擁了淮海千餘裏錢糧鹽課奉詔討賊自廬江以至和含連營百餘座旌旗耀日人馬堆雲仲池主仆依個破廟一日提督府兵丁搶人婦女土團不依鬧起事來幕中朋友說須地方官彈壓肇受便往拜仲池仲池飭該管官兩邊和解就也前往回拜這肇受高興開起夜宴於是萬炬齊明百花遝出羅郇公廚中之美膳舞廣寒宮裏之羽衣酒行數巡夫人出見珠光側聚佩響流葩肇受卻小袖禿襟笑向仲池道我不慣穿著大衣仲池一面招呼夫人一面說道我們兄弟盡可脫略形迹肇受就指左邊一座教夫人坐下向仲池說道他文雅不比我鹵莽武夫著他奉陪我就在這炕上燒煙吧於是弁者鬟者流目於燈光煙氣之中歌人舞人摩肩于豐酒繁肴之地仲池起辭再三無奈肇受夫婦禮意殷勤遲至一下鍾才得散席臨行肇受取個沈沈的包裹納入仲池袖裏笑吟吟的道聊以志別仲池不解無可答應只得收了抵寓檢開包裹燦燦金條次日天明忽報提督挂印走了所有百餘座壁壘俱是空營原來肇受軍令俱是暗號那日黃昏這多兵俱已陸續登舟席散後肇受碧桃各奉老母就也出城萬帆競挂說是向海門而去如許重累竟一夕拔宅奇不奇呢這裏仲池詫異一番將提督的印暫行護理方招募鄉勇聯絡土團想爲自強之計不想諸事辦未得手狗頭卻來了空空一城如何可守聽說寶山營兵強馬壯便向寶山投奔坐此淮北千餘裏竟爲狗頭竊踞再說小岑那一折利害不過參倒了幾個大老正法了幾個節度這是小岑想不出呢爲著小岑奏准大家依嘴學舌都說起話來便扯葛不清還是明經略到京慢慢的回轉聖意才得歸結救活了多少人只日日接見朝士延攬人才總不得個擔當全局的人實在十分煩惱一日想起李謖如恰好出了肇受提督的缺便極力保薦得了諭旨過了數日門上遞了一封書拆閱是侍講歐冶言事的書約有一千余字大意是說那楚北淮南形勢及扼賊要害之處又說封疆大吏推諉素不知兵這是無志者藉口之辭試問各道節度共帶樞部之銜且有標兵之掌如何說得不知兵請以各道軍務俱歸各道節度督辦勿庸另派大臣又說是今天下雖多事然誠得志節磊落通知古今之人分佈中外要路一以滅盜賊安元元爲念功效未必不可漸致大喜道這等議論與荷生一般通達可以大用次日便呈禦覽奉旨召見劍秋口才本是好的是日奏對洋洋灑灑大稱聖旨就放個岳鄂節度陛辭這日保了小岑與遊鶴仙不數日鶴仙放了楚北提督小棗擢了荊宜觀察此時楚南完固雖寶慶武岡均有賊蹤安化益陽均當堵剿而大局是個安靜楚北武昌失守三次漢陽失守四次自荊宜以下千餘裏瓦礫之場賊尚盤踞以爲出入孔道可憐小岑攜了丹翬羈旅樊城無可著手後來擢了荊宜道才造起戰船招些水勇值著劍秋也到帶得宣府精兵二千駐紮荊州會合小岑幕的水勇一千及遊鶴仙帶來太原精銳三千共成六千人擇日出師高屋建瓴挂帆東下克了石首又克嘉魚直薄武昌城下城賊負自固劍秋撥一枝兵力扼安陸德安援賊小岑水師複了漢口鎮漢陽賊便也不敢離城半步於是城賊岌岌再說小岑近日收個少年姓包名起這包起是個賣甘蔗爲生的劍秋也收個少年姓黃名如心這如心是個割馬草出身的兩人俱生得面如滿月目如流星驍健多力包起緣戀個婦人因此投了小岑充個親兵如心也戀個女人替他養馬一日雪裏割草劍秋瞧見他單衣來去揮汗如雨大相詫異後又見他駕馭生馬矯捷異常就提拔他充個親兵那包起如心戀的女人你道是誰原來就是那年秋華堂搬馬解的柳青胭脂他姑嫂二人由太原走了大同宣化便自直隸轉到河南小住樊城柳青卻結識了包起胭脂就也結識了如心這兩對少年夫婦感著癡珠詩意便向軍營中人投靠包起是應小岑招募如心算是劍秋提拔出來每逢出隊這兩人都有個娘子幫手衝鋒陷銳極爲得力以此積功都得了前程營中人將包起如心喚做飛虎柳青胭脂喚做雌熊這夜攻打武昌如心夫婦帶了百餘人伺至三更覰個空飛躍而上放火大呼城賊心膽俱寒黑夜裏自行履殺胭脂已拔扃招大軍入城了次日小岑克復漢陽也是包起柳青之力劍秋大喜都拔補了營官乘勝攻走安陸德安等賊楚北一起肅清只武漢兩城公廨已空人物如鬼鶴仙因勸劍秋移駐嶽州劍秋笑道如冒藍縷以啓山林不就是這地方麽苟此而不能守去之他處何益昔周室征淮師出江漢晉代平吳謀在荊襄王瑞造船循江而下陶侃之勳鎮守武昌宋岳武穆李忠定謀畫岳鄂均以此地爲要圖我們要想控制長江平定東南豈容棄去此地而且要守此地還要攻破九江呢看官聽說九江系大江左右一個樞紐賊以金陵爲腹心倚九江爲門戶設官科糧九江之賊又恃小池口湖口爲犄角九江有賊鄂州守不住金陵亦克復不來以此劍秋小岑急於募水勇造船艦有志事成不上兩月便增水勇三千人年紀都是三十以下的戰艦八九百號大小炮位二千尊小岑督率克復了小池口僞城進圍湖口此時鶴仙帶二千陸師下援南昌留下一千陸師劍秋就令包起如心兩夫婦管帶營小池口城裏到了次年湖口仍難得手一日小岑喚過包起附耳數語包起歸營便傳令陸師拔營進剿宿松太湖次日湧口出隊內湖外江炮火四合水陸悍賊無數悉力抗拒方血戰間忽然一隊步軍從山後連臂大呼突入縣城船賊岸賊相顧駭愕不知此支兵從何而至攘攘擾擾之中械不能舉槍不能發我軍乘勢追逐因風縱火把兩岸夾守的僞城一起克復賊船數百號焚奪一空片帆不返此時火聲水聲人馬喧騰聲震天動地船賊也有死于水的也有死於火的岸賊也有落荒跑的也有受刀傷的也有砍倒頭的也有踐踏死的真殺得滿江皆屍滿湖是血看官你道那一隊步軍是那裏來呢原來包起揚言進剿宿太卻於夜間將一千人潛自小池口便人戰船繞出湖口十裏天甫黎明這一千人盡數登岸高踞湖口縣城後山巔埋伏到得城賊會合水賊這一隊便殺下來了以此大捷當下水勇扼在江上陸師圍了潯城城賊糧草有餘逃竄無路我軍四面環轟塌倒城垣百餘丈便擒了僞貞天侯淩紫茸等磔於市自是鄱陽數百里遂無賊蹤劍秋論功以小岑爲最奉旨擢了湖南節度鶴仙加了頭品頂戴包起如心都升了參將正是激濁揚清人才輩起獨有虯髯摶翼萬里欲知後事如何且聽下回分解第四十七回李謖如匹馬捉狗頭顔卓然單刀盟倭目話說李謖如定計屯田與至俊務農講武把海墟都墾就腴田蛋戶都變成勁旅又開了幾處學堂教二十歲下兵丁都要讀些史書熟些核算工些楷法因慨然道癡珠嘗歎今之武官都有輕裘緩帶雅歌投壺之意恐非所宜此自正論然太鹵莽直是磨牛吾亦爲汗顔哩大抵做人總要懂點道理有個器量難道武夫不吃飯麽至俊深服其論輾轉之間便是夏五忽然得了李夫人兇信自是哀痛嗣後又知癡珠赴召玉樓秋痕身殉更添一香傷感接著荷生差弁也到謖如因作一緘另委幹員交給千金偕並州差弁同去東越替癡珠贍家並接癡珠長男蓉哥北來搬取靈輀這蓉哥現年十七歲早已入學學名寶樹字小珠一表人才英氣勃勃卻不像癡珠有那孤癖下文另表當下死友之哀才減新亭之淚重揮卻是仲池到了說起四眼狗窮兇極惡謖如道這綽號很熟我好像先前見過這人仲池道見說他是並州什麽院裏掌班謖如恍然道是是我見過這人咳這奴才也要作賊麽當下就答應仲池替他出兵不一日恰好得報是擢了淮北提督謖如上折謝恩就請將所部肅清淮甸所有軍餉即由寶山屯田轉運無事另籌將該鎮印務懇恩交給奏加三品銜危至俊署理以資熟手朝議就也依了於是謖如挑選精兵三千由海溯淮請仲池督率先行自挈一千人由陸路隨後進發再說狗頭踞了樅陽就住肇受的提督府立定章程每日要排門錢每月要捐大戶排門錢怎樣呢每五百家立個旅帥每日排門輸錢二十二文以二文爲旅帥食俸以二十文爲兵餉捐大戶呢有田宅及鋪面者是爲大戶每月按戶捐錢十千文以二千爲監軍司馬等食俸以八千爲兵餉又有那五裏關三裏船之稅又有那派工匠輪婦女之圖又有那斬墓木放火堆捉船戶打先鋒之令真是一網打盡不放分毫不上一月將淮北千里掃蕩個渺無人煙謖如此來是要救民水火不想無民可救只有賊可殺哩當下謖如自寶山輕齎入東壩克復了巢縣合肥探報狗頭帶馬隊三千步賊三十萬距于壽州謖如想道壽春爲古重鎮爭淮者守此則得淮並可得江不想狗頭竟有此才略又想道我兵才有一千賊如聚蟻我兵就一個打得百個也敵不過而且馬隊又有許多怎好呢現在鶴仙又援南昌去了這日到了芍坡離壽州不上三十裏才有兩下鍾傳令將餉銀盡數排列傳齊營官哨長歎口氣道咳咱們深入賊地退沒有路只有散吧這餉銀無所用之你們分取做個盤川能夠有命回到寶山清明除夕燒張紙錢也不枉咱們兩年相處一面說一面號啕大哭起來這營官哨長以及兵丁就也大哭一會謖如停住哭含淚說道哭也無益你們散吧大家停住哭也含淚齊聲道大家不願走死便死一塊謖如又哭起來說道何苦呢你們試想咱們只有一千賊卻三十萬又有馬隊怎抵得過叫說完又哭大家齊聲道大家要死也殺個快意死難道束手給賊殺麽謖如說道我做朝廷命官是該死的你們有點生路怎不跑哩大家說道散了死更快我們將這一千的人合作一氣並作一心或者還拚得數個不死謖如不哭歎口氣道你們果能如此我卻有個計就是今夜你們下鍋造飯飽餐一頓以二十人作一隊只望賊營燈火旺處一隊撲賊一營二十人中放火的放火殺人的殺人人自爲戰不要相顧我亦只要二十人作一隊走天明相見壽州城下大家齊聲答應這一夜是九月向盡天氣還暖卻陰得沈沈的黑數十裏並無一個鄉莊大家守著將令一隊一隊的疾走鬼火星星陰風冷冷將到壽州望著賊營燈火如一天繁星刁鬥之聲絡繹不絕萬帳接連嚴整得很一會靜了於是大家悄悄逾塹侯各隊到齊一齊拔柵而入恰恰是三更三點各營賊正在睡夢中忽覺得火焰飆起呼聲震天就如千軍萬馬排山倒海而來摸刀的不得刀摸槍的不得搶也有鑽出頭而頭已落也有伸起腳而腳已斷也有掣出刀卻殺了自己頭目點起銃卻打了自己的親兵一會火光遍野火藥發作起來更打得屍飛江外骨落河中那各隊的人轉抽身四處瞧那火焰沖霄好像風雨翳霾中電光馳驟謖如騎著那匹天馬帶二十個人自成一隊撲入中營卻是空的那馬東馳西撞不可押勒要尋人相殺不想中營的人都跟著狗頭落在城中抱婦人睡去了直到城外二十多萬人殺死燒死要死得乾淨逃去散去要去得無蹤才都上城瞧著燭天的餘焰煞尾的餘聲你道可笑不可笑呢時天要發亮曉風習習狗頭正在頓足詫異不料謖如暗處覰得真切從馬上颼的一聲響狗頭從垛上落下地來二十人搶上捉住背縛城上的賊瞪著眼指著拳竟沒一人敢開門出來搭救這各隊人撲滅中營四邊殘火見上面賊帳修整得十分華麗是未曾燒的便請謖如下騎駐紮天大亮了衆人推上狗頭謖如哈哈大笑道好好你這狗頭也配得上我來捉你傳令磔死將頭高挂城下查各隊的人只失一個傷一個卻收了無數旌旗甲仗千餘匹好馬漂屍蔽淮而下那城裏七八萬殘賊毛骨皆聳都站垛上擲落器械火藥說是願降謖如傳令開城喚爲首的人出來這數人出城見得官軍寥寥便有些翻悔謖如卻將好語安慰令他約束部衆安靜住在城中這數人諾諾連聲進城去了謖如這日就在城外歇息吩咐營官輪流而睡是夕天也陰沈沈的定更後密傳營官八百人分作四面埋伏自騎上馬帶上二百人轉向城根樹林中而去到得三更多天城裏四門洞開每門准有萬餘人蜂擁而出謖如伺賊衆走遠了便騎上馬從城缺處一躍而上二百人也跟上來卻冷靜之至只有守門數人守垛數人半在睡夢中吃了二百人的快刀這四五萬出城的賊鼓躁踏入營中知是走了大驚失色正欲轉身忽聽得四面黑暗中高呼殺賊城賊自恃人多也不懼怕便狠狠的四面兜圍不想這四面的人都是近不得身的圍得這一面這一面人殺條血路圍得那一面那一面人又殺條血路圍得幾圍城賊見自己的人死傷大半便發一聲喊向城走了這裏的人就也不追那賊遠遠望見城上燈火輝煌心裏大慌到得城下遙望燈火中坐的是個謖如這一驚腳也軟了便都跪下萬口同聲道小人該死小人該死謖如傳令教他自殺那起先爲首的數人及賊中頭目仍准入城大家一齊動手各殺頭目及那爲首數人天也明瞭謖如就駐紮壽州挑選降賊精壯者二千人每百人各以親兵一人管帶挑著狗頭的首級四下招撫一路風聲傳播群賊破膽走者走降者降到得仲池水師駛到皖江早一律肅清謖如卻歸功仲池複任淮北節度謝小林便擢了淮南節度此時劍秋小岑已複楚北聞信喜道水道大綱江淮河漢爲最要以正陽爲淮水中流砥柱壽州又正陽之屏藩皖不肅清我能高枕麽臥榻之旁不容鼾睡今鼾睡是個謖如實在得力想荷生見我們有此展布定恨癡珠不能眼見呢卻說荷生守護帥印辦理善後事宜小住太原探偵紅卿父母俱亡就差人接來將那竹塢收拾與紅卿居住紅卿不特與采秋意泯尹邢就與瑤華也情如鶼鰈此時紅豆配了青萍仍隨侍采秋左右到了次年己未正月疏請凱撤南邊軍餉統歸曹節度調度奉旨俞允就於二月初進京采秋紅卿送至城外春雪撲衣長亭賦別荷生與約面聖後辭官歸隱連會試也不願應不想至京召見七次擢用京卿荷生表辭明相見面皇上根究韓彜辭官緣故明相只得對以伊系舉人底子會試在即見獵心喜因此不願就官皇上面諭著令人場十名內進呈卷子自然有了韓彜到了殿試大家意中都以第一人相待荷生只是微笑此時明相充了讀卷官首閱韓彜的卷書法是好不用說了奈汩汩萬言指陳時事全不合應制體裁如何進呈只得擱起無如聖眷隆重傳旨索取竟破格列在一甲第三探花及第這也是荷生意想不到之事接著津門逆倭凶悖重臣賜帛詔各道勤王荷生引見後特旨召問剿撫機宜荷生對以剿然後撫允合聖意次日奉旨韓彜著以兵科給事中賞加建威將軍職銜帶領帥印上方劍馳往津門相機進剿倭寇兵馬錢糧悉憑調用各道援師悉聽節制欽此旨下荷生陛見奏調並州太原鎮總兵顔超雁門鎮總兵林勇各率所部從征又奏保大同秀才洪海懇給五品銜挂先鋒印皇上俞允啓節駐紮保定傳令各道援師固壘大小直沽不准輕動不一月紫滄以子弟兵二千人報到舊幕愛山翊甫雨農也來了隨後卓然果齋各率所部四千人遵檄抵津遂擇日祭旗連營海口誘賊上岸三戰三捷沈了火輪船二十七座擒了倭鬼萬有餘人荷生傳令各營倭鬼悉數縱回只留倭目數人押送保定看守以侯勘問這是本年秋間事荷生賞了黃綾馬褂顔林二將加了提督銜紫滄擢了遊擊文案愛山等各得了五品銜就是青萍也得了守備到了次年庚申秋逆倭又自粵東駛船百餘艘遊弋海口欲謀報復卻不敢上岸荷生複行申討賊正轟炮忽倒了炮手三人執旗大頭目一人你道爲何呢原來卓然百步射果齋連珠箭都展出神技來以此賊不敢戰而去逾年辛酉欽天監奏日月合璧五星連珠鳳翔節度奏鳳鳴歧山豫河監督奏河清三日東越節度奏田粟兩歧於是逆倭遣人齎書津門說是講和荷生笑向卓然等道這兩字卻要一爭不該說是講和便將原書擲還不閱轉瞬之間又是秋風八月了倭目自粵東以一舶齎了無數珍奇寶玩分致津門將領荷生又笑向卓然等道我們零雨三年就是爲此賄囑麽傳令倭目謁見此時各道援師早撤防了顔林二將部下各留千人半年更換一班就是紫滄子弟兵也只是踐更而已當下顔林二將戎服整隊轅門紫滄挂刀領子弟兵排列帳下升炮三聲青萍捧上方劍服侍荷生升帳傳呼倭目進見荷生笑吟吟的道我們不是那先前薊門節度粵東節度你國若說講和這兩字我們是不依呢若說悔罪投誠籲求招撫我們便爲轉奏再看聖意如何你不想中國三十年兵燹是那個開端前前後後糟蹋幾許生靈你還裝聾做啞麽倭目俯伏當面汗流浹體說道以前曲直我也不敢深辯事到如今就是遵元帥教訓悔罪投誠籲求招撫吧荷生正色道這八字不是我教你說呢要你國王有個求撫降表說了才算我是論道理不准你們說個講和兩字哩倭目將手抹了額汗說道那要我回國才辦得來只要耽擱元帥班師日子呢荷生笑道皇上不惜億萬萬錢糧爲百姓除害我們怎敢惜些辛苦你總要取得國王降表這事才得了結我們也才敢替你奏聞倭目只得答應下來荷生便於帳前排一席宴宴了倭目不兩月倭目跟個國師費事來齎表而來荷生奏聞奉旨准了一面班師一面檄卓然齎詔宣諭香山定盟通市這卓然奉檄便單刀登舟飄然航海而東到了港口天待黑了卓然橫刀危坐喚費事來進見取出宣諭儀注通市條約掀髯說道我這來是個詔使你們要跪接呢怎的進港不見一人費事來不敢答應卓然就將儀注條約兩個冊子付給費事來道你們瞧去又目注大刀說道差我一節我饒得你我這刀是不饒人呢費事來唯唯而出看官聽說這倭夷遠隔重洋國王是個女主先前嗣位年紀尚輕聽信喜事的人鬧了二十餘年所費不貲漸漸追悔注此處刪除字編者就深怪從前倭目不是都貶黜了這番來中國的頭目是新換的費事來是女主胞叔老成練達上表之先已將廣州城池退出只是向來倭目輕視中國官吏費事來不敢侮慢荷生卻想挫辱卓然一番以折粵東官吏後來之氣當下給卓然搶白數語知他也是難惹的便將儀注條約恪遵不敢駁回一字次日築起高壇率香山辦事大小倭目都到港口挂刀跪接迎入館舍一日三宴次日黎明壇上排列香案贊唱詔使升壇倭目等俯伏壇下只聽宣讀雲奉天承運皇帝詔曰天地生成溫肅並行之謂道皇天敷化神武不殺之謂功咨爾倭人遠來海島以貿遷爲絕伎以貨殖爲資生市舶雖入其征理藩未登其贐乃躪東南遂窺西北庇我劇盜辱我疆臣爾詐爾虞如鬼如蜮梗兩朝之文化勞九伐之天威夷漢相安則撤孔明之旅華離不正則屯充國之田張弛異宜德刑並用亦以事機有待夷性難馴故也今天誘其衷地藏其熱兩甄皆敗一舶來歸聯早識此虜于目中姑置遠方于度外風雲何定有天命者任自爲雷雨之屯建非常者民所懼在諸臣以爲獸將入檻雖搖尾而法無可憐在朕以爲鳥已銜環既投懷而情皆可諒止戈爲武窮寇勿追罷符竹之專征准甘松之互市廷臣集議欽定頒行願吐穀之率循聽舌人之臚列一准以江南上海浙江舟山福建閩安鎮廈門廣東濠鏡爲倭船停泊埠頭一倭船進口由封疆大吏派員驗明有無夾帶禁物如有攜帶一經察出貨半沒官半獎查驗之員人即照例懲辦一倭船出口由封疆大吏派員驗明有無夾帶紋銀如有攜帶一經察出銀半沒官半獎查驗之員人即照例懲辦一天主教雖勸人爲善而漢人自有聖教不准引誘傳習如其有之經地方查出授受均行正法一教堂准立倭館以內不准另建別處有犯者照例懲辦一稅務統歸於各道監督倭目不准干預有犯者以不應論一茶葉大黃准以洋貨洋錢交易惟不准偷漏如有偷漏貨半沒官半獎查驗之員原船著回本國不准貿易一各埠頭辦事頭目謁見官吏悉照部頒儀注不准分庭抗禮有犯者以不應論一倭船不准攜帶婦女入口亦不准攜帶中國男婦出口有犯者照例懲辦一倭館不准雇倩漢人辦事及一切傭工有犯者以不應論凡茲新例究屬舊章於乎我中原百産豐盈並不借資夷貨爾各國重洋服賈亦當自惜身家王者之兵原不得已而後用下民之孽皆由自作而非天所期盟府書存長質諸皇天後土從此南人不反庶化爲孝子順孫人各有心朕言不再欽此讀畢贊唱謝恩費事來等九叩贊唱牽牲執事牽牲而入贊唱宰牲執事趨就牲前贊唱捧盆執事捧金盆人就牲前取血注盆贊唱插血定盟於是倭目一人接受金盆隨費事來登壇北面贊唱詔使南面蒞盟倭目將金盆向詔使跪下詔使蘸以拇指轉向費事來蘸過興退贊唱跪三叩首於是費事來拜於壇上大小倭目拜於壇下詔吏南面答拜贊唱禮畢又高宴一次費事來率各倭目陪宴從此倭人守法且從各道節度收復海口城池有沒于王事者正是氣爲義激暴以理馴樞機在我禍福惟人欲知後事如何且聽下回分解第四十八回桃葉渡蕭三娘排陣雨花臺朱九妹顯靈話說皖鄂肅清鶴仙又解了建昌之圍區區金陵四面兜圍便當掃穴犁庭才是何以轉盼三年依然負呢看官須知天下事理有一定數不可知就是鼠輩也有個數不該盡時候當下謖如淮北功成便乘勝擒了姚薈琳掃除北稔零星殘股竄入河南又合爲南稔北擾燕齊西蹂秦晉接著滇南回部鈎連關隴江東敗寇窺伺黔巫朝廷因此頒給謖如威遠將軍關防經略西北以鶴仙爲太原提督副之金陵這邊是令劍秋小岑仲池小林匹節度會合江左右提督相機圍剿劍秋小岑原是銳意洗甲長江無奈金陵氣數未盡卻鑽出五個妖婦來五妖以蕭三娘爲首是個道裝自稱公主據說系蕭梁湘東王第三女江陵破後入山修道迄今千有餘年卻收了兩個二形的妖尼帶了兩個同面的妖婢出來輔佐員逆三娘兩鬢垂肩好像畫的麻姑一般兩個妖尼約有二十來歲的人他自說是百余歲其實就是那年癡珠生日弄把戲的兩個女尼一個名喚月印一個名喚雲棲一個上半月成男下半月成女一個上半月成女下半月成男以此兩個自爲夫婦兩個妖婢如花似玉同一面龐一個喚做靈簫一個喚做靈素都是古服勁裝劍秋小岑起先道是妖婦有些邪術包起如心出隊令他帶了噴筒將污穢先行噴潑然後交兵不想悍賊在後妖婦當先只喝聲住我軍便如上塑木雕連眼睛都不動了悍賊擁出一個個捆去了再用水師攻剿這妖婦率妖尼等挺立水面將拂子一揮那戰艦都倒轉了炮火一一自打起來水陸兩陣折了無數兵馬又失了包起如心兩個猛將劍秋小岑氣得發昏自此膽寒不敢出隊只遍訪異才想要破他的法倏忽逾年此時荷生正在津門申討倭逆來往書劄輒笑劍秋小岑正不勝邪唾手大功竟被一個婦人弄殺這妖婦得志便遣靈簫領兵佐助榮合陷了兩浙僞封越王靈素領兵佐助榮法陷了三吳僞封吳王四節度兩提督連營三年實是束手無策卻說采秋自荷生太原凱撤以後迎了藉齋夫婦住了愉園以便來往到了紫滄從征海口便將紅卿瑤華都搬入搴雲樓第一層居住采秋自住第二層草蟲雄雉時與二美酬唱郵寄津門奈一別三年真有楊柳樓頭悔覓封侯之恨忽一日老蒼頭賈忠回說外有老道姑帶一美貌女子說是要見二位夫人適值紅卿瘧疾采秋與瑤華只得接入見那道姑年紀約有六十多歲眉宇間道氣盎然跟個女子年紀不上二十生得嫵媚之中棱棱露爽手捧如意一枝當下道姑合掌向著采秋道這是韓家三夫人麽采秋想道他怎的叫我三夫人呢還他一福這道姑瞧著瑤華也合掌道這是洪家繼夫人麽瑤華也還一福采秋便問道煉師何來道姑笑道貧道雲遊的人腳跟無定是從來處來一面說一面招那女子將如意接過教向二人稽首說道這妮子名喚春纖卻有些來曆是韋癡珠的人聽他說吧於是二人還了春纖的拜延道姑上座就與春纖分坐細問顛末春纖便將答應謖如的話述了一遍又將寶山海邊遇見謖如也述與二人聽就說道我們從那一天起便來此地就住在東門外玉華宮三年哩二人起敬一番吩咐紅豆傳話廚房備下齋筵春纖笑道我師父是不吃煙火久了我也不吃酒菜逢著什麽吃些什麽便可數日瑤華道這真省事所以秦皇漢武都要求仙慧如笑道那是他呆想他們富貴中人要像我們服氣做什麽我與兩位說個真話生死者人之常事就像那草木春榮秋落一般成仙的屍解成佛的坐化總是一死仙佛不死何不日日騎鶴日日跨獅以與你們相見呢大抵人中有仙有佛也似草中有個萬年青木中有個萬年松草木是得氣之厚仙佛是得氣之精這氣原萬古不壞的但那氣要培養得十分願力充足非必長生才算仙佛你們富貴中人能做了孝子忠臣義夫節婦便也成了正果便也做了仙佛你不看癡珠一生拂鬱他卻有他的精氣團結不是做了青心島一個地仙麽毋論癡珠就是長安的娟娘你們這裏秋心院的秋痕不也在那青心島麽我這來卻也是宏個願力你們是曉得金陵妖婦法術利害抗拒大兵我把春纖送來一則與他一個正果一則助你們平妖滅賊好享榮華說畢將那一枝如意遞給采秋道這算是春纖贄敬吧采秋接過手來看是個木的卻光潤如紅玉一般這道姑又向袖中檢出錦冊遞給瑤華道這算是貧道傳授你的瑤華接過手看錦冊中間篆書縹緲宮秘五字展開與采秋同看見是雲螭五色綾寫蝌鬥篆文幸是旁有真書釋文才待細閱忽聽春纖笑道師父走了二人轉身只見輕雲冉冉擁著老道姑已在半天向二人合掌道後會有期二人不知不覺的自會稽首下去春纖攙起二人說道師父爲留著我滯此地今遨遊海上去了自此春纖就也住在搴雲樓指教采秋瑤華篆書中符練習起來紅卿是個多病的人不善煩勞略略解得就丟開了采秋高興募了大同健婦三千人春纖接了掌珠寶書一同傳授符篆兵法把軒軒草堂做個演武堂把小蓬瀛做個昆明池演習水戰把采秋暑個縹緲宮真妃瑤華等皆署個侍史此時捐例大開錢同秀做了太原守胡考做了陽曲縣竟把柳巷這些事稟到節度衙門說是潛謀不軌曹節度查明大笑密折陳請賞給杜夢仙女提督職銜柳春纖薛瑤華女總兵職銜率所募健婦前往金陵平賊奉旨准了恰好荷生正自津門班師奉旨洪海記名提督顔超補授江北提督林勇補授江南提督韓彜著予太子少傅銜實授建威將軍賞假半年仍帶帥印上方劍督率顔超林勇洪海女提督杜夢仙等經略東南此旨一下那太原守陽曲縣俱是參革不待言了這裏荷生采秋紅卿英雄氣概兒女情腸靡相見以蓬飛亦有敦之瓜苦我員聊樂既覯則降就是紫滄瑤華青萍紅豆也是久旱逢甘融融泄泄做書的人也只得敘個大概而已此時卓然見寶書精熟符兵法就認他做個幹女掌珠就也拜果齋做個幹父到了出師這一日大家意氣飛揚只采秋遠別父母依依難釋紅卿重離夫婿踽踽旋歸轉覺興會之中也成寂寞再說妖婦蕭三娘魅了包起如心兩人迷卻真性夜夜在他帳中輪班直宿不上三個月便似枯柴就也放回累得柳青胭脂百計延醫還是逢個國手醫了一年才把兩人還個舊樣只可憐那兩浙佳子弟三吳美少年給這妖婦害了無數還可笑者所有擄去大小官吏他竟不殺只教他經管馬桶虎子及一切廁籌等事那淮南北江左右官軍被那妖婦駕雲踏水叫住就住放行就行恰似線抽傀儡一般你道可笑不可笑呢這年癸亥妖婦又將戰船千餘艘就桃葉渡結個小寨名爲虛牝