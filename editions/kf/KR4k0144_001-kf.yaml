厥性好罵你又挖苦起人來癡珠道我講的是畫眉何曾有心罵人秋痕道你只講畫眉把山字全丟了癡珠道是極我忘了紫滄道青出於藍詩祖宗今天給人批駁得啞口無言了大家一笑於是大家俱發拳轟飲晚夕方散到得重陽前一日秋痕又訂了癡珠荷生采秋三人小飲鬮題分韻每人七律一首荷生拈個菊燈詩是萬菊分行炫眼黃燈燃猶自占秋光金英冉冉添佳色寒穗亭亭散古芳老圃風微天不夜疏籬月落焰生香內人分得隨花賞星斗參橫樂未央癡珠拈個菊酒詩是漫向雲英乞玉漿一樽菊酒進重陽清原本性休嫌淡味到無言自有香老圃邀來千里月芳樽釀出一籬霜白衣花外提壺勸道是延年益壽方采秋拈個菊糕詩是鎮日東籬采菊忙爲修韻事到重陽團成粉餌三分白占得清秋一味涼遮莫餐英同屈子幾回題字笑劉郎家家筐榼相投遺粲舌花開許細嘗秋痕拈個菊枕詩是闌珊菊圃謝幽芳收拾拼將貯錦囊一種芬留黃落後十分秋占黑甜鄉遊仙有夢宜高士連理多情戀晚香點點紅棋紋不滅夜闌和月上藜床後來癡珠又做了一篇菊花賦賦雲昨夜霜華釀小寒扶持秋色上欄幹卷簾人比黃花瘦腸斷西風李易安昔偕帝女遊今伴先生隱梅瓣懶上妝荷香留剩粉四壁蟲吟一枕多連天雁語重陽近盈盈兮無賴落落兮有神涼月沈閣傲霜絕塵高還似我淡如其人玉宇瓊樓舊約青娥素女前身和雨和煙不衫不履碧玉樓前仙韶院裏穩重同山輕柔比水餐秀茹香迷金醉紙缸凝夜其不眠影扶痕而欲起清樽滿杯酌插得滿頭多滿頭勢欲落落矣奈君何長笛一聲銀漢潔可憐往事休重說年年歲歲此花開此花開時人淒絕其謝秋心院送菊詩雲柳門竹巷鬢飛鴉翠袖天寒倚暮霞不去牽蘿補茅屋攜鋤牆角種黃花選得黃花十種鮮移來茶臼筆床邊遙知天女伶多病散作維摩一榻禪深黃淺白鬥輕盈別種分栽雅淡名怪底東籬陶處士一篇爲汝賦閑情傲霜原不事鉛華更與卿卿晚節誇不學四娘家萬朵秋來吹折滿溪花因將兩塊青花石一鐫賦一鐫詩嵌在月亮門左側重陽日荷生是明經略請在彤雲閣登高去了卻說李夫人自見秋痕之後十分歡喜是日重陽秋痕也送了李夫人十盆菊李夫人便買一大簍螃蟹請癡珠秋痕小飲夫人和秋痕對局下棋癡珠看天色尚早獨向呂仙閣而來見萬井炊煙遊人如蟻傷孤客之飄零念佳時之難再因吟杜甫九日詩中弟妹蕭條各何往干戈衰謝兩相催之句不勝惘然接著又吟道天下尚未甯健兒勝腐儒飄飄風塵際何地置老夫又吟道將帥蒙恩澤兵戈有歲年至今勞聖主何以報皇天獨吟無賴靠晚方到縣前街平日愛吃蠟蟹今日肚子正饑吃了四五樣菜即上螃蟹又未免多吃些接著又是一盤油媟的菊花葉癡珠混吃了這一陣肚子覺得不好起來向秋痕要個豆蔻吃下也不見好李夫人備下薄荷露茶疾珠喝些不上二更便偕秋痕坐車回來秋心院這一夜秋痕不脫衣服殷勤扶侍不想癡珠大瀉兩次病就好了秋痕次日卻大病起來始只寒熱往來頭暈不起自九月起到了十月竟然臉色漸黃肌膚日減愈病癒恨每向癡珠流淚道孽由自作悔無可追癡珠百凡勸解總不懂得秋痕是何苦楚只覺李家禮貌都不似從前爲著秋痕臥病就也不說只午間來與秋痕清談二更天便走了一日飯後西風片片吹雨敲窗紙但聽槐葉聲在庭砌下如千斛蟹湯湔沸愁懷旅緒一往而深忽李夫人差人送來謖如信件並有一封系致荷生的信中備述採石磯勝仗及兩次用兵機謀癡珠喜道謖如是個將材只是這樣大捷怎的邸抄還不見哩瞧完了信便隨手作一柬帖將謖如致荷生的一份信件叫穆升送去大營一會穆升回來呈上荷生回柬並西安的信一大封癡珠將荷生回柬拆開後就將漱玉總封拆開內是秦中諸友覆書隨將漱玉的緘十余頁先行展閱道癡珠征君執事夏初行旆歸自成都適弟有城南之役讀留示手劄並詩知望雲在念垂翼於飛良用憮然中秋既望從留世兄處得七月初二來書甫悉玉體違和留滯途次南邊兵燹誰實爲之而令吾兄故里爲墟侍姬抗節所幸陔蘭池草以及珍珠掌珠均獲完善則遠人當亦強自慰藉人生非金石愁城豈長生之國哉總要吃力保此身在其餘則有天焉萬庶常賜書深怪吾兄龍性難馴鋒芒太露又以人才難得囑弟爲作曹邱嗟夫庶常失辭矣昔宋歐陽永叔月言醫者之於人必推其病之所自來而治其受病之處病之中人乘乎氣虛而入焉則善醫者不攻其疾而務養其氣氣實則病去此自然之效也今天下苶然無複人氣然則治其受患之處而與之更始奈何曰培元氣而已自勢利中于人心士大夫不知廉恥爲何事以迎合爲才能以恬嬉爲安靜以貪暴濟其傾邪之欲以賄賂固其攘奪之謀坐此官橫而民無所訴民怨而上不獲聞俾陰鷙險狠之徒得以煽惑愚氓揭竿而起嗚呼四郊多壘此士之辱也宜何如各出心肝以湔國恥而人心叵測其鈍者驚疑狂顧望風如鳥獸散其黠者方且借兵餉開銷飽充囊橐假軍功虛報冒濫梯榮而天下之氣靡然澌滅嗚呼亦知天下之氣則何以靡然澌滅哉古之君子學足於己足不出戶中外重之是故道重勢輕囂囂然以匹夫之卑與君相抗降及後世士各以所長取合當世所求不過衣食而已爲之上者習知士之可以類致也知名之可以牢籠天下利之可以奔走天下也於是徐示以抑揚陰用其予奪要使天下知吾意之所向而止不取其定命之宏猷而徒取其浮華之文藻不勖以立身之大節而但勖以僥倖之浮名其幸而得者率皆奔競之徒迎合意旨無有齟齬恬嬉遷就無事激昂是妾婦之道也是臧獲之才也嗟夫士君子服習孔孟出處進退其關係世道輕重何如也而乃以議妾婦者議之馭臧獲者馭之則宜其所得者多寡廉鮮恥阿諛順意大半皆妾婦臧獲之流而魁梧磊落之士倔強不少挫者遂困于橫鬱而苦於奮厲之無門風氣安得不日靡人心安得不思亂而其禍寧有瘳與夫天下如此其滔滔也有人焉蹇蹇諤諤不隨俗相俯仰欲爲國家延此垂盡之氣此何等胸次何等魄力國手者出就此一線厚以養之血脈流通膚革充盈蹶然興矣庶常翔步雲衢習見人集於菀而吾兄獨集于枯遂竊非之此自篤念故人之意第憶先太傅嘗以吾兄及庶常爲吾家旗鼓豈料其出見紛華而悅以四十餘歲老庶常有何勘不破而亦人雲亦雲如此天下事尚可問乎尤可笑者囑弟爲作曹邱弟苔守邃園足迹不出戶外與當世赫赫奕奕操魁柄者不通音問何從說項以從者學貫古今庶常從朝官後不修孔融之表而致曹操之書豈將以弟爲黃祖耶軍興以來白面書生心不辨菽麥目不識之無依草附木雲蒸龍變弟雖不肖猶羞稱之癡人說夢迷離惝恍其有劉道民之際遇乎究竟所處不過記室參軍天下之亂亟矣與其依人作計成不歸功敗且至於歸咎何如攜妓東山素爲名士實亦不愧名臣也西北苦寒太行尤甚山中人有立志者則肌膚實而心地堅樸視輕佻便利者不啻霄壤他日出而醫國此皆籠中物也願君留意焉若航海南歸此大失策東越僻在海隅與中原消息隔不相聞縱有三顧之玄德公其如草廬遠何也若爲定省計則棣鄂衆多若爲旨甘計則田園已蕪丈夫子盱衡當世事努力道義以報君親窮達命也娟娘大有仙意聞諸道路鴻飛冥冥南朝普陀西禮峨眉或者五台亦將有東來紫氣乎是未可知弟頑鈍如恒內人於舊臘得一男近已牙牙學語晚景只此差堪告慰時事方艱身家多故保此身在國家之元氣雖斷未斷乾坤之正氣雖亡不亡言不盡意而詞已蕪伏維垂鑒閱畢說道良友多情爲我負氣只是我呢就歎口氣將書放下複將衆人的信一一看過撂在一邊再將漱玉的書沈吟一會初寒天氣急景催人已是晚夕就不去秋心院了豈料晝夜院裏竟鬧起一場大風波來正是賞菊持螯秋光正好屬國書來觸起煩惱欲知後事如何且聽下回分解第二十四回三生冤孽情海生波九死癡魂寒宵割臂話說狗頭起先系與秋痕兄妹稱呼後來入了教坊狗頭便充個班長在李裁縫意思原想將秋痕做個媳婦牛氏卻是不依一爲狗頭兇惡再爲不是自己養的兒子三爲秋痕系自己拐來要想秋痕身上靠一輩子只自己上了煙癮一天躺在炕上不能管束狗頭得住兼之秋痕挂念癡珠兩日不來便叫狗頭前往探問自然要假些詞色又有李裁縫主他的膽這狗頭便時時想著親近秋痕無奈秋痕瞧出他父子意思步步留心狗頭實在無縫可鑽愛極生恨恨極成妒便向牛氏挑唆起癡珠許多不是來以此秋痕背地裏瑣瑣屑屑受了無數縷聒這也罷了十四日荷生小岑劍秋都在愉園小飲靠晚便來秋心院坐了一會癡珠不來各自散了秋痕陡覺頭暈荷生去後和衣睡倒一會醒來喚跛腳收拾上床卻忘了月亮門未去查點睡至三更後覺得有人推著床橫頭假門那跛兒也不曉那裏去了便坐起火聲喊叫跛腳不應那人早進來了卻是狗頭一口吹滅了燈也不言語就摟抱起來秋痕急氣攻心說不出話只喊一聲怎的將口向狗頭膊上盡力的咬狗頭一痛將手擰著秋痕面頰秋痕死不肯放兩人便從床上直滾下地來狗頭將手扼住秋痕咽喉說道償你命吧跛腳見不成事大哭起來李裁縫沈睡牛氏從夢中驚醒說道外面什麽事一面說一面推醒李裁縫李裁縫就也驚醒說道怎的半夜三更和丫鬟鬧急披衣服跳下床來尋個亮開了房門取條馬鞭大聲嚷入見秋痕壓在狗頭身上便罵道還不放手呼呼的向秋痕身上抽了幾鞭牛氏披著衣服一路趕來說道什麽事狗頭早放了手把秋痕推翻自行爬起牛氏已到李裁縫扭住狗頭嚷道這是怎說狗頭將頭向秋痕胸膛撞將下去嚷道我不要命了牛氏見這光景驚愕之至接著嚷道你不要命我女兒是要命呢李裁縫死命的拉住狗頭兩人就滾在東窗下將窗前半桌上玉花瓶碰跌下來打得粉碎牛氏忙將蠟臺瞧著秋痕見身穿小衫褲仰面躺在地下色如金紙兩目緊閉牛氏便嚎啕的哭起來將頭撞著李裁縫也在地下亂滾聲聲只叫他償命跛腳和那小丫鬟呆呆的站在床前看只有打戰廚房中兩個打雜和那看門的都起來打探不知何事見一屋鼎沸秋痕氣閉便說道先瞧著姑娘再說吧一句話提醒牛氏便坐在秋痕身邊向打雜們哭道你看打成這個模樣還會活麽狗頭見牛氏和李裁縫拚命心上也有點怕早乘著空跑開了這裏牛氏摸著秋痕一聲聲的叫打雜們從外頭沖碗湯遞給牛氏一面叫一面把湯灌下半晌秋痕雙蛾顰蹙皓齒微呈回轉氣來又一會睜開眼瞧大家一瞧又合著眼淌出淚來牛氏哭道你身上痛麽秋痕不答淚如湧泉此時李裁縫安頓了狗頭就也進來牛氏瞧見指天畫地呵詬萬端李裁縫不敢出氣幫著兩個丫鬟將秋痕扶上床沿秋痕到得床沿便自行向裏躺下嚶嚶啜泣打雜們退出牛氏檢起地下的鞭向李裁縫身上狠狠的鞭了一下李裁縫縮著頭搶個路走了牛氏喚過丫鬟也一人一鞭說道快招兩個丫鬟遍身發抖說道是是爺爺叫叫我不要關這這月亮門姑娘有有叫喊不不准准牛氏不待說完揚起鞭跑出大罵道老狗頭老娘今番和你算帳撒開手吧李裁縫父子躲入廚房將南廊小門拴得緊緊由牛氏大喊大罵兩人只不則聲只可憐那門板無緣無故受了無數馬鞭且說癡珠早飯後正吩咐套車跟班忽報留大老爺來了原來子善數訪癡珠都不相值今日偶到秋心院不想牛氏正和李裁縫父子理論見子善來了便奔出投訴子善也覺氣憤坐定秋痕知道了喚跛腳延入含淚說道求你告知癡珠只這一句便掩面