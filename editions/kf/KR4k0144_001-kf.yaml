就在鍾山營中宿歇一夕鍾山營中天色靠晚采秋來了荷生正攜入帳中春纖提劍突入采秋就要閃出春纖舉劍便砍荷生驚謊無措急行攔住采秋竟變個白的雌兔竄出帳外春纖一劍擲去兔遂兩斷弄得荷生迷迷惑惑說道怎的怎的春纖笑道你道是采姊姊麽這便是那妖婢靈素我再叫你去看一枝簫便挈著荷生駕起雲來不轉瞬已到聚寶門遙見瑤華掌珠寶書都擁著采秋在帳前瞧個似獸非獸鮮血淋漓的東西采秋一見荷生便說道不是春妹妹我們又落了妖人的套春纖笑道采姊姊你要仔細這也是個假的采秋笑道是你帶來我只問你春纖笑道便我也是個山魈指著地下東西道再幾日你看我不就是這樣去麽采秋笑道你去那裏春纖道我從去處去荷生見他們說話愈不明白便向采秋道到底怎說春纖笑道這何難猜你殺了采秋采秋就也殺了你采秋向著荷生道你不要聽他搗鬼我兩人的命都是他殺哩瑤華也笑追這樣看來你兩個竟是個魂魄說得采秋春纖和大家都笑了荷生愈急起來紅豆只得指著地下東西從實告道這是山魈就是金陵的妖婢靈簫他幻了老爺的形來魅夫人柳姑娘望見把他殺了柳姑娘曉得他還有一個叫什麽靈素是去老爺營中便駕雲尋老爺來想是也殺了便向春纖問道柳姑娘到底也是這個模樣不是春纖笑道那個卻俊瑤華因笑道他假你夫人怎的不俊荷生將靴尖向地下的山魈踢兩踢道就這般糟蹋我教我鐵室鐵城都防備不來吩咐擡去剝皮號令起來大家答應隨叫人到鍾山營中將那只白兔也剝皮號令起來因向采秋大家說道這才了妖婦一宗公案如今乾淨真個多謝女鎮軍一面說一面攜著采秋就拜慌得春纖還禮不叠說道折殺了這夜又在采秋帳中開赴高宴延春纖高坐瑤華掌珠寶書分陪荷生領著采秋斟了三鍾酒都要春纖喝幹又傳一班女戲伺候自己卻歸鍾山去了這裏點唱魯智深出家唱那寄生草一支春纖喝了一鍾酒便微唱道俺赤條條來去無牽挂一會點唱嫦娥奔月春纖笑向掌珠寶書道碧海青天夜夜心自古女仙未能免此蘭香來無定處綠華去未移時想你二人禪絮沾泥當不復悔偷靈藥掌珠寶書微微一笑瑤華笑道這也未必謝自然既要還家曇陽子更多疑竇哩采秋也笑道八駿往來穆滿七夕共坐劉徹西王母不是個女仙領袖麽以我看來姮娥還是天上共薑瑤華道姮娥也算不得共薑他霓裳羽衣怎樣也接了唐明皇采秋笑道這般看來天上神仙也和我們一樣呢大家一笑春纖向瑤華說道你說曇陽子曇陽子原有一真一假去年並州不有個假秋痕麽瑤華道這是他同鄉姓顧的弄出來笑話你想秋痕那樣一個脾氣什麽人假得偏這姓顧的要借重他大名射利沒有三天就給人道破了哄傳出來倒害癡珠的跟人喚做什麽禿頭寄園的佃客叫做什麽戇太歲淘氣幾天這假秋痕並州的飯就吃不上這會不曉得跑到那裏采秋笑道不就在這裏我要認是秋痕便是秋痕荷生要認是癡珠便是癡珠你們不見今天山魈也要假荷生白兔也要假采秋麽說得大家大笑起來就也散席了卻說謖如鶴仙經略南北鶴仙是首辦南稔繼辦蜀寇馬步齊進他在蒲東又練個車戰恰好來剿南稔數月之間便已得手倒是蜀寇費力蕪蔓東西川出沒無定又踞的石寨都系豐草長林山岩疊嶂好容易掃除十股又分出一股注此處刪除字編者其餘酋長都受了約束不敢爲非作歹注此處刪除字編者竣如入關鶴仙也將蜀事告竣了就約于長安會議善後機宜這二人自我不見於今三年把前前後後公事私事說個十日還不得盡此時鶴仙系居太原提督衙署阿寶娶親了阿珍靚兒也已長大謖如只想娶個妾以爲娛老之計不想無意之中卻說起一個親事是江南葉姓的女兒避亂隨母依上胞叔遠宦長安並無兄弟年紀十八經鶴仙說合聘爲繼室入門契開蓋帕竟與李夫人面龐一毫無二已自詫異細細體認連言談舉止體態性情都覺得一模一樣就把謖如狂喜極了鶴仙自然也樂說道這番回到太原阿寶還認是他娘重生哩轉盼之間善後諸事也得手了奉旨李喬松給予宮傅銜並輕車都尉世襲遊長齡給予宮保銜並騎都尉世襲均賞假三個月仍帥所部馳往金陵會同韓彜商辦東南軍務署寶山鎮總兵危至俊督辦海隅屯田接濟西北軍餉著有成績著予提督銜補授寶山鎮總兵謖如得旨就將原部四千人委一裨將管領先赴金陵鶴仙也將原部三千人陸續遣往謖如又檄寶山營發兵三千助剿這會金陵大兵雲集水陸約有三萬多人荷生采秋督率諸軍把金陵十二門日夜輪流環攻這夜六月十五包起柳青領湖兵攻打西三門如心胭脂領淮兵攻打東三門紫滄瑤華領太原兵攻打北三門春纖掌珠寶書領健婦三千及寶山精銳二千攻打南三門十六黎明聚寶門陷了一角春纖躍入健婦踵接披發悍賊數千搶來撐拒悉放鳥槍掌珠寶書也乘空而上煙霧迷漫之中前後不能相見只聽兩邊喊殺三千健婦及寶山精銳二千逢人亂截亂殺一會賊的火藥盡了天地開朗披發賊死了無數其餘也有散的也有自我的於是各門洞開紫滄傳令不准亂殺四隊官軍招集一處直趨內城一路儘是難民長跪道邊也有男的也有女的也有老的也有少的紫滄等馳入僞王府及各僞官衙署搜捕也有吊死的也有跳井跳池死的也有吊不死跳不死給兵擒來的也有就擒跑走的也有跑走就擒的紛紛擾擾他他藉藉鬧到黃昏大家只是不見春纖掌珠寶書三人十分驚訝瑤華盡在內城派人找尋先是午刻大營委青萍入城四下裏分貼安民榜忽見春纖倒在秦淮河邊面色如生只額角有血水湧出隨後又見掌珠寶書死在一處也是額角一傷趕回報明已是天黑了荷生太息采秋垂淚道這是他們借兵屍解不然春妹妹是會駕雲的有什麽槍火炮火跑不脫呢就令青萍厚備棺斂是夕紫滄等也曉得三人陣亡瑤華連夜便奔出城看視大哭一場將屍移入就近僞署內停放紫滄大家派各路兵丁打掃街道收拾僞王府正屋次日黎明荷生采秋雙雙的按轡入城先來秦淮河看了春纖三人殯殮采秋憶起前前後後的事覺得春纖這回是專爲保護他而來就與瑤華哭得日色無光荷生大家力勸一番然後豎起大纛排隊升炮雙雙換了八人擡的涼轎萬騎先後蝶團蜂擁入內城去了後來卓然果齋見說寶書掌珠都已陣亡掀髯歎息瑤華也對人說道我一生沒有吊過眼淚五年前爲癡珠秋痕卻傷心了數次這會又爲春纖三人哭了一日一夜其實他們都是脫屣紅塵去了正是沐日浴月妖氛盡豁脫屣人間天高地闊欲知後事如何且聽下回分解第五十回一枝畫戟破越沼吳八面威風靖江鎮海話說謖如鶴仙得假三個月謖如將眷口攜到並州與阿寶們相聚一時悲喜交集不用說了次日便同鶴仙阿寶到了玉華宮李夫人靈前一哭就也到癡珠墳前灑淚一拜轉盼假滿已是六月荷生是十七進了金陵城十八謖如鶴仙也到荷生大喜把僞東府掃除與二人駐紮這二人與荷生八載分襟一朝捧袂傷秋華之宿草喜春鏡之羅花真個說不了別後心事謖如又以遲到一旬不及見春纖爲憾便往秦淮河停靈之所祭奠一番一日大家談起吳越用兵謖如道東南地勢太原的馬隊筅兵都用不著還是我寶山鎮兵及湖淮兵得力因向荷生道你的才大如海怎麽平了十年巨寇複了千里名都竟不草個露布聳人聽聞哩荷生道這算什麽巨寇此數十年中士人終日吚唔章句就是功名顯達之人也是研精歐趙書法以博聲譽濟之以脂韋之習苞苴之謀韜略經濟偶有談及群相嘩笑以爲不經吏治營規一切廢弛徒剝民脂膏侈以自奉坐此國勢如飄風人心如駭浪事且岌岌可笑當事的人尚複唯唯諾諾粉飾升平袖手作壁上觀間有名公巨卿氣魄資望卓越尋常奈處升卿之錯節才識不及學渤海之亂繩德量無聞是以大局愈爛這釜底遊魂因得多延歲月對村婆而自絮生平獲小竊而大書露布我不怕別人我只怕癡珠在那青心島會拊掌大笑哩說得謖如也笑起來荷生因說道自此以往司牧之官必能掃除一切苛政猾吏奸胥悉設個法箝制之使無舞弊慢慢的采風問俗去害馬以安馴良泯雀角鼠牙之釁絕狼吞虎噬之端不驚不擾民得寬然各盡地力學你寶山開墾的工夫與這些人課勤警惰講信修睦有教有養使天下元氣完複不枉我們勞碌這七八年才好呢謖如道這真忠言至計中興碩輔之言荷生笑道我算什麽明相國不動聲色卻出斯民於火熱水深措天下于泰山磐石韋癡珠不綰半綬卻相時度勢建策於顛沛流離碩畫老謀寄意于文章詩酒這才算個人哩謖如歎一口氣道不是你這闊大的胸襟也不肯和盤托出我們不是相國那裏能如此發揮不是癡珠那裏便有此成算只相國以人事君自然譽流竹帛績紀太常癡珠一生屈抑我們僥倖會合風雲也該特摺闡揚或請予諡或請專祠使天下後世有這個人才好荷生笑道這卻不必以柳下惠之賢而諡以一惠出自其妻以曾南豐之地望而一瓣之香競傳師道可見人世榮華舉不足爲我癡珠增重異日有心人總能發潛德之幽光底事我們闡揚轉成門戶之見你不看杜少陵歷數百年而忽諡文貞蘇東坡不得冷豬蹄而朝官至今尚爲做生日麽是非之心人皆有之不煩我們爲癡珠早計哩謖如拊掌道古人相見開口便有到心語你今日議論語語沁入我心正待說下紫滄帶個女子進來說道這女子姓傅名喚善祥是個女簿書據說洪逆就埋在這府裏空地那時入坎掘得極深甚是秘密荷生聽說傳令開了後宰門派五百名人夫前往發掘接著包起回說搜捕遣孽弗田渺無下落卻擒了著名幾個賊目於是荷生邀著謖如一同升帳問供去了再說榮合榮法部下卻有兩個僞將一名翁陽一名呂壽臣武藝也不在顔林之下榮法榮合百事糊塗卻曉得收買兩將的心以爲護衛起先靈簫靈素主持號令人人都受這妖婢磨折只有兩將他卻不敢一毫淩侮後來嬌婢聽見妖婦兵敗趕赴金陵這裏號令便歸在兩人這會一個緊守滸墅一個緊守錢塘環營三濠撐拒顔林倒也是將逢敵手此數日果齋正與闓陽約定兩邊不用炮火不用隊伍只單騎對戰輸的退兵戰了兩日不分勝負這日又是兩下酣戰都脫了鍪甲去了兵器下馬較起拳來兩邊士卒看到入神不想包起黃如心二人奉了荷生將令帶了四千湖兵前來助戰恰恰到了兩人私議將金陵賊衣悉令湖兵二千穿了如心賺個賊的令箭往賺錢塘城池包起卻趕來助戰到了賊壘擂鼓搖旗自後面逾濠撲入當下賊衆忽見營後人馬破空而來陽只得放松果齋大罵道捉狹鬼不是英雄算我上你當吧上馬走了其實這枝兵來路果齋也自茫然陽正馳回衝殺將包起的兵團團圍住城賊無數奔出說是官軍挂起金陵旗號賺開城池擒了三大王陽及賊衆心都慌了一會果齋也到與包起兩邊夾攻一枝畫戟東馳西突所向披靡力將江口以及城隍山賊營百餘座盡數踏平了陽落荒而走果齋與包起入城將擒來僞越榮合打入囚籠解往金陵其餘賊衆一起准予投降住了一日乘勝領兵殺上塘西收復嘉興去了包起如心俟著浙東西兩個節度到了就也馳來果齋早已只戟單盾冒矢複了姑蘇擒了僞吳榮法於是合兵一處會同卓然來攻滸墅關三日破了兩人用計射倒了陽壽臣忽報大將軍女提督帶健婦五百人過江現在駐紮常州包起如心就將榮合解往常州營前卓然仍紮滸墅關伺候大將軍果齋便帶兵掃蕩吳越諸郡縣殘匪看官你道荷生怎的過江呢他是富川人想借此遊歷江南一番風景不想到了揚州遙見那灌莽棲於甍棟平沙抗乎睥睨煙火無墟四望靡際與采秋低徊憑吊因說道昔日繁華鼎盛之處今皆成瓦礫場矣次日過江風靜波平也自欣然望見金焦一片邱垤赤雲崢嶸兔葵燕麥軃受驕陽因想起遭時不祥見此蕪亂回首故鄉數遭兵燹牂柯山畔家竟何如夢草池邊同聲浩歎於是浩然有歸與的意思又想道虎豹居在深山人人聞聲便自惴惴以遊五都之市販夫孺子皆得持著瓦礫譁然相逐麟出大野足折商鋤龍入魚群豫且見困而況炎炎者滅隆隆者絕高明鬼瞰自古爲然我斷不可寵利居功哩這日到了常州曉得果齋業經破越沼吳恰好榮合解到問過口供傳令磔死梟首會同金陵洪逆戮屍的首級及榮法首級傳示各道滋事地方就想道自來賊平遣散兵勇最是費手我幸馳逐七年不曾募得一勇只大同健婦三千都是有夫之婦且有室女不怕滋事此外顔林所部四千是並州額兵淮南北陸師水師湖南北精銳亦是平定後新設額兵至如謖如帶的是寶山屯兵紫滄帶的是馮姓子弟兵更無可慮最可笑者以前用兵不於各道額兵練出轉向市井中募來既糜國帑又滋弊端我如今只作個書囑謖如陸續奏撤便無甚事次日到了滸墅關接見卓然即令其撤回部兵一千留一千協同果齋搜捕餘匪於是放舟于三萬六千頃之太湖挹取其風雨波濤出沒之理趣輿轎於三十六峰之天臺七十七峰之雁蕩開豁其金戈鐵馬擾攘之煙塵凡郡縣供給一起拒絕水向荒墟停泊陸抄小路來往到得八月駐紮杭州卓然果齋都來繳令便與采秋遊了一日西湖禿樹支離寒波渺漠荒草低天叢蘆冷岸滿野陰雲濁潦中頹牆廢垣殘毀駁裂野店無煙遠峰數點兵火後光景真可歎息悵然而返覺得一路秋風衰柳門巷無人昏霧歸鴉荻花欲語荷生既苦喚奈何采秋亦心驚老大將到行營遙見無數倭人刀如霜白槍似林蒼又覺陡然青萍接著回道倭人解來金陵遺孽馮弗田前來請令荷生神定轎子軟步如飛倭目數十輩亮甲挂刀一字兒跪接荷生轎中點首示意轅門下營官扶入傳令升帳於是卓然果齋招呼整隊杭城大小官員也來站班帥旗一展升炮三聲荷生衣冠升帳中軍傳呼倭目一人進見倭目報門巡捕官領跪階下荷生問道哈巴裏就是你麽哈巴裏答應了荷生道你們從何處擒來馮弗田哈巴裏道元帥克復金陵弗田隨著僞王娘馬氏僞丞相鄧際盛又僞官等數十人竄上清涼山洞洞裏原有儲恃經歷兩個月食也盡了將金寶航海投奔香山懇求我們帶他回國保全這數十條性命我們竊念元帥號令威嚴小國新受皇上天恩不敢護庇叛孽計誘登島悉數擒獲押解前來探得元帥行營特由粵洋駛著輪船清晨到了就來轅門伺候荷生欣然道你等恭順可嘉靜行本帥奏聞獎賞吧哈巴裏磕頭稱謝就吩咐杭守延入行館優待去了此時天已靠晚自轅門以至帳中燈張百合炬列萬行火焰中刀矛林立各將領明盔亮甲奕奕有光將那分明別隊五色的戰襖五色的旗幟愈顯得對對分門荷生高坐帳中披件團龍黃綾馬褂帳裏旁列捧劍捧令兩侍兒如花似玉帳前雁翅般武巡捕數十人俱是魚鱗文戰袍團花馬褂一呼百跪一諾千聲真顯得大將軍威重如山當下哈巴裏隨著杭守逡巡而出上面接疊連聲傳呼抓進馮弗田下面答應如雷鳴一般將馮弗田跪在當面荷生問道你是馮弗田麽這孩子已慌得說不出話一晌才應道是以後問他都不能答應還是推上僞王娘和那僞丞相才一一畫了招詞荷生吩咐打上囚籠只聽得高唱掩門早炮響鼓鳴荷生進去了次日傳令卓然果齋帶了囚籠先行第二日荷生與采秋起馬這回卻走了官站各道節度迎送供帳交錯道路這不用說荷生登舟卻一天走不了三五十裏路慢慢的召見父老撫循難民給發賞犒采秋也逐處見有婦孺便召來詢問一番與些銀錁子老羸的人更加厚遺以此十裏一泊五裏一停自八月十五杭州起馬直至十月初一才到金陵恰好欽使韋小珠也到了你道小珠怎充欽使呢小珠自十七歲入學後便奉諱了爲是江南道弗老夫人就不准他出門只作書謝了謖如後來謖如經略西北小珠卻力學五年壬戌登了鄉榜第三名航海會試又高高中了第十名進土朝考一等第二殿試一甲第三謖如荷生時常均有音問往來早爲癡珠欣慰本年各道鄉試小珠得了陝西試差此番進京複命奉旨前往江東冊封諸將犒勞大軍恤難民荷生謖如大喜差員遠接凡供給護衛大家曉得是癡珠兒子個個盡心舟次石頭荷生謖如帶領文武各官排隊奉迎請過聖安與小珠見面真有虎賁重逢蘇瑰有子之感不覺睫淚盈盈小珠更覺銜哀欲涕奈系公座不便私談迓入行館荷生謖如便與小珠執手一慟是夜三人開宴招及鶴仙款款情話更深才散次日黎明讀詔大家俯伏壇下只聽念道奉天承運皇帝詔曰維金陵之小丑敢黑子之負隅抗顔行者十一年延腹疾於十三道怨深臣庶憤結鬼神自外生成久留苞孽往者遊氛不戒大帥無功爰撤兒戲之兵特拔忠衿之彥雷符星斗光顔自有旌旗文畫葩瓜賀齊列成幹櫓結李摩雲之壘成算在胸焚盧明月之屯奇兵拔幟如太陽之沃雪所過皆銷譬大旱之望雲崇朝而雨於是功成掃穴捷奏甘泉當南風解慍於薰琴正秋露垂珠於盾墨陳牲告廟慰列祖在天之靈晉冊承歡加慈母深宮之膳無可寬者元惡佇送檻車有必報者豐功遠稽彜典敬奉兩宮懿訓式頒五等崇封於乎巨爲主生功因將立伐吳定策惟羊祜無愧張華平蔡刊碑在昌黎何私裴度金釵阿杜豔貴妾于盤龍鐵戟崔家施郎君之行馬賞榮於室蔭遠其門溯不獲已而用兵天其臨汝有非常功而介齎禮亦宜之欽此讀畢謝恩大家延小珠行禮小珠