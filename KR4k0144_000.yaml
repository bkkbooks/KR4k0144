body:
  text: 花月痕上清魏秀仁著目録第一回蚍蜉撼樹學究高談花月留痕稗官獻技第二回花神廟孤墳同灑淚蘆溝橋分道各揚鑣第三回憶舊人倦訪長安花開餞筵招遊荔香院第四回短衣匹馬歲暮從軍火樹銀花元宵奏凱第五回華嚴庵老衲解神簽草涼驛歸程驚客夢第六回勝地名流禊修上巳金樽檀板曲奏長生第七回翻花案劉梧仙及第見芳譜杜采秋束裝第八回呂仙閣韓荷生遇豔並州城韋癡珠養屙第九回甹夆水閣太史解圍邂逅寓齋校書感遇第十回兩番訪美疑信相參一見傾心笑言如舊第十一回接家書旅人重臥病改詩句幕府初定情第十二回宴水榭原士規構釁砸煙燈錢同秀爭風第十三回中姦計淩晨輕寄柬斷情根午夜獨吟詩第十四回意綿綿兩闋花魂詞情脈脈一出紅梨記第十五回詩繡錦囊重圓春鏡人來菜市獨訪秋痕第十六回定香榭兩美侍華筵夢遊仙七言聯雅句第十七回儀鳳翺翔豪情露爽睡鴛顛倒綺語風生第十八回冷雨秋深病憐並枕涼風天末緣證斷叉第十九回送遠行賦誦哀江南憶舊夢歌成秋子夜第二十回陌上相逢搴帷一笑溪頭聯步邀月同歸第二十一回宴仲秋觴開彤雲閣銷良夜笛弄芙蓉洲第二十二回秋華堂仙眷慶生辰採石磯將軍施巧計第二十三回簾卷西風一詩夜課雲橫秦嶺千里書來第二十四回三生冤孽情海生波九死癡魂寒宵割臂第二十五回影中影快談紅樓夢恨裏恨高詠綺懷詩第二十六回彤管生花文章有價圍爐煮雪情話生春第二十七回癡婢悔心兩番救護使君高義一席殷勤第二十八回還玉佩憨書生受賺討藤鐲戇太歲招災第二十九回消寒小集詩和梅花諧老卜居園遊柳巷第三十回看迎春俏侍兒遇舊祝華誕女弟子稱觴第三十一回離恨羈愁詩成本事間情逸趣帖作宜春第三十二回秋心院噩夢警新年搴雲樓華燈猜雅謎第三十三回麗句清詞三分宿慧花香燈影一片豔情第三十四回汾神廟春風生麈尾碧霞宮明月聽鵾弦第三十五回鬚眉巾幗文進壽屏肝膽裙叉酒闌舞劍第三十六回一聲清磬色界歸真百轉柔腸情天入幻第三十七回廷推嶽薦詔豫清銜風暖草熏春來行館第三十八回芣苡無靈星沈婺女棣華遽折月冷祗園第三十九回燕子覆巢章台分手雁門合鏡給事班師第四十回意長緣短血灑鵑魂人去影留望窮龜蔔第四十一回焦桐室枯吟縈別恨正定府瀝血遠貽書第四十二回聯情話寶山營遇俠痛慘戮江浦賊輸誠第四十三回十花故事腸斷恨人一葉驚秋神歸香海第四十四回一剎火光穢除蟬蛻草年孽債魂斷雉經第四十五回竹竿嶺舊侶哭秋墳樅陽縣佳人降巨寇第四十六回求直言梅翰林應詔復潯郡歐節度策勳第四十七回李謖如匹馬捉狗頭顔卓然單刀盟倭目第四十八回桃葉渡蕭三娘排陳雨花臺朱九妹顯靈第四十九回舍金報母擔粥賑飢聚寶奪門借兵證果第五十回一枝畫戟破越沼吳八面威風靖江鎮海第五十一回無人無我一衲西歸是色是空雙棺南下第五十二回秋心院遺迹話故人花月痕戲場醒幻夢第一回蚍蜉撼樹學究高談花月留痕稗官獻技情之所鍾端在我輩君臣父子兄弟夫婦朋友性也情字不足以盡之然自古忠孝節義有漠然寡情之人乎自習俗澆薄用情不能專一君臣父子兄弟夫婦朋友之間且相率而為偽何況其他乾坤清氣間留一二情種上既不能策名於朝下又不獲食力於家徒抱一往情深之致奔走天涯所聞之事皆非其心所願聞而又不能不聞所見之人皆非其心所願見而又不能不見惡乎用其情請問看官渠是情種砉然墜地時便帶有此一點情根如今要向何處發泄呢吟風嘯月好景難常玩水遊山勞人易倦萬不得已而寄其情於名花萬不得已而寄其情于時鳥窗明几淨得一適情之物而情注之酒闌燈灺見一多情之人而情更注之這段話從那裏説起因為敝鄉有一學究先生姓虞號耕心聽小子這般説便歎道人生有情當用於正陶靖節間情一賦尚貽物議若舞衫歌扇轉瞬皆非紅粉青樓當場即幻還進什麼情呢我們原不必做理學但生今之世做今之人讀書是為著科名謀生是為著妻子你看那一班潦倒名士有些子聰明偏做出怪怪奇奇的事動人耳根又做出落落拓拓的樣搭他架子更有那放蕩不羈傲睨一切偏低首下心作兒女子態留戀勾欄中人你想他們有幾個梁夫人能識蘄王有幾個關盼盼能殉尚書大約此等行樂去處只好逢場作戲如浮雲在空今日到這裏明日到那裏説説笑笑都無妨礙只不要拖泥帶水糾纏不清才好呢你説什麼情種又是什麼情根我便情田也要踏破何從留點根留點種呢小子笑道先生自知甚明教人也還踏實只是將情字徑行抹煞試想枯木逢春萌芽便發生公説法頑石點頭無論是何等樣人比木石自然不同如何把人當個登場傀儡古人力辨情淫二字如涇渭分明先生將情田踏破情種情根一齊除個乾淨先生要行什麼樂呢小子不敢説求先生指教罷學究勃然怒道你講什麼話先王人情以為田這情字你竟認作男女私情看麼小子嗤的一笑道先生你怎的不記得上文有飲食男女人之大欲存焉一句呢大抵人之良心其發見最真者莫如男女分上故大學言誠意必例之於好好色孟子言舜之孝必驗之于慕少艾小子南邊人南邊有個樂部生用真男旦用真女燃椽燭鋪紅氍毹演唱醒妓偷詩等劇神情意態比尋常空中摹擬強有十倍今人一生將真面目藏過拿一副面具套上外則當場酬酢內則邇室周旋即使分若君臣恩若父子親若兄弟愛若夫婦誼若朋友亦只是此一副面具再無第二副更換人心如此世道如此可懼可憂讀書人做秀才時三分中卻有一分真面目自登甲科入仕版蛇神牛鬼麇至遝來看官聽著小子説過今人只是一副面具如何又説出許多面目來須知喜怒威福十萬副面具只是一副銅面具也然則生今之世做今之人真面目如何行得去呢你看真面目者其身曆坎坷不一而足即如先生所説那一班放蕩不羈之士渠起先何曾不自檢束讀書想為傳人做官想為名宦奈心方不圓腸直不曲眼高不低坐此文章不中有司繩尺言語直觸當事逆鱗又耕無百自之田隱無一椽之宅俯仰求人浮沈終老橫遭白眼坐困青氈不想尋常歌伎中轉有窺其風格傾慕之者憐其淪落系戀之者一夕之盟終身不改幸而為比翼之鶼詔于朝榮於室盤根錯節膾炙人口不幸而為分飛之燕受讒謗遭挫折生離死別咫尺天涯齎恨千秋黃泉相見三生冤債雖授首於稿街一段癡情早銷魂於蓬顆金焦山下空傳瘞鶴之銘鸚鵡洲邊誰訪玉簫之墓見者酸鼻聞者拊心愚俗無知轉成笑柄先生你道小子此一派鬼話是憑空杜撰的麼小子尋親不遇流落臨汾縣姑射山中以樵蘇種菜為業五年前春凍初融小子鋤地忽地陷一穴穴中有一鐵匣內藏書數本其書名花月痕不著作者姓氏亦不詳年代小子披覽一過將俟此中人傳之其年夏五旱魃為虐赤地千里小子奉母避災太原苦無生計忽悟天授此書接濟小子衣食因手抄一遍日攜往茶坊敲起鼓板賺錢百文負米以歸供老母一飽書中之是非真假小子亦不知道但每日間聽小子説書的人也有笑的也有哭的也有歎息的都説道書中韋癡珠劉秋痕有真性情韓荷生杜采秋李謖如李夫人有真意氣即劣如禿僮傻如跛婢戇如屠戶懶如酒徒淫如碧桃狠如肇受亦各有真面目躍躍紙上可見人心不死臧獲亦剝果之可珍直道在民屠沽本英雄之小隱至如老魅焚身雞棲同燼么魔蕩影兔脫遭擒鼯鼠善緣終有技窮之日猢猻作劇徒增形穢這羞又可見天道回圈無往不復冤有頭債有主願大衆莫結惡緣生之日死之年即顧影亦漸清夜小子嘗題其卷首雲有是必有非是真還是假誰知一片心質之開卷者今日天氣晴明諸君間暇無事何不往柳巷口一味涼茶肆聽小子講花月痕去也其緣起如何且聽下回分解第二回花神廟孤墳同灑淚蘆溝橋分道各揚鑣京師繁華靡麗甲於天下獨城之東南有一錦秋墩上有亭名陶然亭百年前水部郎江藻所建四圍遠眺數十裏城池村落盡在目前別有瀟灑出塵之致亭左近花神廟編竹為牆亦有小亭亭外孤墳三尺春時葬花於此或傳某校書埋玉之所那年春闈榜後朝議舉行鴻詞科因此各道公車遲留觀望不盡出都此書上回所表韋癡珠系東越人自十九歲領鄉薦後遊曆大江南北西登太華東上泰山祖士稚氣概激昂桓子野性情淒惻癡珠兼而有之文章憎命對策既擯于主司上書復傷乎執政此番召試飼科因偕窗友萬庶常同寓圓通觀中托詞病暑禮俗士概屏不見左圖右史朝夕自娛光陰易度忽忽秋深鄉思羈愁百無聊賴忽想起陶然亭地高境曠可以排拓胸襟也不招庶常同往只帶隨身小童名喚禿頭雇車出城一徑往錦秋墩來遙望殘柳垂絲寒蘆飄絮一路倒也爽然不一會到了墩前見有五六輛高鞍車歇在廟門左右禿頭已經下車取過腳踏癡珠便慢慢下車來步行上墩剛到花神廟門口迎面走出一群人當頭一個美少年服飾甚都面若冠玉唇若塗朱目光眉彩奕奕動人看他年紀不過二十餘歲隨後兩人都有三十許也自舉止嫻雅前後四個相公跟著説説笑笑又有一個小僮捧著拜匣疾珠偕禿頭閃過一邊舉目瞧那少年那位少年也將癡珠望了一望向前去了癡珠直等那一群人都出了門然後緩步進得門來白雲鎖徑黃葉堆階便由曲欄走上見殿壁左廂墨沈淋漓一筆蘇字草書寫了一首七律便念道雲陰瑟瑟傍高城間叩禪扉信步行水近萬蘆吹絮亂天空一雁比人輕疏鍾響似驚霜早晚市塵多匝地生寂寞獨憐荒冢在埋香埋玉總多情癡珠看了一遍訝道這首詩高華清爽必是起先出門那位少年題的再看落款是富川荷生也不知其姓名正自呆想只見一個沙彌從殿后走出來癡珠因向前相見隨問他可認得題詩這人沙彌道這位老爺姓韓時常來咱們這裏逛陶然亭上也有他題的詩卻不知道官名住宅癡珠道這言詩好得很是個才子之筆你對汝師父講千萬護惜著別塗抹了沙彌答應了便隨癡珠邐迤上陶然亭來滿壁琳琅癡珠因欲讀荷生的詩且先看款忽見左壁七律一首款書春日招芝香綺雲竹仙稚霞諸郎修禊於此後面書荷生醉筆四宇不禁大笑便朗吟道舊時煙草舊時樓又向江亭快禊遊塵海琴樽銷塊壘春城鶯燕許勾留桃花如雪牽歸馬湘水連天泛白鷗獨上錦秋墩上望蕭蕭暮雨不勝愁癡珠想道此人清狂拔俗瀟灑不羈亦可概見惜相逢不相識負此一段文字緣了沈吟良久向沙彌要了筆硯填台城路詞一闋雲蕭蕭落葉西風起幾片斷雲殘柳草沒橫塘苔封古剎才記舊遊攜手不堪回首想倚馬催詩聽鶯載酒轉眼淒涼虛堂獨步遲徊久何人高吟祠畔吊新碑如玉孤墳如鬥三尺桐棺一杯麥飯料得芳心不朽離懷各有盡淚墮春前魂銷秋後感慨悲歌問花神知否自吟一遍復書款雲東越癡珠秋日遊錦秋墩讀富川荷生陶然亭花神廟詩棖觸間情倚聲和之寫完便擲筆笑向沙彌道韓老爺再來汝當以我此詞質之休要忘了沙彌亦含笑答應遞上茶來癡珠兀自踱來踱去瞧東瞧西禿頭道老爺你看天要下雨我們回去路遠著哩癡珠仰首一看東北上黑雲布滿遂無心久留急忙下墩上車而去這且按下卻説荷生這日自錦秋墩進城已有三下多鍾一路蕭蕭疏疏落起細雨來同行一為謝小林侍禦一為鄭仲池太史侍禦因招荷生攜四旦小飲顧曲山房正上燈賭酒只見青萍回道老蒼頭來接老爺回去説明經略軍營摺辨送來經略書信並聘金三百兩現在寓處候老爺呈繳且有話面回荷生遲疑道明節相去歲挂印時原欲邀我入幕我彼時因春闈在邇婉辭謝去今有書來想必還為這事但教我怎樣處呢侍禦道現在詞科既阻于時艱歸路又梗於烽火何不乘此機會出都未為不可一面催跟班上菜荷生立起身道菜已有了二君偕諸郎多飲數杯小弟且告辭回去一看侍禦也不強留吩咐提燈送出大門看過上車方才進去看官聽著這明經略名祿本是國家勳戚纍世簪纓年方四十五歲弓馬嫺熟韜略精通而且下士禮賢毫無驕奢氣習五年前與韓荷生的老師三邊總制汪鴻猷先生一同出使西域汪總制屢屢言及生平得意門生惟有荷生一人文章詞賦雖不過人而氣宇宏深才識高遠曾在秦王幕府佐治軍書意欲招之幕中又恐其不受羈束彼時明經略已存在心中後來倭寇勾結西域回部作亂四方刀兵蠢動民不聊生汪公奉命防海明公奉命經略西陲臨別時經略向汪公求薦人才汪公又把荷生説起經略立時欲聘同行荷生因要應鴻詞科不肯同往經略心頗悵悵不料回部日更猖獗經略駐兵太原一面防邊一面調度河南軍務接濟兩湖兩江兩廣各道糧餉控制西南出入錢谷日以億萬計羽書旁午所有隨帶文武及留營差使各官雖各有所長卻無主持全局器量因想起荷生是汪公賞鑒的必定不差近知詞科停止因致書勸駕荷生自舊臘入都迄今已九閲月潤筆之絹諛墓之金到手隨盡正苦囊空得此機緣亦自願意遂定於九月十二日出都荷生此行是明經略敦請去的自然有許多大老官及同年故舊送贐敬張祖席自彰義門至蘆溝橋車馬絡繹那荷生仍是疏疏落落的帶了老蒼頭賈忠小童薛青萍並新收長隨索安翁慎一路酬應到得蘆溝橋已是未末申初時候剛至旅店適值門口擁擠不開將車停住只見對面店中一小僮伏侍一人上車衣服雖不十分華美而英爽之氣見於眉宇且面熟得很一時卻想不起那裏見過正在凝思謝侍禦及一班同鄉京官還有春慶部聯喜部相公們一齊迎出便急忙跳下車來是晚即在行館暢飲通宵次日起身午後長新店打尖到得房中見新塗粉壁上有詩一首款書九月十二日韋癡珠出都計自丙申宿此十度矣感懷得句不計工拙也想道這韋癡珠不就是十年前上那平倭十策這人麼因朗誦道殘秋倏欲盡客子苦行役行行豈得已萬感在心曲浮雲終日間倦鳥不得宿薊門煙樹多蘆溝水流濁回首望西山蒼蒼耐寒緑看畢歎一口氣想道此詩飄飄欲仙然抑鬱之意見於言表才人不遇千古如斯因觸起昨日所見的人不知是否此君看他意緒雖甚無聊氣概卻還傲兀我這回出都好像比他強多其實淪落天涯依人作計正復同病相憐也兀坐半晌只見索安回道護送營辨請老爺今日尖後換轎荷生想了一回説道坐轎甚好昨天誤了半站今日著他們多備兩班夫趕上正站汝們遲到都不妨呢看官你道荷生要趕正站是何意思他記起蘆溝橋上車那人是在花神廟門口注意瞧他的此刻因人想詩因詩想人恨不一下問明豈知癡珠在都日久資斧告罄生平又介介不肯丐人此番出都因陝西是舊遊之地且與兩川田節度公子有同遊草堂之約決計由晉入秦由秦入蜀把箱簏書籍概托萬庶常收管自與禿頭帶一付鋪蓋一領皮袍自京到陝二十六站與車夫約定兼程前進你道荷生大隊人馬那裏趕得上他正是大海飄萍離合無定萬里比鄰兩心相印到底荷生癡珠蹤迹若何且聽下回分解第三回憶舊人倦訪長安花開餞筵招遊荔香院話説癡珠單車趲行不日已抵潼關習鑿齒再到襄陽薊子訓重來灞水一路流連風景追溯年華忽然而喜忽然而悲雖終日兀坐車中不發一語其實連篇纍牘也寫不了他胸中情緒便口占一絶道蒼茫仙掌秋搖落灞橋柳錦瑟惜華年欲語碑在口吟畢喟然長歎禿頭正在車頭打盹忽然回頭道此去長安只有十裏多路老爺進城何處卸車呢癡珠想道西安盡有故舊但無故擾人又何苦呢便説道咱們進城找店吧轉瞬車到東門剛進甕城忽見從城內來了一車車內坐著一人定睛一看原來是一故人姓王字漱玉系長安王太傅長孫與癡珠同年這日要往城外探親適與癡珠同年這日要往城外探親適與癡珠相值兩邊急忙跳下車來歡然道故漱玉因問道前月接萬世兄信知吾兄有蜀道之遊不想今日便到如何走得這般快但如今那裏卸車呢癡珠未答禿頭在傍道老爺要找店哩漱玉道豈有此理難道西安許多相好都不足邀吾兄下榻麼癡珠笑道不是這般説小弟急欲入川擬於此時竟不奉訪俟回陝時再與故人作十日之歡漱玉笑著吩咐跟人道你們趕緊飛馬回家伺候一面説一面攜著癡珠的手道我們同坐一車好説話些你的車叫管家坐著慢慢的跟來吧原來漱玉家中有一座園亭是太傅豫告後頤養之地極其曲折名曰邃園太傅開府南邊時癡珠尚幼最為太傅所器重後來與漱玉作了同年值逆倭發難因上書言事觸犯忌諱禍幾不測賴太傅力為維持得以無罪未幾太傅豫告攜入關中所以園中文酒之會癡珠無不在座所有聯額題詠癡珠手筆極多因此一家內外男女無一人不認得癡珠先是家丁回家説韋老爺來了這漱玉太太便分派婢仆將邃園中碧梧山房七手八腳鋪設起來是夜兩人相敘契闊對飲談心傷風澤之寢微痛劫灰之難問癡珠忽慘然吟道人生有通塞公等系安危我近來絶口不談時事矣停了一會漱玉因問癡珠道你記得七年前進京娟娘送咱們到灞橋行館麼那一夜你兩人依依情緒至今如在目前你的詩是七絶兩首便吟道灞陵驛畔客停車惜別人來徐月華濁酒且謀今夕醉明朝門外即天涯玳梁指日誓雙棲此去營巢且覓泥絮絮幾多心上語一聲無賴汝南雞是不是呢癡珠道你好記性這兩首詩我竟一字都忘了漱玉道自然忘了癡珠慘然高吟道十年一覺揚州夢贏得青樓薄幸名便問漱玉道你如今可知娟娘是何情狀呢漱玉道我前年見過一面才曉得他嬤死了以後聞人説他哭母致疾閉門謝客近來我不大出門便兩年多沒見人提起他蹤迹如今長安名花多著哩遲日招一個人領你去逛逛吧癡珠道我也聽得人説這幾年秦王開藩此地幕中賓客都是些名士北裏風光自然比向時強多了二人於是淺斟細酌塵悰渴滌燭跋三現尚未散筵只見小丫鬟攜著明角燈回道太太説夜深了韋老爺初到車馬勞頓請老爺少飲給韋老爺早一點安歇吧漱玉笑道我倒忘了只顧與故人暢談遂盡一壺而散晚夕無話次日飯後漱玉果招一個人來姓蘇字華農系府學茂才漱玉自去城外探親西安本系癡珠舊遊之地是日同華農走訪各處歌樓舞榭往往撫今追昔物是人非不免悵然而返第三日漱玉回家也跟著同遊一連數日總訪不出娟娘資訊癡珠就也懶得走了彼時便有親故陸續俱來癡珠也不免出去應酬一番更把訪娟娘一事擱起再且癡珠急於入川只得將此事托漱玉華農慢慢探問一日三人正在山房小飲門上送進單帖系癡珠世兄弟呂龍文專為癡珠餞行請漱玉華農作陪末注一行雲席設寶髻坊荔香仙院務望便衣早臨是荷癡珠將單遞給華農道這荔香院你認得麼怎的咱們沒有到過漱玉笑道這地方華農是進不去呢如今龍文請你你題上知字我們都陪你走一遭吧間文休敘到了那日三下多鍾龍文親自來邀恰好華農在座便四人四輛車向寶髻坊趕來此時已是十月將終朔風漸烈癡珠初進巷口便遙聞一陳笙歌之聲又走了半箭多路到了一家前面車便站住了四人一齊下車只見門前一樹殘柳跟班先去打門癡珠細看兩座油漆黑溜溜的大門門上朱紅帖子是終南雪霽渭北春來八個大字早有人開了門在門邊伺候癡珠四人相讓了一回跨進來便是一條磚砌甬道院中卸著一輛雕輪繡簾的轎車甬道盡處便是一個小小的二門進去門左右三間廂房廂房內人已出來開著穿堂中間碧油屏門癡珠留心看那屏門上匾額隸書荔香仙院四個大字門中灑藍草書板聯一對是呼龍耕煙種瑤草踏天磨刀割紫雲集句癡珠贊聲好跨進屏門便是三面遊廊中間擺著大理石屏風面面碧油亞字欄幹地下俱是花磚砌成鳥籠花架布滿廊廡上下四人緩步上廳便有丫鬟掀起大紅夾氈軟簾早有一股花香撲鼻方才要坐下早聞屏後一陳環佩之聲走出一麗人髻雲高擁鬟鳳低垂嫋嫋婷婷含笑迎將出來把眼瞧著癡珠道這位想是韋老爺麼龍文笑道你怎麼認得便攜著麗人的手向癡珠道此長安花史中第一人物小字紅卿吾兄細細賞鑒一番可稱絶豔否癡珠深深一揖道天仙化人我癡珠瞻仰一面已是三生有幸賞鑒兩字你可不唐突麼紅卿笑道韋老爺如此謬賞令我折受不起便讓四人依次而坐屋系三間大廳兩邊俱有套間在內一會丫鬟捧上茶來紅卿親手遞送已畢又坐了片刻漱玉便向紅卿道我輩雖非雅客竟欲到你小院一坐不知可否紅卿笑道豈敢小室卑陋恐韋老爺笑話説著便往裏請丫鬟前面領著轉過屏後又一小小院落由東邊一道粉牆進了一個垂花門南面牆下有幾十竿修竹枝葉扶疏面南便是三間小屋窗上滿嵌可窗玻璃進了屋門只覺暖香拂面原來三間小屋將東首一間隔作臥室外面兩間遍裱著文綾西南牆上挂首一個橫額上寫道玉笑珠香之館款書富川居士癡珠細審筆意極似韓荷生便向紅卿問道這富川居士可是韓荷生麼紅卿點頭道是漱玉道紅卿室中有一字不是荷生寫的麼紅卿因問癡珠道你在京會過他沒有癡珠道人是會過詩也讀過只是不曾説過話紅卿道你如今可曉得他的蹤迹麼癡珠道他很闊我出京時聞他為明經略聘往軍營去了紅鯽癡珠説話時漱玉立起身來步到東屋門邊掀開房簾招呼癡珠下炕道你看那壁上許多詩箋不是荷生小楷麼癡珠踱人臥室見茵藉幾榻亦繁華亦雅淨想道風塵中人有此韻致不減娟娘也便從那柳條詩絹上七絶四首瞧起看到第三首吟道神山一別便迢遙近隔蓬瀛水一條雙槳風橫人不渡玉樓殘夢可憐宵便道哦這就是定情詩麼再瞧那烏絲冷金箋上金縷曲一闋雲轉眼風流歇乍回頭銀河迢遞玉簫嗚咽畢竟東風無氣力一任落花飄泊才記得相逢時節霧鬢煙鬟人似玉步虛聲喜賦瑤台月誰曾料輕輕別旗亭莫唱陽關疊最驚心渭城衰柳灞橋風雪翠袖餘香猶似昨咫尺河山遠隔恐兩地夢魂難接自問飄蓬成底事舊青衫淚點都成血無限事向誰説漱玉便向癡珠道這便是荷生去年留別之作沈痛至此又望著紅卿道你們相別轉眼便是一年光陰實在飛快紅卿一面答應一面眼圈早已紅了漱玉便不往下説癡珠又瞧那泥金集句楹聯雲秋月春風等間度淡妝濃抹總相宜點頭道必如紅卿方不負此等好筆墨紅卿即讓四人在房中坐下道你的詩名早有人向我説過自古文人相輕實亦相愛你這般傾倒荷生怎的見面不扳談呢癡珠便將花神廟匆匆相遇及先後題詩一節詳敘出來紅卿道你看過他的詩你心中自然有了他他以後讀你的詩又不知怎樣想你呢你愛他的侍他今年都中還有詩寄來贈我我如今統給你瞧吧説畢便喚丫頭取鑰匙向枕函檢出浣花箋數紙遞給癡珠大家都走攏來癡珠展誦道冰綃霧五銖輕記訪雲英到玉京苔徑曉煙窗外濕桂堂初月夜來明菱花綽約窺新黛仙果清芬配小名最是凝眸無限意似曾相識在前生銀壺漏盡不成眠乍敘歡情已黯然萍梗生涯悲碧玉桃花年命寫紅箋團香和淚常無語理鬢熏衣總可憐莫話飄零搖落恨故鄉千里皖江邊便道原來紅卿是安徽人流轉至此可憐可憐説畢又往下念道玲瓏寶髻重盤雲百合衣香隔坐聞秋剪瞳人波欲活春添眉嫵月初分紫叉話舊渾如夢紅粉憐才幸有君杜牧年來狂勝昔只應低首縷金裙黃昏蜃氣忽成樓怪雨盲風引客舟水際含沙工伺影花前立馬幾回頭哎呀怎麼起了風浪不能見面了紅卿道一言難盡請往下看吧這還好呢癡珠又念道同心小柬傳青鳥偕隱名山誓白鷗獨看雙棲梁上月為儂私撥鈿箜篌名花落溷已含冤欲駕天風叫九閽一死竟拚銷粉黛重泉何幸返精魂癡珠讀至此正要與紅卿説話誰知紅卿早已背著臉在那窗前拭淚龍文便道不用念了癡珠如何肯依仍接著念道風煙變滅愁侵骨雲雨荒唐夢感恩只恐乘槎消息斷海山十笏阻昆侖鴨爐香暖報新寒再見人如隔世難握手相期惟有淚驚心欲別不成歡黃衫舊事殷勤囑紅豆新詞反覆看淒絶灞陵分手處長途珍重祝平安金錢夜夜蔔殘更秦樹燕山紀客程薄命憐卿甘作妾傷心恨我未成名看花憶夢驚春過借酒澆愁帶淚傾恨海易填天竟補肯教容易負初盟珍珠密字寄烏絲不怨蹉跎怨別離芳草天涯人去後蘆花秋水雁來時雙行細寫鴛鴦券十幅新填豆寇詞駐景神方親檢取銀河咫尺數歸期吟畢大家贊道好好詩纏綿宛轉一往情深癡珠倒也不發一言慢慢將詩放在桌上目視紅卿默默不語紅卿停了一會道韋老爺汝與娟娘情分也自不薄癡珠聽説娟娘便急問道紅卿你知他下落麼大家見紅卿突説娟娘也覺詫異便一齊靜聽起來紅卿沈吟一會道你既念他你為何分手以後不特無詩且無只字娟娘每向我誦為郎憔悴卻羞郎之句輒泫然淚下癡珠紅著眼眶道這薄幸兩字我也百口難分了只是事既無成萬里片言徙勞人意到底娟娘如今是怎樣呢紅卿道説起娟娘我也摸不出他的意思我家向日避賊入陝投奔於他深感他恩義後來我撑起門戶他嬤便死了娟娘素來孝順將衣飾盡行變換以供喪葬自此不塗脂粉長齋奉佛前年三月初三夜忽來與我作別説要去南海朝觀音我方勸他心即是佛不必跋涉數千里路況目下南邊多事如何去得次日即有人傳説娟娘留一紙字給他姊妹領一婢不知去向你道奇不奇呢大家聽説呆了半晌癡珠尤難為情一會巨燭高燒酒歃雜陳絲竹疊奏無奈癡珠紅卿各有心事雖強顔歡笑總無聊賴正是兒女千秋恨人前不敢言夜來空有淚春去渺無痕不到二更癡珠便托詞頭痛散席偕漱玉先回去龍文二人也就散了欲知後事如何且聽下回分解第四回短衣匹馬歲幕從軍火樹銀花元宵奏凱話説太原本古冀州之地東連燕豫西界大河北有寧武偏頭雁門諸關坐制稱雄屹然為神京右衛逆倭連年由海道蹂躪各省北天津登萊南則由寧波滋擾浙江由瓜州滋擾三江復援金人册立偽齊故事封了粵西巨寇員壽泉竊踞金陵於是淮海之間大河南北以及兩湖土匪蜂起逆倭遂得以橫行無忌朝廷賦額日虧軍儲日絀全靠西陲完善之區轉輸支應山右尤畿疆遮罩西北膏腴是年春間豫州節度武公部下官軍疊獲勝仗逆倭勢蹙勾引河東土匪竄入平陽計欲結連關外番民各部由草地潛人燕雲幸明經略北來士卒用命漸次撲滅是以駐節並州城中相機剿滅韓荷生就聘到軍磨盾草檄持籌高唱此其餘事始而冀州録清繼而協同豫州武節度官軍克期剿賊得以專籌各道軍餉此皆韓荷生一力贊成經略所以十分器重忽忽之間早是十二月了一日探馬報稱口外番民聚衆數十萬釃酒歃血將由關外直撲宣化錦州等處經略急請荷生計議荷生笑道此謠言也自古出塞必在春夏目下窮冬漫山積雪毋論番民不是銅筋鐵肋試想草枯水涸人馬如何走得去呢但邊境近稍寧靜有此謠言亦不可不早為防備以愚見料之大約回民將誆我張皇北顧乘虛渡河虜掠故造此謠言教我顧彼失此為今之計當先委幹員前往潼關探偵動靜更傳檄雍州節度早為捕治蒲關一帶亦不可不暗暗戒嚴老經略高見以為何如經略喜道先生此論洞徹匪徒肺腑話猶未畢只見門上傳鼓遞進蒲關總兵燒角文書一角經略忙借荷生一同披覽道鎮守蒲關總兵遊長齡謹稟節帥大人閣下敬稟者十二月十七日午刻據黃河渡口巡檢原士規稟稱探得十六日夜三更潼關城中失火關門大開番民萬餘人鼓噪而入一城文武俱被殺害聲言聚衆三十萬人將行北渡卑鎮即刻出往河幹察看見賊兵帳房布滿西岸現蒲關守兵自裁撤後只有八百餘名深恐兵力單薄不足防禦幸各鄉俱有團勇力扼河岸惟慮蜂擁而至衆寡不敵專此飛稟看畢便向荷生道果不出先生所料但事已至此如何是好荷生慨然道此等烏合之衆大人當以先聲奪之便令解散萬不可片刻遲延今日已四下多鍾了大人起馬萬不及事乞發令箭調顔參將林遊擊各帶左右翼兵一千名連夜出城駐扎五更兼程趲行限五日到蒲大人于明日未刻統領大兵出城十裏駐扎二十二日長行某願隨鞭鐙供大人指揮經略遲疑道救兵如救火固當以速為妙但今日即行調兵恐勢有不及奈何荷生道左右翼兵即在本營軍裝原無不備著今夜駐扎城外正為兵丁一切餱糧器械計耳賊一路必有耳目若知大兵即到自然心生畏沮據報聚衆三十萬人此自狡賊虛張聲勢然數萬人是必有的此數萬人未必皆無父母兄弟妻子田産大半為賊逼脅出來某請為密行曉示令其自相離異且平日官軍就道籌餉辦裝日延一日救兵幾有遲至半個月尚未出城者大人朝聞警暮出兵鼠輩聞風定當膽落看某仗劍為大人殺賊哩經略道先生計畫周到即請先生同行所有機宜悉憑先生調度説畢便傳中軍捧過令箭教隨荷生到帳前施令果然事權在手威信及人二十日一早顔林二將早已帶兵向蒲州趲行去了第二日經略亦偕荷生出城將一切籌餉事宜統交節度曹公荷生又將平日先催那一處先解那一處某處用某人某人熟某事開明節略送給曹公曹公接辦自不費手也著實欽服荷生材幹這且按下且説顔林二將曉夜趲行到得中途忽奉令箭一枝錦囊一個內固封密劄二人忙拆開同看道頃探得河南土匪阿大郎等因潼關失守勢復蜂起攻陷陝州兩將軍所帶左右翼兵由小路星馳抄至陝州一鼓殲除無留一人再于硤石關左右樹林中留兵二百名不時巡哨多設旌旗以為疑兵定於正月十五日二更後到潼關看城中火起接應不得有違看畢急照密劄催兵前進去了看官你道顔林二將是何等樣人顔參將名超系武進士出身林遊擊名勇系營伍出身顔善使單刀林善使畫載俱有萬夫不當之勇且兩人各有一樣絶技顔參將能於百步之外樹林中數過第幾枝第幾葉射之無有不中林遊擊能發連珠箭一開弓射倒三人再無閃得過的只是心氣粗暴言詞大戇動輒得罪長官以致十年還是一個守備一個千總自經略到晉克復平陽會剿陳汝他二人便超群絶倫為經略賞識了不半年間以軍功擢至參遊眼見得去總兵不遠哩看官汝道人生可不要逢個知己麼間話休講説他兩人到了河南果然土匪縱橫焚村劫舍顔林兩將所帶皆百戰之兵分路剿除不日即將陝州收復並按著柬帖在硤石關一帶設下疑兵專等十五日到潼關接應暫且不表且説那賊匪據了潼關十餘日不能渡河城中不過數裏地方能夠搜得出幾多糧草將向華陰進發又被西安重兵攔住去路將往河南虜掠忽聞經略遣將將陝州土匪斬殺無遺並探得一路均有伏兵幾次出城俱被官軍擊退且烏合之衆本無紀律有勇無謀弄得個個魂驚膽戰已有散心忽一日潼關城中貼了幾十處大營告示衆人瞧道欽差大臣經略西南世襲一等威勇侯明示為愷切曉諭事爾陝甘番民自李唐以來轉徒內地食毛踐土千有餘歲我朝天覆地載漢民番民從無歧視乃者逆倭犯順天地不容神人共憤鼯是已窮之技豕無可突之圍釜底遊魂苟延旦夕爾等乃受其指揮並勾番部兼脅良民豈知天上軍來若風掃葉官家兵到如日沃霜本爵欽承威命統領元戎招募悉拳勇之材團練集爪牙之利燕犀排出爭淬芙蓉代馬驅來久肥苜蓿四圍炮火中天掣列缺之鞭一片刀光半夜射望諸之魄蝟鋒立折螳斧徒勞惟思二百年列聖垂謨但有如傷之念十余萬生靈就溺誰無欲拯之心為此特宣明諭爾等俱有官骸亦念驕誅之慘誰無妻子盍思孥戳之冤兵弄潢池原屬無知赤子戈投牧野即為歸順黔黎本爵既往不咎咸與維新豫以免死之牌示之投生之路倘執迷不悟甘心從逆則城破之日必盡殺乃止其毋悔某年正月某日給於是每夜輒有百餘人縋城私詣大營求給免死牌旬日之間來者愈衆將十萬免死牌給發殆盡經略一切事務俱與荷生計議且屢奉嚴旨急命克復潼關便覺十分愁慮那荷生每日仍是輕裘緩帶飲酒賦詩並傳知蒲關城內居民照舊安業開放花燈到了十五日早晨荷生在經略帳中傳出令箭二枝密劄到了十五日早晨荷生在經略帳中傳出令箭二枝密劄二個一個與蒲關遊總兵一個與本營李副將二人看了密劄各自分頭行事衆人皆不知是何緣故到了黃昏時候城中銀花火樹一色通明荷生乘馬帶了五十名兵在燈市遊了一回自行出城去了經略營門毫不見些動靜再説顔林二將到了十五日午後行至渡關二十裏外飽餐戰飯預備接應先差探馬探聽回報大營賊營隔河相對未曾打仗二人心中疑惑不一會日色西沈月光東上二人騎馬當先逶迤望潼關進發到了關前已將近二更時候只見月明如晝隔河大營內鼓角無聲又無船隻渡河只好將兵在汊岸扎住又過了一個更次仍無消息四只眼只往城中看著兵士們也有坐的也有立的都磨拳擦掌等候打仗猛然一回頭見隔河大營中赤的的一枝號火騰起直上雲履二將便知有了消息便命衆兵一齊上馬隨後又見起了兩枝號火話言未了關內信炮連聲月明之下倒看不出火光只見滾滾黑煙沖天四起人聲鼎沸二將便令軍士順風向賊營放起火來麾兵上前正要衝殺隔河大營也就大開營門萬炬齊出都在東岸上列成隊伍卻不渡河那時城外賊營正在睡夢之中驚醒倉卒接戰怎當二將的兵驍將勇霎時已經死了一半一半拋戈棄甲沿河逃生正在追殺之際城內關門大開先擁出三五百人皆是黃布包頭大聲招呼官兵進城殺賊四望城上垛口人俱站滿敵樓上懸出一盞大紅燈上寫著鬥大的一個順字二人看了大喜且不去追趕餘賊帶領衆兵殺進城來是夜賊衆因探得蒲關內大放花燈所以毫無防備半夜忽然聽得四處火起人聲大呼道我等皆明大人官軍投降者免死所有賊首沙龍巴戟帶著一干心腹一時措手不及四散跑出自相踐踏死者不計其數正要出城迎頭遇著顔林二將一陳好殺只見尸橫遍巷血流成渠便折轉頭來想出東門逃命二將隨後正趕忽見賊匪紛紛倒地四路炮響槍鳴迎面在刀光中閃出一將手舞大刀正在那裏殺賊猶如砍瓜切菜原來是蒲關遊總兵見了二人十分大喜便道明爺有令傳與二位見頭包黃布者免死於是合兵一處搜殺城中殘部救滅煙火安撫良民此時已是四更城內城外這一陳殺死的賊約有萬人投降者亦有萬衆只有賊首數人尚帶著一夥悍賊拚命殺出城外又合城外的餘賊番人回人一共尚有數千便想渡河往西搶掠忽見隔河岸上一片火光綿亙不絶遂輪番兵引路打草地內順著河往西行走卻喜回頭一看並無追兵遂放心大膽而進意欲待天明之後尋著村莊虜些飲食又走了一個更次已是五更過了約莫也走了二三十裏月色漸漸西沈拂拂曉風吹得那河岸上敗葦叢蘆沙沙亂響遠遠望見河旁似有幾輛大車停住往前再走荒草愈多正在尋覓路徑忽聽一聲炮響三面火光驟發前後俱被大車滿載柴草灌上了油把路都塞斷一陳風過遍地的枯草烘烘燒著草內先埋下無數的鐵炮引著藥線直裂橫飛只燒得這一夥數千賊匪上天無路入地無門只往河中亂跳溺死的也不計其數其餘均焦頭爛額血染黃沙了看官你道這場火是那裏來的就是荷生早晨派的李副將在此埋伏算定賊軍必由此路故此燒他一個盡絶荷生帶了數十名心腹健卒正在高阜瞭望見大功已成十分歡喜時東方已白隨即與李副將會在一處向潼關來方到關下早望見經略大纛正在渡河顔林遊李四將皆列隊相迎經略一到西岸見了荷生並四將便笑吟吟的向荷生拱手道深勞先生妙算井諸將勤勞一戰功成可喜可賀遂與荷生並馬人城出榜安民將生擒賊首一齊梟斬示衆委員訊問未出城叛民有眷屬者悉令回籍其單身者交地方官安排時雍州節度駐扎同州約期相見高宴三日硤石關伏兵二百名亦已調回大兵便凱歌渡河回太原去了凡秦晉官民無不仰慕荷生豐采每出至道途擁擠不開看官汝道熱鬧不熱鬧呢正是苟有用我帷幄運籌輕裘緩帶名士風流自是逆倭聞風再不敢窺伺山右了欲知後事如何且聽下回分解第五回華嚴庵老衲解神簽草涼驛歸程驚客夢上回書説的是荷生東平叛民那時正癡珠西入蜀川天寒歲暮遊子鄉關之感風人屺岵之思麋至遝來頓覺茅店雞聲草橋月色觸目驚心無復曩時興致行次寶雞遇一故人詢及行蹤因言節度田公於十月杪奉命移廣已見邱抄且有不必來京請訓之語癡珠意緒愈覺無牌想道人生遇合自有定數倒是蜀中風景甲于寰區自古詩人流寓其地閲曆一番也不負負癡珠自此入益門度大散關寓意山水日紀一詩轉也擺脫一切這日到了廣漢廣漢守郭公系癡珠郎舅至戚迎至署中十年分手萬里聚頭這一夕情話比西安王漱玉家又是一樣款洽癡珠借此度過殘年飲薛濤之酒鬥花蕊之詩客邊亦不寂寞韶光荏苒轉瞬是二月初旬了始而傳聞逆賊竄入建昌逼近東越繼而傳聞上遊失守會城危在旦夕癡珠與郭公俱有老親聞此資訊何等張皇到三月杪郭家安信到了癡珠不得家中一字如何放心便差人查探由湖入廣之路差人回報黃州道梗田公現在留滯長沙癡珠急得沒法因想往華嚴庵求籤指示去路原來廣漢有一華嚴庵系太史金公兆劍之妻馮燕娘所立燕娘聰穎絶倫年十九歸太史蜀人比之趙松雪夫婦逾年太史半燕娘不茹葷奉姑以居逾年姑又卒燕娘遂祝發奉佛高坐禪床足不出戶者三十年由靜生定由定生慧一切過去未來之事洞照無遺因此把所居舍為華嚴庵就菩薩前神簽指示善男信女迷途法號蘊空癡珠前此曾往瞻仰值蘊空朝峨眉去了只撰一聯鐫板送人方丈懸挂其聯雲也曾續史也曾續經瞻落落名山博議書成竹素雙棲留只影未敢言仙未敢言佛歎茫茫孽海大家身在柏舟一葉引迷津蘊空由峨眉回來見了此聯也還點頭稱好這回癡珠因要求籤先期齋戒於四月初一日清早洗心滌慮向華嚴庵來到了山門便有齋婆迎接上殿拈香癡珠磕了頭跪持籤筒默禱一番將籤筒搖了幾搖落下第十三簽來重復磕頭起來問過信兆便有齋婆送過簽譜癡珠看頭一句是如此江湖不可行想道這樣湖南走不得了又看下句是且將來路作歸程想道還要由山陝走哩再看底下兩句是孤芳自賞陶家菊一院秋心夢不成想道這是怎説沈吟一會重整衣冠又跪下磕了三個頭默祝一香重求一簽檢出簽譜看頭一句是故園歸去已無家便不知不覺流下淚來又看下句是傾蓋程生且駐車自語道這是遇著什麼人留我哩再往下看去是秋月何如春月好青衫自古恨天涯癡珠想道這也不是好消息正在疑慮只見殿后一個老尼年紀七十以外扶著侍者慢慢踱過來齋婆侍立一邊老尼便向癡珠合掌道居士何來癡珠急忙回禮道比邱即蘊空法師麼便一一通了姓名老尼笑道前蒙居士過訪老衲朝山去了有失迎候轉承惠賜長聯隱括老衲一生行實令人心感癡珠説道久欽清節且仰禪宗正想向方丈頂禮慈雲將簽意指示不意比邱轉出來了説畢便將簽譜帖子遞過蘊空接著瞧了一瞧道頭一簽上二句居士自然明白了下二句後來自有明驗大約居士與陶家菊另有一番因果第二鑒首一句且不必疑慮大抵秋菊春蘭各極其勝究竟秋菊牢騷不及春蘭華貴老衲有三十二字偈居士聽著便説道鶯飛草長鳳去台空黃花欲落一夕西風亭亭淨植育秀秋江人生豔福春鏡無雙癡珠遲疑不解呆呆的立著老尼道居士請了數雖前定人定卻也勝天這看居士本領吧説著便扶著侍者由殿東入方丈去了癡珠也不敢糾纏到客廳吃了茶疑疑惑惑的回署過了一夜想道幸是山陝此刻回部寧靜倘像去冬那樣光景就這條路也走不得哩因此決計由原路且先入都再作回省打算郭公也留不住只得厚贐數百金派兩名得力家丁護送至陝是時初夏時候途中不寒不熱山青水緑比殘冬光景迥然不同到了梓橦重經雲棧翠雲廊滴水岩青橋驛紫柏山紅心峽諸勝尤令人心曠神怡奈癡珠繫念老母在危急中恨不能插翅南飛那有心情流連風景每日重賞轎夫兼程前進四月初三日起身至十六夜二更已到了草涼勝地方此地上去鳳縣七十裏下去寶雞九十裏本非住宿之所癡珠因夜深了只得隨便住下是夕月明如晝跟隨人等趕路疲乏都睡了癡珠獨步小院中對月淒惻禿頭因癡珠未睡不敢上床坐在堂屋打盹見癡珠在院子裏踱來踱去遂站起説道天不早了老爺睡吧癡珠看表已有兩下多鍾便進房去叫禿頭服侍睡下翻來覆去捱了一會總睡不著忽然似聞窗外有人頻頻呼喚又似有人隱隱哭泣之聲將帳子揭開一看見斜月上窗殘燈半穗黯然四壁寂無入聲便又睡下想起昨日鳳嶺小憩見那連理重生亭的碑記文字高古非時下手筆便又恍恍惚惚如身在亭中援筆題道嶺下客孤征嶺上木連理連理之木死復生孤征之各生如死題畢瞥見一麗人畫黛含愁彎蛾鎖恨妖怯怯的立在山坳將癡珠凝眸一盼便不見了癡珠移步下亭想道怎的這空山中有此麗人難道青天白日山魈木魅敢公然出現麼正在想著那腳步卻向山坳走來不見人迹剛轉過山坳又見那麗人手拈一枝杏花身穿淺月色對襟衫兒腰系粉紅官裙神情慘淡立在那裏癡珠轉過腳步麗人卻又不見了並那地方亦系一片平原並非鳳嶺癡珠想道我如何又走到這個地方呢再一望去見有一廟隔一箭多地便緩步向前只見廟門洞開油漆顔色黯淡得很是個古廟廟門直匾大書雙鴛祠三字門堂三間歪歪斜斜門上也畫有門神一扇倒在地下中間碧油屏門不成顔色屏門後甬道砌磚尚自完好兩傍一柏一松蒼翠欲滴癡珠一步步走上臺階見廊上東西木柵中間殿門懸挂板聯一付是秋月春風可憐如此青天碧海徒喚奈何十六個字用手推那殿門卻是閉得緊緊的無縫可窺不知中間是何神像由東廊轉至殿后只見西邊有一小門踱進門來卻是朝東的三間屋子空洞洞的無一樣傢夥對面有一亭亭中豎碑一座癡珠忙把碑文讀過是一篇四六正要背誦一遍陡見碑石搖動向身上倒將下來嚇得癡珠大叫一聲早把對房跟人驚醒了禿頭從睡夢中一骨碌爬起問是怎麼大家道老爺夢魘了癡珠一身冷汗將眼一睜瞧著月光燈影慘然道你們不要大驚小怪沒有什麼事睡吧便自坐起揭開帳子將燈剔亮去記那碑文覺得首尾二段是全記得中間兩段什忘四五就踱下床來披上衣服檢過紙筆將首段先行謄出其詞曰曲塵走馬絲柳情長藥店飛龍香桃骨損驥方展足傷心賦鵬之詞鳳不高翔掣淚離鸞之曲春風眉黛花管新描夜雨啼痕竹斑忽染瑟彈湘女落遺響於三秋環認韋郎結相思於再世大抵青天碧海不少蛾眉見嫉之傷誰知白夾藍衫亦多鼠思難言之痛此雙鴛祠所為立也謄畢想道這段情文已極哀豔了近來四六家那有此付筆墨因將次段慢慢的記憶援筆先謄那首二句雲則有家傳漢相派衍蘇州想道怪呀竟是我家的故事了其下還有八字再記不出便提筆圜了八圜謄那底下的是青箱付託鯉庭負劍之年黃奶編摩烏幾吹藜之夜想道這聯以下還有名題蕊榜秋風高掇桂香一聯呢如何對語再記不出就將十字謄過又圜了十圜往下謄去是輕裘快馬霜嚴榆棗關前寒角清笳月冷胭脂山下吊故宮于劉石禾黍高低聆泠調于伊涼箏琶激楚謄到此處要往下寫去只記不出想道以上數聯後來篡去作我的墓志也還可用以後數聯系敘此人抑鬱無聊得一巾幗知己筆墨極其淋漓如何一字也沒了沈吟半晌自語道咳恍惚得很這數聯中不是有那叔寶多愁對那長卿善病麼怎的記不起比做更難擲下筆凝思一會聽得雞聲已唱過兩遍了便提起筆另行將那段未數聯謄出是彩雲三素忽散魚鱗寶月一奩旋虧蟾魄蓋積勞所以致疾而久鬱所以傷生曆險阻之馳驅風如牛馬慨身宮之偃蹇歲在龍蛇病到膏肓竟符噩夢醫雖盧扁難覓靈方天實為之謂之何哉想道如今是第三段了段首四句是爾乃亭亭淨植蓮出污泥烈烈奇香蘭生幽谷謄畢想道以下數聯又忘了便又另行寫道杯蛇幻影鬼蜮含沙縈愁緒以回腸蔓牽瓜落拭淚珠而洗面藕斷絲長生不逢辰久罹荼苦死而後已又降鞠凶填誨水以將枯冤無從雪涸井波而不起心早成灰含笑同歸樹合韓憑之冢偷生何益夢隨倩女之魂七千里記鼓郵程家山何處一百六禁煙時節野祭堪憐魂兮歸來躬自悼矣便自語道寫得沈痛如此真好文章也末段我便一字不忘了遂接寫道於是故人閣部念攻玉之情敦分金之誼黃蘆匝地悲風吹蒿裏之音丹翬孔塗落日下桂旗之影襯幢之綷糸祭翠柏蒼松升俎豆之馨香只雞鬥酒嗟乎滾滾勞塵不外至性至情之地茫茫人海最難一生一死之交白馬素車猶是范張同氣珠幡寶蓋終殊娟潤雙棲咽汾水之波聲淒涼夜月拜曇花之幻影惆帳春風逝者如斯竟成千古人如可作重訂三生川嶽有靈永護同心之石乾坤不改終圓割臂之盟謄畢窗紙上早已曉日了癡珠復朗吟一遍禿頭暨衆人早已收拾行李伺候癡珠才拭臉漱口便上車向寶雞進發去了正是人生能有幾貿貿馬蹄間天與間身好如何不肯間欲知癡珠一簽一夢後來若何應驗且看下回分解第六回勝地名流禊修上巳金樽檀板曲奏長生話説明經略奏凱班師一路借荷生察看形勢增減防兵直到二月杪始抵太原闔城宮員以次排設慶賀筵宴三軍鳧藻萬姓歡虞也不用鋪張揚厲還有那本地紳士因荷生破賊有功便邀了荷生同年梅小岑太史歐劍秋侍講定於上巳日專席特請荷生洗塵傳齊本年花選上十妓潘碧桃顔丹翬張曼雲薛瑤華冷掌珠傅秋香賈寶書楚玉壽王福奴劉梧仙都到柳溪彤雲閣伺候柳溪在陽曲縣署西一裏汾堤之東宋天禧中陳堯佐知並州因汾水屢漲築堤周五裏引汾水注之旁植柳萬株中有秋華堂堂外有芙蓉洲每歲上巳太守泛舟修禊郡人遊觀於此數百年來久圮于水十年前太原太守率官吏士民立汾神台駘桐因復舊迹彤雲閣是上下兩層溪北最高之處四面明窗俯瞰柳陰中漁莊稻舍酒肆茶寮宛如天然圖畫溪南一帶桂樹遮列如屏便是秋華堂東邊一帶垂楊汾流環繞西邊池水一泓縱橫數畝源通外河便是芙蓉洲到了這一日彤雲閣下層早排設得錦天繡地一般巳初一刻教坊十妓齊集不一會縉紳和梅小岑歐劍秋陸續也到了一面催請荷生小岑劍秋和那十妓説説笑笑都説道就現在教坊腳色論起來今年花疊秋痕壓在煞尾也算抱屈了秋痕系梧仙小字秋痕冷笑道這也沒有憑據若説第一那個不想取上呢我們本是憑人擺弄的愛之如膝不愛之便要墜淵又有什麼憑據可説得出來丹翬也説道這個是平心的話正説著外面報説韓師爺來了縉紳大家也就走下臺階拱候十妓都迎接出去在閣門外一字兒花搖柳顫排著等候停了一回只見一匹頂馬從柳陰中轉出便見四人擡兩人扶一座藍呢大轎中間坐著彩雲皓月一般的韓荷生後頭一群人約有十餘個跟著將到大門教坊早己奏動鼓樂十妓都請過安荷生轎裏也點一點頭轎子停下荷生出轎將他們打諒一回便移步跨進門來見大家都在階下便躬身上前與大家相見問了好即攜著小岑的手同上臺階大家跟著進了彤雲閣重新見禮大家讓小岑陪荷生上炕坐了家人獻上茶來荷生道諸公如此盛設小弟何以克當那縉紳中有一個姓苟名才字子慎搶著站起來陪笑説道聊備杯酌以伸景仰之意還求荷翁勿以簡褻為罪哩劍秋笑道我們都是軟紅塵裏弟兄不説套話吧此刻吹打停了湘簾高卷十枝花嫋嫋婷婷都在兩廊也有説笑的也有理鬢的也有更衣的掌班們盡催著他們上去伺候秋痕道我是不上去的你看一屋子堆著許多人這般早上去做什麼説著便攜著掌珠從西廊小門向堤邊逛去了這裏碧桃丹翬曼雲三人只得移步上來對荷生請了安荷生知道這些都是花案上及第的便也世故起來攙住碧桃的手道都非凡豔隨將姓名年紀一一問過便説道我下轎時瞧見一位穿藕紫衫蔥緑裙的怎麼不見呢小岑道那是梧仙子慎趕著立起身來走到簾邊傳喚梧仙狗頭急忙答應卻四處找尋不見玉壽道他剛才和掌珠從這角門出去狗頭便從角門去追尋二人掌珠班長也跟著一會才把兩人領來這裏卻將秋香寶書瑤華玉壽福奴都喚上去了狗頭便將秋痕送到簾邊看官你道這狗頭是什麼人呢卻是秋心院一個掌班因他生得怪頭怪腦以此都喚他做個狗頭而且他又有個怪相是兩眼下有二黑斑也像兩眼以此人又喚做四眼狗後來鬧得幾多事出來這且按下當下秋痕和掌珠到了簾邊看見一群兒都圍在炕前便推著掌珠先走自己落後座上人臉都向上聽看荷生説話也不瞧見他兩個倒是小岑從人縫中看見掌珠便問道秋痕呢於是群花閃開掌珠攜著秋痕向荷生同請了一安荷生見秋痕別是一種灑落的神情因向小岑道我卻不想並州盡有許多佳麗就這榜末秋痕已自出人頭地了小岑道一經品題聲價十倍吾兄賞識自是不凡再看秋痕早是秋波盈盈默然不語荷生便向群花説道站了好一會今日太難為著二十瓣金蓮了請散開坐坐吧子慎便跟著説道兩旁空椅你們隨意坐著韓師爺是個憐香惜玉的人再不拘你們的秋痕早輕移蓮步從東走向窗下花架傍一把小方椅那裏去了大家也有跟著走去的也有向西窗下去的荷生便向衆縉紳談了一回談關破賊的事復又笑道人生蹤迹不能預料兩月以前戎馬倥傯豈知今日群花圍繞玉軟香溫但今年花選小弟不揣冒昧卻要重訂一過諸公以為何如劍秋笑道吾兄又要翻案了衆鄉紳同接著口道這又何妨呢千金請不到這樣名公評定哩荷生笑道豈敢豈敢只是這遊戲筆墨各存一説諒亦無礙子慎便説道今年花選本來公論是不依呢正説著家人回説酒筵已備荷生便立起身來和小岑劍秋招著秋痕丹翬曼雲閣門外散步這裏七手八腳將席擡上正面擺著一席兩邊排著四席每席先是三個座兩廊教坊吹打三次家人捧上酒來大家送酒安席正面是荷生小岑劍秋陪坐縉紳們分坐四席每席兩枝花伺候小岑劍秋曉得荷生意思便喚跟班排兩個座在下橫頭令丹翬秋痕坐了於是四席也照樣起來然後大家都換了便衣酒行三巡曼雲等出位走到正面席前以次呈上歌扇秋痕丹翬也站起來荷生就隨意將各人都點了只把秋痕的扇子擺在手中且令歸坐慢慢的讓酒吃菜聽那曼雲等或二簧或小調抑揚亢墜百轉妖喉合著琵琶洋琴三弦諸般樂器的繁音促節已是眉飛色舞豪情勃發了好一會曼雲等以次唱完小岑笑道如今該是秋痕昆腔一開生面了荷生便向秋痕笑道你這扇上大半是燕子箋桃花扇西樓記長生殿可見是個名家了只是你有會得全出的沒有秋痕站著答應道只有長生殿補恨旦曲是全會的荷生喜道好極我就請教這一出劍秋笑這我雖不懂這些只全出旦曲就是難為人的事秋痕道不妨於是大家靜悄悄的荷生要過鼓板親自打著教坊子弟吹著笛彈著三弦聽秋痕斂容靜氣的唱道歎生前冤和孽才提起聲先咽單則為一點情根種出那歡苗愛葉他憐我慕兩下無分別誓世世生生休拋撇不堤防慘淒淒月附花折悄冥冥雲收雨歇恨茫茫只落得死斷生絶普天樂荷生見秋痕一開口已經眼眶紅了到末了只落得死斷生絶這一句竟有忍不住淚的光景便將青萍才泡上蓮心茶親手捧給秋痕道你吃了這鍾茶下一支我唱吧便一面打鼓板一面唱道聽説舊情那些似荷絲劈開未絶生前死後無休歇萬重深萬重結你共他兩邊既恁疼熱況盟言曾共設怎生他陡地心如鐵馬嵬坡便忽將伊負也雁過聲小岑劍秋俱拍案道好荷生笑道我們少唱板眼生疏得很不及他們的嫺熟秋痕道韓師爺板眼自然是講究的我們班裏總不免有含糊處便接著唱道傷嗟豈是他頓薄劣想那日遭魔劫兵刃縱橫社稷阽危蒙難君王怎護臣妾妾甘就死死而無怨與君何涉怎忘得定情叉盒那根節傾杯序荷生喝聲好便説道未免有情誰能遣此劍秋道詞本好的秋痕又能體會出作者的意思抑揚頓挫更令人魂銷荷生道我要浮一大白了於是丹翬執壺秋痕斟酒劍秋小岑荷生俱幹了一大杯秋痕歸坐小岑道如今我獻醜吧便討一鍾茶漱了口唱道你初心誓不賒舊物懷難撇是千秋慘痛此恨獨絶誰道你不將殞骨留微憾只思斷頭香再爇蓬萊宮闕化愁城萬疊怕無端又令從此墮塵劫玉芙蓉大家都拍手道好呀子慎道我從來不曉得小岑會昆曲今日才請教呢小岑向秋痕笑道貽笑大方秋痕便也向著小岑一笑接著唱道位縱在神仙列夢不離唐宮闕千回萬轉情難滅雙飛若注鴛鴦牒三生舊好緣重結又何惜人間再受罰折小桃紅秋痕唱了這支眼眶又紅了小岑瞧著便説道等我再效勞吧接著唱道那壁廂人間痛絶這壁廂仙家念熱兩下裏癡情恁奢癡情恁奢我把彼此精誠上請天闕補恨填愁萬古無缺秋痕背過臉接著唱道還只怕孽障周遮緣尚蹇會猶賒大催拍荷生笑向秋痕道以下便是尾聲了就唱道團圓等候仲秋節管教你情償意愜當下秋痕向著荷生一笑也背過臉接著唱道只我這萬種傷心見他怎地説秋痕唱完荷生十分歡喜教丹翬斟上大杯酒和小岑劍秋每人喝了三大杯四席上縉紳也隨意飲了幾杯丹翬陪了三大杯秋痕量小只得將小杯陪飲荷生道先前散步瞧著堤邊預備有船我們攜些酒到船上去坐一回也算不負修禊良辰大家俱欣然願意劍秋道船上那裏容得這多人呢子慎道早預備過船有五六支分開坐吧於是五支般仍是五席小岑劍秋陪著荷生下船一會蕩入水心遙望著曠遠芋綿水煙凝碧那秋華堂汾神廟樓閣參差倒影波中澄徹空明真令人胸襟漱滌不著一塵那教坊子弟打起十番十妓便齊聲唱起采蓮歌來前後嬌聲婉轉響遏行雲當下水陸並進珍錯羅列到了黃昏方才將船仍蕩到彤雲閣荷生早已醺然叫索安將一百兩銀錁分賞十妓另將自己身上帶的一塊悲翠九龍佩送給秋痕轉身謝了衆人先坐轎去了各縉紳車隨到也隨散了只有小岑劍秋子慎三人車久不到便和十妓説些間話丹翬等見荷生今日如此看重秋痕也有妒忌的也有替他歡喜的那秋痕終是冷冷的子慎便説道秋痕你也該懂些巴結譬如今日韓師爺這樣另眼看待你你就沒有一點格外招呼你們到底是為著什麼來呢秋痕今日因是走開間逛誤了呼喚已受狗頭一番絮聒聽著於慎教訓他便哭起來説道自己會巴結儘管巴結人家不會巴結必要教人巴結這是何心呢子慎聽了又羞又怒登時變起臉來道你這東西真是個不成材料我好好的和你説話你為什哭起來你到底有人教管沒有秋痕正要發話劍秋忙過來扯到里間説道你哭什麼呢苟老爺説你原是好意你不要認錯了小岑也將子慎扯到炕上和曼雲一塊坐著説道這妮子脾氣總是這樣難怪人嫌子慎道我一團好意倒惹的他搶白起我來叫我怎麼不惱小岑只得十分排解劍秋裏邊也勸了秋痕許多話才把兩下的氣都平了好是子慎車先到了便招呼著大家上車而去劍秋力勸秋痕出來送子慎上車秋痕抵死不肯子慎去了小岑劍秋便叫秋痕班長先送秋痕坐車回去小岑劍秋隨後車來也就走了丹翬大家自有各人的班長各人的車馬伺候客都散完便鶯梭燕掠的一般紛紛的分路回家正酒闌人散月上星稀錦天繡地轉眼皆非欲知後事如何且聽下回分解第七回翻花案劉梧仙及第見芳譜杜采秋束裝話説山右教坊設自遼金舊例每年二月花朝巨室子弟作品花會其始原極慎重延詞客文人遴選姿容較量技藝編定花選放出榜來後來漸漸廢弛以致篾片走狗靠此生活於是真才多半埋沒盡有不願赴選者今年是個塗溝窗戶馬鳴盛字子肅充作頭家請一南邊人姓施名利仁宇蘆岩主持花案這利仁年紀二十餘歲生得欣長白皙鼻峰高聳昆腔二簧琵琶三弦都還會些只是胸無點墨卑鄙刻薄無所不為似這種人主持花案這花選尚可問麼到了出榜之日優婆夷寺地方彩亭上粘著榜文是潘碧桃第一劉梧仙第十案下譁然奈教坊司早已詳具存案就也沒人來管間事了卻説荷生那日回營勾當些公事天已不早便吃點茯苓粥青萍等飼候睡下都退出去荷生對著那一穗殘燈想道今日這一聚也算熱鬧極了丹翬曼雲自是好腳色掌珠秋香秀骨姍姍也過得去只有秋痕韻致天然雖肌理瑩潔不及我那紅卿而一種柔情俠氣真與紅卿一模一樣且歌聲裂石伎藝較紅卿似還強些不知那花選何以將他屈在第十我定當另編一過飭教坊司更正才好又想道芙蓉洲風景到了夏月荷花盛開自然更好我今日已約下小岑劍秋到那日作一東道回敬他們咳只可惜紅卿不在這裏便朦朦朧朧的好像身子還在芙蓉洲船上又像是席散時候陡然那邊飛過一支畫船來船裏一個麗人倚著船窗看水荷生便將頭探出窗來正與那麗人打個照面卻是紅卿便急問道你什麼時候到了紅卿只是笑那船早離有一箭多地了荷生忙喚人追趕回頭一看船上靜悄悄的只有秋痕一人背著臉靠在那邊船窗便問道他們往那裏去了秋痕轉過臉來卻不是秋痕又另是一個麗人濯濯如春月柳灩灩如出水芙蓉比秋痕還好麗人又只是瞧著荷生笑荷生待向前説話只見那麗人説道你只認得劉秋痕那裏認得我呢荷生正要回答那麗人卻不見了船中只是自己一人再一回盼又見那麗人卻攜著紅卿的手在岸邊亭子上並肩而立喜得心花怒開急忙跑上岸來迎前一看卻是丹翬曼雲荷生此時恍恍惚惚的便急問道你看見紅卿麼只見丹翬沈著臉道你是什麼人怎的混跑到這裏來便攜著曼雲從亭子上小門進去了荷生想道分明這是丹翬曼雲如何他們變了臉不認我呢再一看來那裏是岸卻是一家池亭想道今天我怎的這樣迷惑起來莫非是夢中幻境麼正想著只見那池邊樹林裏跑出幾個回兵手執短刀見了荷生都道這就是前日在潼關山上教人放火的人不可放走了荷生吃了一驚往園中便跑又見紅卿和那麗人靠著池邊欄杆吟吟的笑荷生此時也不管禍福忙上亭來跑向前去後面那幾個回兵隨後趕來攔腰抑住唬得滿身冷汗撑開眼來卻是一夢回憶夢境如在目前心上猶突突的亂跳想道此自是上床時胡思亂想所致便自收攝精神掃除思慮就也安然睡著了次日起來午窗無事便將十花品第起來也不全翻舊案只將秋痕碧桃前後挪移便另是一香眼界了開首撰一小序每人名下各系一傳傳後各綴一詩即日發刻數日之間便轟傳起來看官你道那教坊司敢不更正麼只這幾頁花選卻是胭脂山的習檄氤氳使的靈符早招出一個絶代佳人來你道這佳人是誰就是第一回書中説的杜采秋這采秋系雁門樂籍他的母親賈氏那年身上有娠夜夢一仙女手拈芙蓉一枝説道此系石曼卿芙蓉城裏手植數應謫落入間在你手裏受了二十年魔劫然後根移緑墅果證青娥説畢擲花于懷賈氏腹痛而醒是夕生一女因名夢仙小字采秋采秋生而聰穎詞曲一過目便自了了不特琵琶弦索能以己意譜作新聲且精騎射善畫工書以此名重雁門到十六歲上便有一豪客破費千金梳櫳了每年四五月到了並門扇影歌喉一時無兩以此家頗饒足然性情豪邁有江南李宛君顧眉生之風千萬金錢到手輒盡舊年十二月關外訛言四起采秋將萬貫叉釧衣服盡行棄去購書十餘架客問其故采秋説道叉釧衣服賊來便是禍根換此數百萬卷書賊將不顧而去不好麼其實采秋是乘此機會要擇人而事不理舊業後來大兵東出平了叛部他家朝夕絮聒説他年紀才二十歲不為全家圖些基業專要讀書做詩寫字難道真要去考博學鴻詞作女學士麼采秋拗不過他爺娘意思只得出來略略酬應一日侍兒紅豆傳説洪相公來訪看官聽著這洪相公也是此書中一個要緊的人此人單名海字紫滄現年三十五歲拳勇無敵卻溫文爾雅是個做秀才的本色以此雁門人個個敬愛他采秋便延人內室客座間話一回紫滄便從靴革幼裏取出一本書來説道今年花選你見過麼采秋道那花選有什麼看頭呢所選的人橫豎是並州那幾個粉頭又難道又有個傾國傾城的出來麼果然有個傾國傾城的上那花選也就玷辱紫滄笑道你這議論實在痛快只是這一番又有個人出來將花案翻過你瞧罷便將花選一本遞絶采秋采秋揭開一看書目是重訂並門花譜便問道這重訂的人是個什麼樣的名公呢紫滄笑道你不要問人且看這人的序如何再説采秋便將小序念道露朵朝華奇葩夜合蓮標淨植絮染芳塵羌托迹之靡常遂分形而各寄豈謂桃開自媚柳弱易攀生碧玉於小家賣紫叉於舊邸羞眉解語淚眼凝愁彈秋之曲四弦照春之屏九折況兼筆妙迥似針神允符月旦之評不愧霓裳之詠昨者躬逢良會遍賞名花又讀新編足稱妙選惟武陵俗豔寵以高魁便説道潘碧桃取第一麼又念道而彭澤孤芳屈之末座便説道這彭澤孤芳是誰呢又念私心耿耿竊不謂然用是再啓花宮重開蕊榜登劉賁于上第許仙人為狀頭背踏金鼇憶南都之石黛歌傳紫鳳誇北地之胭脂願將色藝遍質同人所有是非付之衆論雲爾富川居士撰念畢説道好一篇唐小品文字這富川居士定不是北邊人了你説吧紫滄道你且往下看尚有筆墨呢采秋見第一個題名是霜下傑劉梧仙便説道呵劉賁登上第仙人得狀頭了究竟這劉梧仙是誰呢怎的我在並州沒有見過且不聞有這人呢紫滄道你怎的忘了那小班喜兒你就沒有會過麼采秋道呵就是他麼人倒不曾見過卻聽見有人説這喜兒長得模樣很好肚裏昆曲記得很多只是脾氣不好不大招呼人仿佛去年有人説他搬回直隸去了怎麼這回又來了今番取了第一這富川居士也算嗜好與俗殊鹹酸不肯人云亦云哩説畢便看那小傳道梧仙姓劉氏字秋痕年十八歲河南人秋波流慧弱態生姿工昆曲尤善為宛轉悽楚之音嘗於酒酣耳熱笑語雜遝之際聽梧仙一奏令人悄然蓋其志趣與境遇有難言者矣知之者鮮無足責焉詩曰説道好筆墨秋痕得此知己可以無恨矣便將詩朗吟道生來嬌小困風塵未解歡娛但解顰記否采春江上住懊儂能唱是前身吟畢説道詩亦佳再看第二名是虞美人顔丹翬便説道虞美人三字很切丹翬的樣子看那小傳道丹翬姓顔氏字么鳳年十九歲姿容妙曼妍若無骨豐若有餘善飲糾酒録事非么鳳在坐不歡也到度曲則不及梧仙雲詩曰衣香花氣兩氤氳妙帶三分宿醉醺記得郁金堂下飲酒痕翻遍石榴裙再看第三名是淩波仙張曼雲曼雲姓張氏字彩波年十九歲代北人風格雖不及梧仙而風鬟霧鬢妙麗天然裙下雙彎猶令人心醉也詩曰偶然撲蝶粉牆東步步纖痕印落紅留與天遊尋舊夢銷魂真個是雙弓再看第四名是玲瓏雪冷掌珠掌珠姓冷氏字寶憐年十九歲代北人寡言笑而肌膚瑩潔朗朗若玉山照人善病工愁故人見之輒愛憐不置詩曰牢鎖春心豆蔻梢可人還似不勝嬌前身應是隋堤柳數到臨風第幾條再看第五名是錦繃兒傅秋香秋香姓傅氏字玉桂年十四歲湖北人眉目如畫初學度曲嫋嫋可聽亦後來之秀也詩曰緑珠生小已傾城玉笛新歌宛轉聲好似旗亭春二月珠喉歷歷囀雛鶯再看第六名是銷恨花潘碧桃碧桃姓潘氏字春花年十七歲美而豔然蕩逸飛揚未足以冠群芳也詩曰昨夜東風似虎狂只愁枝上卸濃妝天臺畢竟無凡豔莫把流紅誤阮郎再看第七名是占鳳池賈寶書寶書姓賈氏字香卿年十七歲遼州人貌僅中姿而長眉曲黛善於語言詩曰春雲低掠兩鴉鬟小字新鐫在玉山何不掌書天上住卻隨小劫落人間再看第八名是燕支頰薛瑤華瑤華姓薛氏字琴仙年十六歲揚州人喜作男子妝學拳勇禿袖短襟詼諧倜儻樂部中之錚錚者也詩曰寶髻玲瓏擁翠鈿春花秋月自年年蒼茫情海風濤闊莫去淩波學水仙再看第九名是紫風流楚玉壽玉壽姓楚氏字秀容年十八歲善肆應廣筵長席玉壽酬酢終日迄無倦容詩曰花氣濃拖兩鬢雲絳羅衫子縷金裙章台別後無消息芳草天涯又見君再看第十名是婪尾春王福奴福奴姓王氏字惺娘年二十三歲代北人楊柳多姿桃花余豔以殿群芳亦為花請命之意雲爾詩曰柳花撲雪飛難定桃葉臨江恨總多願借西湖千頃水聽君間唱采菱歌看畢便將書放在茶几上向紫滄道到底這富川居士是誰呢紫滄道此人非他便是正月間大破數十萬衆回部的那個韓荷生采秋沈吟一會才説道他還有這間功夫弄此筆墨紫滄道這荷生奇得很聽得人説他在軍中是詩酒不斷的就是破敵這一日也還做詩喝酒哩采秋道這也沒有什麼奇處那諸葛公彈琴退敵謝太傅圍棋賭墅名士大半專會摹調只如今就算得江左夷吾讓他推群獨步了紫滄笑道可惜你是個女子若是男子你這口氣是要賽過他哩説得采秋也吟吟的笑了又間談了一回天色已晚紫滄去了采秋便將芳譜攜歸臥室叫紅豆點一爐香烹一鍾茶在銀燈下檢開芳譜重看一遍想道我只道現在讀書人給那八股時文五言試帖捆縛得個個作個書呆不想也還有這瀟灑不群的人轉教我自恨見聞不廣輕量天下士了因又想道他既有此心胸眼力如何不知道我杜采秋呢你要重訂芳譜也不問問就把什麼丹翬的酒量曼雲的弓彎都當作寶貝一般形諸歌詠連那玉壽福奴都為作傳這不是浪費筆墨麼停了一回又想道我不到太原他如何知道我呢這也怪不得他癡癡呆呆想來想去直到一下鍾賈氏進來幾次催他去睡才叫紅豆和老媽服侍睡下次日又沈吟了一日便決計與他父母商量前往並州他爺娘是巴不得他肯走這一遭立刻料理衣裝不日就到了正是人生最好一無所知若有知識便是大癡欲知秋痕采秋後事如何且聽下回分解第八回呂仙閣韓荷生遇豔並州城韋癡珠養屙話説荷生自重翻芳譜之後軍務日見清間一日奉著報捷的回批經略賞如太保銜大營將吏俱有升擢荷生也得五品銜彼此慶賀不免又是一番應酬光陰易過早是四月中旬長日倦人又見芍藥盛開庭外丁香海棠紅香膩粉素面冰心獨自玩賞一回鳥聲聒碎花影橫披遂起了訪友的念頭尋芳的興致帶了青萍騎了一匹青海驄也不要馬兵跟隨沿路去訪梅小岑歐劍秋諸人一無所遇大為掃興便欲回營走到東南城根邊遇見一帶波光澄鮮如鏡掩映那半天樓閣儼如一幅畫圖便問青萍道那是什麼地方青萍道小的未曾到過荷生便信馬行來原來是一座大寺院門前古槐兩樹蔽日參天牆外是大池縱橫十自繞著水是緑柳成行黃鵬百囀便覺心曠神怡遂下了馬看那寺門上橫額是呂仙閣三字便令青萍拂去了身上的塵土將馬系在柳蔭中荷生緩步走到堤邊看那遊人垂釣忽聽閣上數聲清磐度水穿林更覺滌盡塵心飄飄意遠又信步走進寺門早見有一輛繡緯香車停在門內便向青萍道那不是內眷的車麼不用進去衝撞他們了青萍道老爺騎了半天馬又站了這一會也該歇一會兒廟裏地方大那裏就單撞見他們哩荷生點點頭道你且在此等著遂一人踱進門來靜悄悄的只有那車夫在石板上打盹轉灣到了東廊見兩三個小道士在地下擲錢玩耍也不招呼荷生荷生便一直向後走來只見寶殿琳宮回廊復道是個香火興旺的古剎原來這純陽宮正殿以後四圍俱系磚砌成閣閣分三層上層左臨試院萬片魚鱗右接東城一行雉堞遠則四圍山色萬井人煙近則數自青畦一泓緑水中層為上下必由之道兩邊石磴各數十級下層做個月洞系出入總路荷生剛到下層洞門只聽一陳環佩聲迎面走出花枝招展的兩個人來便覺得鼻中一股清香非蘭非麝沁人心脾自然會停了腳步定睛一看一個十四五歲的身穿一件白紡綢大衫二藍摹本緞的半臂頭上挽了麻姑髻當頭插一朵芍藥花下截是青皺鑲花邊褲微露出紅蓮三寸笑盈盈的已似海棠花妖豔無比一個年紀大些真是寶月祥雲明珠仙露這道神采射將過來荷生眼光自覺滉漾不定幸是到了跟前不得不把心神按定閃過一旁讓這兩人過去這兩人也四目澄澄的瞧了一瞧荷生覺得那絶色跟波更傾注在自己身上那一縷魂靈兒好像就給他帶去跟著出了洞走過院子將次轉出正殿這絶色的回頭一盼才把精魂送轉這兩人都不見了兩條腿尚如釘住停一會緩步向前恍恍惚惚記那絶色身上穿的是一件鑲花邊淺藍雲蝠線皺單衫下面是百折淡紅皺裙微露出二寸許窄窄的小弓彎頭上是挽個懶雲髻簪一枝素馨花似乎是皺著春山的光景一路上凝神渺慮細細追摹不知不覺已走到後面閣上第三層扶梯了且喜並無一人窺見心事也就步上扶梯靠著危欄想道那一個十四五歲的是個侍兒決無可疑了這一個絶色是那一家宅眷怎的如許年輕只帶一婢來廟呢若説是小戶人家那服飾態度萬分不像咳似此天上神仙人間絶色此地青樓決無此等尤物這也不用説譬如果有這樣一個人無論丹翬曼雲就是秋痕怕也趕不上只是人家宅眷無心邂逅消受他彗眼頻頻垂盼已算是我荷生此生豔福以後還要怎樣呢這樣一想頓時把先前思慕心腸如濯向冰壺不留渣滓倒也爽然流覽一回覺得口渴緩步出來一個老道士遞上一鍾茶卻喝不得瞧著表已有三下多鍾了趕著出門喚過青萍跨上馬把鞭一捎那馬如飛的馳歸大營去了看官你道荷生所遇的絶色究竟是誰原來就是杜采秋采秋自那日決計出門次早便和他媽擇了日期帶著老嬤丫鬟夥伴上路按站到了太原就寓在菜市街愈園這園雖不甚大卻也有些樹木池亭數十間邃房密室本是巨家別業後來中落此園又不轉售於人關閉數年屋宇漸漸塌壞采秋去秋以二千金買之略加修葺便也幽雅異常只是他娘賈氏因途次感冒成了重症日重一日采秋晝夜伏侍轉把來訪之客概行謝絶此時已半個金月了見他媽病勢有增無減因此特來呂仙閣求籤許願不想遇見荷生其實采秋意中有荷生卻不曾見過這個人荷生目中有采秋又不曾聞有這個人然荷生看不出采秋是個妓女采秋卻看得出荷生是個名流一路想道這人豐神澄徹顧盼不凡定是個南邊出色人物因又想道此人或且就是紫滄説的韓荷生那廟門外柳蔭栓一匹馬系青海驄不是大營那裏有此好馬正在出神車已到家想他媽病勢危篤呂仙閣的簽又不甚好也把路上所有想頭一齊撂開了這且按下卻説癡珠由草涼驛趲程十九日午後已到西安隨便卸裝旅店就雇定長車因河南土匪出沒無常與車夫約定取道山西限十八日到京一面吩咐跟人檢點行李一面寫了幾封川信交給廣漢家丁回去銷差此時已是黃昏癡珠也不換衣服坐車向紅布街王漱玉家來不想漱玉夫婦雙雙的外家去了癡珠只得把他家裏作一柬帖並詩二首留別悵然而返詩雲卅年聚散總關情銷盡離魂是此行去日苦多來日少春風淒絶子規聲客囊猶似去年貧湖海浮沈剩一身東閣何時重話舊可憐腸斷再來人那王家管事家人劉福為著癡珠是漱玉極愛敬的朋友三更天自己跑來請安送過酒菜再三挽留癡珠姑且答應其實天一亮便裝車上路去了癡珠自幼本系嬌養弱冠登第文章丰采傾動一時兼之內顧無憂儻來常有以此輕裘肥馬幕楚朝秦名宿傾心美人解佩十年以後目擊時艱腸回嫠緯賓朋零落耆舊銷沈此番經年跋涉內窘於贍家之無術外窮於售世之不宜南望倉皇連天烽火西行躑躅匝地荊榛披月趲程業馳驅之已瘁望雲陟妃方啓處之不遑憂能傷人勞以致疾二十一夜趕到潼關便神思懶怠不思飲食次日五更起來覺得頭暈眼花口中乾燥好不難受勉強掙扎出關渡河曉風撲面陡然四支發抖牙關戰得磕磕的響叫禿頭將兩床棉被壓在身上全然沒用直到韓陽鎮打尖服下建曲吹下痧藥略覺安靜是晚到了蒲關想欲求醫因憶起一個故舊來此人姓錢名同秀字子守本南邊人善醫隨宦此地辦起鹽務字號裕豐癡珠令人持柬相邀候兩三更不到癡珠只得付之一笑睡至五更頭目比日間清爽而兩腳酸痛不可屈伸此本癡珠舊疾近來好了此時重又大發一路倒難為禿頭扶上扶下又要收拾鋪蓋又要料理飲食又要管理銀錢日夜辛勤極其勞瘁癡珠委實過意不去行至霍州值有同鄉左藕舫孝廉掌教此地代覓一仆名喚穆升稍分禿頭辛苦孝廉因力勸癡珠就醫太原且將他的家信取出給癡珠瞧説是二月後賊勢漸平故鄉時事可以無憂癡珠覺得略略放心數日之間就也到了太原先是在旅店住了一日嘈雜不堪遂租了汾堤上汾神廟西院一所客房養病當下收拾行李坐車到了寓所倒也幹乾淨淨一所房屋上房四間屋子中間是客廳東屋兩間是臥室西屋是下人的住屋院中有兩株大槐樹遮住了不見天日後面也是個大院子卻是草深一尺東邊是朝西小樓一座樓下左邊屋放口棺木卻是空的癡珠也不理論右邊是廚房西邊是牆牆上有重門通著秋華堂廊廡禿頭穆升趕著將鋪蓋取出正在打展只見一個和尚歡天喜地遠遠的叫將過來道我道是那一位韋老爺卻原來就是癡珠老爺癡珠拐著腳向前一看也歡喜道心印你如何在這裏看官這心印和尚汝道是誰原來就是汾神廟住持他本系西湖淨慈寺知客工詩書向年癡珠就聘臨安與心印為方外交往來親密後來癡珠解館心印以心疾發願朝山航南海陟峨眉前年頂禮五台後將便道入都官紳延主汾神祠癡珠此來得逢心印也算意想不到之事當下彼此施禮略敘別後蹤迹心印見癡珠初搬進來一切未曾安置且行李亦極蕭條便向穆升道這邊缺什麼家夥即管向當家取去一面説一面起來攜癡珠的手道老僧攙你到方丈躺躺吧讓他們收拾妥帖你再過來癡珠也自情願心印和禿頭一路照應癡珠蹣跚的來到方丈便躺在心印床上與心印暢談十餘年分手的事因説道自恨華盛時不早自定至於中年家貧身賤養癰畏疽精神不齒那能不病人膏肓呢心印慰道百年老樹中琴瑟一斛舊水藏蛟龍人生際遇何常偶沾清恙怕什麼哩癡珠道功名富貴命也只上有老母下有弱弟際此時艱治生計拙這心怎放得下心印道這也只得隨緣遂勸癡珠吃了兩碗稀飯飯後睡了一覺兩腳疼痛已略鬆動到了二更大家攙扶過來晚夕無話次日五月初一癡珠換過衣帽穆升扶著想到觀音閣燒香剛轉過甬道只見一陳僕婦丫鬟捧著一青年少婦進來癡珠只得站住那少婦卻也停步將癡珠打掠一回向一僕婦説了幾句話徑自上閣去了這僕婦便走到癡珠跟前問道老爺可姓韋官章可是玉字旁麼癡珠沈吟未答穆升説道姓名卻是你怎的問哩僕婦道是我們太太叫問呢便如飛的上閣回話癡珠想道這少婦面熟得很一時記不起了他來問我自然是認得我呢看官汝道這少婦又是誰呢原來就是蒲關遊總兵長齡字鶴仙之妹大營李副將喬松字謖如的夫人十五年前遊鶴仙之父官名炳勳提督東越水師癡珠彼時曾就具西席之聘他兄妹兩個一才十六歲一才十三歲師