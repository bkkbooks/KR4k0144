籠都是武營官銜槐樹下系有幾匹馬三四個的轎夫在月下燒著枯葉和花炮的紙烘手劍秋笑向癡珠道這是你東家在裏頭作樂哩正說著聽得門聲一響一疊連聲的傳呼伺侯三人只道是官員出來各自站開癡珠更站得遠些暗暗的瞧停了一停火炬百道手照兩行引出人來卻是華妝豔服一群少婦後面跟著幾多丫鬟僕婦都站在門口等轎燈火之中只覺得粉光脂豔令人眼花撩亂也不辨得誰好看誰不好看癡珠遠遠的瞧好像秋痕在內便走近一步留神凝視只見李夫人側著臉和一位太太說話秋痕手牽著李家一個大丫鬟站在背後小岑劍秋也已瞧見向癡珠道那不是秋痕麽癡珠點頭劍秋低聲道那一位是謖如太太癡珠也低聲說道站在秋痕前頭早是李夫人上了轎走了接著又是一乘四轎上來聽得那位太太吩咐道先把劉姑娘小轎打過來便有幾個丫鬟僕婦家人接疊傳話一會轎到便有丫鬟老媽扶掖秋痕上轎癡珠認得是李家的人那位太太又看著幾個少婦上轎就也上轎去了小岑道夢想不到這地方會碰著秋痕三人說說笑笑沿著路走向搴雲樓只見三三兩兩的人從裏面出來一隊像是外省的人就中有一個說道這個謎好難猜一個接著道謎語自好只挂在太原城裏怕一年到頭也沒人猜得著劍秋道什麽謎就把我太原一城的人都考倒了進得大門屋內八扇油綠灑金屏門門上一盞扁的白紗燈上貼著許多字條下圍著一簇約有十來人只見索安跑過來招呼大家進去癡珠道我們看了燈謎再進去不遲劍秋道你老爺做什麽呢索安道老爺因大人有話說上燈以後回營去了小岑道他不在家更好我們慢慢的猜謎三人短的不瞧只瞧著上面長條的是書一封小岑念道憶自卿赴雁門唐人詩題一時正河冰山凍藥名一兩行別淚盡在尊前花名一半夜癡魂願隨君去詩經一句比代飛之燕雁書名一感分逝之輪蹄西廂二句竟使目斷長途四書一句深恨行止不能自主花名一昨於新正一日始得一傳消息花名一喜迓韶光與年俱至花名一芬含豆蔻偕錦字以同來藥名一瘦比梅花與暗香而並詠曲牌一仆貌慚傅粉剩有青絲藥名一曲譜求凰好調綠綺地名一定于仲春上浣謹擇良辰詩經一句油壁先迎藥名一堅如前約藥名一想此半幅殘箋藥名一卿見之必破涕爲笑也美人名一劍秋笑道他竟把給采秋的信做了燈謎我們猜看癡珠道第一句想是北征劍秋道比代飛之燕雁打一書名不是春秋麽癡珠道我想西廂二句是車兒投東馬兒向西四書一句是望道而未之見小岑道不錯第二句藥名似是香附癡珠道香附真打得好那貌慚傅粉二句打一藥名自然是荷首烏小岑道是打得好但可惜何生姓韓要是姓何那更切當了癡珠道定于仲春二句打詩經一句不用說是二月初吉了油壁先迎打一藥名不是車前麽堅如前約是什麽藥呢小岑道信石劍秋道這裏人多我們進去猜吧癡珠道慢一步我再看這首浪淘沙的詞因念道客路去漫漫曲牌一念女無端唐詩一句長宵獨耐五更寒詩經一句對鏡自驚非昔日唐詩二句減卻朱顔美人名一春信到重關花名一綠上眉山藥名一情天有約定團紅樓夢中一物碧落黃泉還覓去易經二句何況人間莊於一句念畢三人步入院子見搴雲樓第一層簷下四麵點著一色的二十多盞瓜瓣琉璃燈照得面面玻璃光如白晝便有家人延入一方室中坐下遞上茶點三人隨意喝茶用點先將那一首詞也逐句猜來劍秋道客路去漫漫打一曲牌自然是望遠行癡珠道詩經一句是冬之夜不用說了易經二句是那兩句哩小岑道上不在天下不在田癡珠道這卻似是而非劍秋道情天有約定團圓打紅樓夢中一物有趣得很是個什麽癡珠道風月寶鑒小岑道妙他會做也難爲你會想於是三人將二句唐詩一句莊子一個花名一個藥名一個美人名都想有了又將那封書上想不出的也慢慢想有了劍秋喚索安問道你爺留有謎底沒有索安道一句兩句的老爺都留有底給小的答應人家那兩紙長條爺說總沒人都打得准萬一有人通猜著了請他明日來癡珠怕秋痕回寓無人作伴急著要走便說道既是沒有謎底我們走吧遲日面說於是大家步出園來見燈火零落遊人稀少曉得天不早了便分路而去正是玉簫聲未歇明月已西斜最是良宵短城頭噪曉鴉欲知後事且聽下回分解第三十三回麗句清詞三分宿慧花香燈影一片豔情話說癡珠自入正後深居西院或聽秋痕彈琴或瞧秋痕作畫就縣前街也少得去了這日上元子秀子善久不見面便兩人一車到了秋心院值門開著下車走入見靜悄悄的沒個人影再看月亮門落把大鎖兩人愕然後來李裁縫出來說起才知道初二後秋痕通沒回來兩人出來上車便吩咐趕向秋華堂來看門見是熟客就不通報兩人沿西廊步入月亮門見廚房裏一個打雜在那裏打盹便悄悄的向西屋窗下走來正待轉入樓下甬道聽得癡珠朗吟道浮萍大海終飄泊羞向紅顔說報恩兩人站著腳又聽得秋痕道你也有些年紀了積些餘囊作個頭山歸隱之計也是著實打算再者你的性情不能隨俗萬分做不過荷生讓他得意吧癡珠歎一口氣道我爲著家有老母不得已奔走四方謀些衣食不然我就做和尚秋痕道你好好做詩都是我說著閒話又引起你的心緒來了癡珠道我這上半四首已是不及他的原作再做下去也沒有好句出來不如算了不作吧秋痕道你昨晚說的繡榻眠雲扶不起綺窗初日會難逢三生風絮年來綰一室天花夜不寒都是佳句怎的不好兩人聽了半天正待移步不想玉環從甬道出來看見便報道留大老爺和晏太爺來了癡珠迎出延入客廳秋痕掀開香色布棉簾招呼兩人覺屋裏一陣蘭花香撲鼻就行步入見窗下四盆素心蘭開