祀掌珠寶書忽得小珠都中來書說是病了荷生雖爲關懷卻急於言歸遂令老蒼頭賈忠及穆升等將衣裝裝騾三千餘口帶著二百名精兵先行押解回家自己俟著采秋雁門轉身便領紅卿帶一百名健婦也自東歸到家拜摺謝恩就告了病籲請開缺構一座園亭比寄園小些卻有愉園三四倍大也有一樓仿佛柳巷就也喚做春鏡樓與采秋居住隔院是個薜荔仙館便給紅卿居住紅卿采秋敬事正夫人柳氏極其相得荷生低回往事追憶舊遊恍惚如煙迷離似夢編出十二出傳奇名爲花月痕第二出是個菊宴趕著重陽節令家伶開場演唱這並州寄園荷生托謖如改做韋公祠不數日就也竣工心印早將碑文上石豎在軒軒草堂右廡這日謖如迎主人祠是夜心印沐浴更衣召集徒子徒孫念個偈道人相我相一切俱無是大解脫是古真如安身一榻代步一驢驢歸造化榻贈吾徒便坐化了次日心印那匹黑驢竟自倒斃再說小珠晉京複命接著春闈又得房差闈後散館得授編修便陳情乞假皇上特恩給與封典馳驛奉柩回南賞假一年擇婚完娶小珠謝恩回寓卻病了兩個月以此挨至九月才素服匍匐入晉禿頭迎上小珠一見禿頭便自慟哭禿頭叩頭下去就也哭出聲來小珠含哀扶起撫慰一番問起竹竿嶺邱壟兩人又自大哭是日進城就在汾神廟西院卸裝心印已是坐化了次日清晨禿頭引是竹竿嶺墳上小珠搶地呼天與禿頭哭個淚盡聲幹繼而巡視四圍哀哀而哭曠野風高哭聲酸楚善人村男男女女老老少少蝟集觀看也自淚落不止都說道有這樣一個好兒子前來搬取靈柩韋老爺地下也喜歡了便有老年男婦前來勸止禿頭轉令勸止小珠時已亭午小珠跌坐墳下哭個不住末後禿頭與跟人勸止大衆百口同聲小珠方停了哭謝了善人村父老就到禿頭家來此時跛腳已生一男一女都出來叩見傍晚禿頭將癡珠秋痕兩幅遺照檢奉小珠小珠起身慘然展視又自痛哭一番著禿頭打掃淨室供上磕了三個頭就在淨室住下了在小珠原意便不進城次日謖如知道馳馬而來再三勸阻迎回自家行館十分款接第二日小珠便隨謖如來謁柳巷祠堂見軒軒草堂正面一座沈香雕花的龕約有九尺多高內奉先人坐像龕前主題雲故東越孝廉韋公癡珠神座東邊立一女像也有小主題雲故秋心院校書劉秋痕之位小珠含淚磕了三個頭便與謖如商量搬住搴雲樓灑淚說道先君遠遊日多小子稚弱生既未侍晨昏沒複未親含殮奉諱以後大母以道弗不許奔喪通籍以還小子複以王事馳驅不能得閑煢煢在疚以迄於今昨宿墳山老伯諄住諄垂誨促令進城此地有祠有像小子再圖安逸不想朝夕侍奉這不孝之罪真是擢發難數了說罷便嚎啕大哭起來謖如也自傷心只得曲從其意吩咐跟人將汾神廟行裝及禿頭謄口一起移入諄囑小珠道你病初愈孤身萬裏外上有重闈豈容不自珍重轉恫先靈小珠收淚答應遂分手而去此時留子善升守調補太原晏子秀升縣調署陽曲都是舊交就是曹節度以下知道小珠到了也來慰問小珠免不得要出來官場應酬當經子善子秀說合小珠與靚兒結姻阿珍與小珠庶出一妹名喚淑婉結姻隨差幹弁持信前往東越請過婆媳兩夫人示下准了擇吉兩邊互行納聘轉盼之間便是冬天攝哀告靈擇吉啓殯先一日就在軒軒草堂開了一天吊並州大小官員及紳衿無一不到次日小珠徒步出城臨穴撫棺擗踴哀嚎遂奉兩柩蒙以繡花大紅呢加以錦幄暫駐東門玉華宮自行跟入住宿朝夕二奠謖如要與小珠同行就也擇日挈眷回南將玉華宮李夫人靈柩收整卻是要先二日謖如便縮了兩站等候小珠這日癡珠丹旐啓行一路俱是官紳及小珠同年祖送祭席自玉華宮起排有數裏小珠一一磕頭謝了趕上謖如大隊人馬及到樊城登舟該地官場及故舊又是一番路祭十分熱鬧一日到得金陵謖如就祖墳安葬了李夫人將家事交付阿寶夫婦然後偕葉夫人帶著阿珍靚兒與小珠向東越來已是丙寅二月一舸兩棺安抵紅橋下郭夫人率小郎以及族姻迎入小西湖家祠開吊尋將秋痕遺挂展玩歎道以此韶齡甘心從死我怎忍薄視之卜吉安葬奉老夫人命將秋痕靈輀隨茜雯附入左壙奉主於家窀穸都畢小珠才釋素服辦起喜事小珠是個玉堂歸娶在東越只算得第三人那風華典麗可不必言就淑婉招贅阿珍也是富豔無比這年八月謖如挈了葉夫人阿珍夫婦赴任淮北小珠直俟老夫人百年以後才奉了郭夫人挈靚兒人都供職不一年賞加頭品頂戴冊封倭國新女主踏裏采朝議令摯妻室同行靚兒也得女提督銜持節齎皇太后皇后恩旨副以紫滄夫婦由長江登火輪船彎入粵東香山島放洋遇風吹入香海洋玉宇瓊樓中父子重逢翁媳再見瑤華緣與靚兒同舟也得與秋痕相見世外三人都得島中人贈的珍寶一夜海風大起瞬息之間便到倭國與紫滄輪船相會追憶其地歷歷在目奈海山蒼蒼海水茫茫無從重訪這也是一則實事並非做書的人畫蛇添足爲此奇談正是言必有物不類齊諧絲抽乙乙杼軸予懷諸君聽小子講書不必就散尚有一回嫋嫋餘音哩第五十二回秋心院遺迹話故人花月痕戲場醒幻夢話說西安王漱玉做了四十餘年孝廉進京候選得個教官歸路迂道太原寓在菜市街至誠堂飯店時值八月十五飯店隔壁邵家扶乩漱玉也來只見乩上斜斜的兩行寫得甚草邵家的人認得謄了出來是首詞漱玉念道爐香茗碗消受閑庭院鏡裏娥眉天樣遠畫簾外雨絲風片一聲落葉莫問秋深淺更何處尋排遣前塵後事思量遍念畢跪下欲有所問只見乩上運動寫道起來故人別來無恙隨又寫了兩三行漱玉站在邵家的人背後見謄出是兩首七絕道鏡合釵分事有無浮生蹤迹太模糊黃塵白骨都成夢回首全枰劫已枯海上鯨魚氣吐吞蓬瀛深淺阻昆侖誰知十斛鮫人淚不化明珠化血痕又見謄出一言七律道戰壘經春草又生風煙慘澹古台城故人麟閣千秋重遺蛻蟬吟一殼輕劫後山川秋有色月高弦索夜無聲荻花瑟瑟江天冷縷縷詩魂結不成謄完衆人正要觀看忽見乩上又寫道吾韋癡珠也奉敕赴縹渺宮撰文不能久留去矣寫完寂然不動衆人一齊拜送焚符釃酒只不解詩意也不識是何仙降壇獨漱玉悽惶半晌倚在那院子梧桐樹呆呆的出神一會大家都散了下來漱玉便問這屋子來歷邵家的人說道這是有名的秋心院如今做我家別業漱玉道秋心院可是前二十年教坊劉梧仙住宅麽邵家的人道不錯漱玉道難怪癡珠降壇內中閃出一人年紀約有七十餘歲粗胖漢子一簇鬍鬚問道你這位老哥怎的認得癡珠漱玉道你不見乩上寫的故人別來無恙那人道我認不得字漱玉道老漢高姓那人道姓管原來漱玉住的至誠堂就是聶雲住宅開拓出來荷生擡舉士寬管理柳巷宅裏田園樹木曆有數年便發起財也娶了妾與禿頭做個兒女親家後來禿頭夫婦跟小珠回南去了他又管了韋公祠錢糧這至誠堂就是他開的飯店他只叫他侄兒照管長遠不到店中故此漱玉不曾認得秋心院是癡珠寄漱玉的書常常說及故此知道當下士寬就將癡珠秋痕始末略述漱玉歎息說道他的柩就回去了他的祠還在明日你領我去拜一拜吧士寬欣然答應這一夜士寬得了一夢夢見一家園亭皓月當空人影燈光清華無比戲臺上正演夜戲只聽手鑼一響旦淡妝上一剪梅秋來無事不傷情花也飄零葉也飄零夜長無夢數殘更風也淒清雨也淒清坐介萬點秋光上畫屏隔花環佩響東丁今生自有傷心事漫道前身是小青奴家姓劉小字梧仙本系河南人氏只因父母早亡流落在煙花行院歌衫舞扇也學些嫋嫋婷婷月夕花晨總不免淒悽楚楚今春韓參軍遍選名花把奴家取了榜首咳奴家倒也不爭此虛名只要早離苦海所幸七月在秋華堂內得遇東越韋郎三月綢繆十分憐惜將來終身之托就在此君了今日重陽佳節韋郎請了韓參軍並采秋姊姊在此賞菊此時敢待來了保兒雜應介背生鼈甲名喚狗頭姑娘有何吩咐旦今日賞菊筵席可曾完備雜完備多時旦可將上品各色菊花搬過來雜是場上設菊花八盆旦隨意指點介生巾服上蕭疏雲樹接高城滿院秋聲滿地秋陰閑尋秋色訪佳人花好同心酒好同斟小生韋癡珠今日重陽佳節請了好友韓荷生在秋心院賞菊來此已是不免竟入入介見旦介旦韋老爺生梧姬各揖福介生笑介好呀一院秋色雅人深致畢竟不同梧姬呀不是路看你嫋嫋婷婷對著這露葉風枝更可人真僥倖偎香倚玉得與相廝並點綴秋光到十分誰能稱慵妝淡抹多風韻好似桃花扇底人旦歎介秋花蕭瑟也似奴家薄命飄零多謝郎君格外垂青了無端恨佳人福薄花無命只恐催花信急卸花風緊淚介生呀怎麽又觸起卿的心事來了且在房中少坐韓參軍就該到了同下小生攜小旦豔妝上紅納襖合一步步上妝樓拽羅裙度過了小院門蒼苔徑握住你嫩春纖緩緩行我和你並香肩蓮步穩看疏疏紅葉滿楓林染裙腰才記得尋芳黃蝶雙雙也又只聽寒兒悲又鳴到了扣門介內應介開門相見介生旦小生小旦各揖福介生小酌不恭有勞芳步小生豈敢佳辰雅集得領清談對此冷豔孤芳正好領教梧卿一聲曉風殘月哩旦采秋姊姊在此奴家豈敢獻醜只好求姊姊指教吧小旦妹妹過謙了坐介生看酒來雜排桌幾對坐介菊花橫列場前介生你看幽叢繞舍冷香襲人何不浮一大白請各飲介生前腔這幾枝白冷冷玉無痕那一叢黃澄澄金簇緊這好似醉朱顔羞暈生這好似褪紅妝殘夢醒小生歎介歎光陰一瞬兒去不停我與你舊日潘郎鬢已星回念那家山萬里遙遙也到今朝插茱萸少一人各歎介旦唱前腔不多時杏花天豔陽辰轉眼是菊花秋霜做冷說甚麽爲重陽冒雨開我只怕送西風成斷梗小生呀梧卿爲甚麽這般傷感小旦唱莫怪他對華筵珠淚傾觸動了老去秋娘無限情我也是飛花落絮飄飄也又誰知隨流水化浮萍同淚介生言至於此益複無聊也無心再飲酒了撤席介揖介小生小弟就此告辭小生小旦各折菊簪鬢介小生人世難逢開口笑小旦菊花須插滿頭歸攜手下生向旦介梧姬你看他二人密意纏綿柔情宛轉好不令人可羨我與卿呀尾聲今生今世花同命漫只說鴛鴦交頸好與你割臂同盟一寸心生偶然相見便勾留旦身世茫茫萬斛愁生同是飄零同是客旦青衫紅袖兩分頭同下醒來想道癡珠秋痕竟有人編出戲來又想道咳我是做夢如何認真因坐起來只見枕邊有部書大書花月痕三字傍題一聯雲豈爲蛾眉修豔史權將兔穎寫牢騷便當作一件寶貝他又認不得字也不肯給人看後來要死便將書埋在地下不知今年今月該是此書出世所以遇見小子說了出來看官你看這時候是什麽時候宇宙清平人民壽考蠻夷歸化五穀豐登萬頃情波都成覺岸千重苦海盡泛慈航要知此事的真假是非自然百年後有一個定論出來正是身世茫茫情懷渺渺若要空空除非了了
