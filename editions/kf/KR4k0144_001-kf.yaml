body:
  text: 第十九回送遠行賦誦哀江南憶舊夢歌成秋子夜話說癡珠次日也曉得荷生病了自秋心院回來一路想道謖如將走荷生複病人生盛會真不能常又觸起秋痕告訴許多的話到了柳溪瞧著叢蓼殘荷黯黯斜陽荒荒流水真覺對此茫茫百端俱集廿三日起來洗漱後作個小橫披是七絕四首詩雲朋舊天涯勝弟兄依依半載慰羈情不堪攜手河梁上聽唱陽關煞尾聲金樽檀板擁妖姬寶馬雕弓賭健兒此後相思渺何處莫愁湖畔月明時江北江南幾劫灰蕪城碧血土成堆好將一副英雄淚灑遍新亭濁酒杯滾滾妖氛黯陣雲天風鼓角下將軍故人準備如椽筆揮斥豐碑與紀勳又作一對雲春風風人夏雨雨人解衣衣我推食食我便坐車來訪謖如把詩和聯親手遞上謖如展開一看大喜謝了又謝癡珠就約二十五日過秋華堂一敘謖如道這又何必呢癡珠道垂老惡聞戰鼓悲急觴爲緩憂心搗而且經略委餘黻如河東緝捕我也要餞行花案上瑤華掌珠說是好的我不曾見面請他來與秋痕作伴吧謖如答應癡珠順路便約過黻如又約子善子秀就來秋心院兩人纏綿情話早是黃昏癡珠要去瞧采秋的病就到愉園紅豆領上春鏡樓來小丫鬟早將東屋簾子掀起癡珠進去見簾幕風微藥爐香燼床上垂下月色秋羅的帳采秋坐在帳裏就如芍藥煙籠海棠香護令人想漢武帝隔障望李夫人光景說道我聽荷生說你病正待說下采秋早接著道荷生怎樣呢癡珠道我是前日見過他嗽得利害昨日隔一天想今日該減些采秋歎一口氣道你教他好好保養吧你和他說我沒有什麽病癡珠答應坐了一會吃過茶說些近事就走了回寓已有五下多鍾過了一日秋華堂也照前一樣鋪設秋痕七下鍾就來早飯後謖如先到隨後大家也陸續到齊謖如領著衆人往芙蓉洲汾神廟散步從西院回來秋華堂見席已擺好癡珠送酒大家通辭了黻如首座謖如第二位子善子秀第三第四以後位次不用說是癡珠一人上首下首秋痕掌珠瑤華三人團坐酒行數巡掌珠唱了一支小調瑤華唱了一支二簧秋痕向癡珠說道我今天嗓子不好你給我告個假吧黻如笑道你不唱我說個令你卻要依秋痕道我便遵令吧敝如笑道還有一說別人不管你是不准替代秋痕遲疑一會也自答應黻如便喝一杯令酒道我這令是一個字如因緣因字困卦困字將裏頭一個字挖出來卻得有本字領起疊句四書兩句說得好大家公賀一杯說得牽強及說不出者罰三杯大家依麽大家通依了黻如道我如今說一個國字吧四書疊句是或勞心或勞力大家都贊道好公賀一杯下首是子善想了一會說道我這字不好是個囚字四書疊句人焉瘦哉人焉瘦哉黻如道字面不好說得四書卻極渾成大家通喝杯酒吧下首是掌珠情願罰酒再下首便是秋痕秋痕卻不思索說道我說一個囿字四書疊句有民人焉有社稷焉大家都拍手說道自然之至我們該賀一杯秋痕瞧著癡珠笑癡珠急把臉側開了向瑤華說道琴仙輪到你了你想一個字我替你說四書瑤華想一想說個圇字癡珠道這個字教我那裏去找兩句四書呢你再說一字吧瑤華又想一想說個圄字癡珠道得了始吾於人也今吾於人也黻如道錯了這兩句是疊文不是疊句而且吾字在第二字該罰三杯癡珠道我說得太急忘了但我是替人的罰一杯吧黻如也依了癡珠喝了酒複向瑤華道你再說一字秋痕道已經罰了還要重說作什麽呢瑤華笑道給我再說一個吧掌珠道你有人替說四書又有人替喝罰酒就說一百個也何妨呢瑤華道我只說這一個看他有四書出來沒有大家問道什麽字瑤華道淼字癡珠鼓掌道水哉水哉大家也譁然笑道妙得很大家又該賀了於是子秀說個田字四書是十目所視十手所指謖如說個曰字四書是一則以喜一則以懼大家也都說好各賀一杯癡珠道我說一字收令吧便說了個固字四書是古之人古之人大家齊聲道好黻如道我喝一大杯癡珠道我也陪一大杯此時內外上下都上了燈癡珠向謖如道回首七夕不及一月再想不到今日開此離筵便吟道死別已吞聲生別長側惻謖如道我自己也想不到說著兩人神色都覺慘然秋痕怕癡珠喝了酒傷心起來便說道我有個令大家行吧黻如道什麽今大家商量秋痕笑道我這令是有賀酒沒有罰酒做個破題癡珠笑道酒令要做破題也是奇談蔽如道桃花扇上酒令不是有個冰綃汗巾的破承題麽且看秋痕出什麽題秋痕道我這題也是四書上有的謖如道又牙的令是四書你的令又是四書不是單作難我麽秋痕向謖如道我出題隨著人做不做你再想一個令吧謖如想一想道我還飛觴吧是江南二字數到者兩人接令癡珠道好秋痕你出題吧秋痕道我的題是四書開章第一個的圜黻如道好題秋痕道謖如你飛觴吧謖如喝一杯酒說道子善黻如喝酒乘勝克捷江南悉平癡珠拍案道好極顧我老非題柱客知君才是濟川功就將大杯教秋痕斟滿一杯向謖如道我賀你一杯於是子善黻如也喝了酒黻如笑道行文喝酒飛觴今日真是五官並用秋痕催著飛觴黻如道我先交卷了再飛觴吧我破題得了便念道所貴聖人之神德兮刓方以爲圓癡珠笑道超妙得很大家各賀一大杯吧於是大家各喝了酒子善道聽著江南飛觴青山一發是江南琴仙秋痕喝酒黻如便指著秋痕笑道我要再給秋痕喝一杯家在江南黃葉村癡珠吟道山中漏茅屋誰複依戶牖當下瑤華掌珠各喝了一杯酒秋痕便喝了兩杯癡珠道我也交卷吧大圜在上予欲無言黻如道運用成語如自己出我也還敬一大杯酒大家也各人賀一杯秋痕催著瑤華飛觴瑤華卻瞧著癡珠說道聽我飛觴青衫淚滿江南客黻如癡珠喝酒癡珠笑道琴仙可人也謖如道我也湊了兩句請教吧意在寰中不言而喻癡珠喝一聲好說道謖如竟有如此巧思我便要喝三大杯哩秋痕瞅了癡珠一眼說道你真要拼命喝嗎子秀道秋痕你該兩句飛觴不要管別人的事快請說吧秋痕道我的頭一句是霜剪江南綠該子秀謖如喝酒第二句是寄根江南也該子秀謖如喝謖如道秋痕你怎的算計我兩個哩秋痕笑道多敬你兩鍾酒不好麽便催掌珠掌珠笑道我沒有詩句怎好呢秋痕道你有現成句子都好掌珠又笑道我只有這四個字說出來卻自己要先喝酒了便一手舉杯向癡珠說道江南才子說畢將酒自己先喝幹向秋痕道你也喝吧這是冤你一杯酒如今該黻如癡珠飛觴了黻如說道解作江南斷腸句謖如子秀喝酒癡珠向謖如道官愛江南好子秀琴仙喝酒子秀道我共該四句飛觴了一起說吧第一句是黻如癡珠喝酒論德則惠存江南第二句秋痕寶憐喝酒正是江南好風景第三句我同琴仙喝一鍾江南無所有第四句秋痕寶憐再喝黃葉江南一棹歸秋痕笑道子秀你好三句要我喝二杯酒謖如道我說兩句第一句給癡珠黻如喝洱江南之明不第二句我陪癡珠喝吧江南江北青山多癡珠道大家通說了我雙收吧破題是默而成之不言而信飛觴是魂兮歸來哀江南說吧噙著眼淚將筷子亂擊桌板誦那庚信哀江南賦聲聲哽咽起來慌得秋痕跑到上首說道你醉了到炕上躺躺吧癡珠剛念得信生世等於龍門辭親同於河洛奉立身之遺訓受成書之顧托四句就給秋痕奪去筷子便說道我沒有醉你不要怕黻如瞧著表說道十一下鍾了我們也該散了謖如便催著端飯秋痕早擰塊熱手巾遞給癡珠癡珠轉笑向黻如道醉卻不醉只心上不曉得無緣無故會傷感起來黻如道客邊心緒凡百難言放開些吧癡珠又覺痛心難忍謖如也自悽惶吟道亂後今相見秋深獨遠行大家黯然轉是癡珠破涕笑道分手雖屬難堪壯心要還具在便吟道要聞除去非休作畫麒麟大家都道好極癡珠豪爽人該有此轉語於是吃些稀飯洗漱一完黻如三人和掌珠瑤華就都散了只謖如秋痕十分難受奈夜已深不能不分手而去看官你道癡珠這一晚好過不好過呢且說荷生采秋病或不愈愈後複病直至八月初甫皆脫體這日癡珠無事帶了秋痕同來適值颳風秋痕見癡珠身上只穿兩件夾衣服便叫人回去取件茶色湖縐薄棉襖替他換上方卸去長夾襖癡珠摳著小衫將手向背上搔癢便把那個九龍佩露出來荷生瞧見也不言語轉說道風大你快穿上吧癡珠換過衣服喝過茶見采秋秋痕同坐床沿聽荷生說那江南軍務講得令人喪氣便吟道華夷相混合宇宙一膻腥一人走來外間見長案上書堆中有一本鴛鴦鏡填詞就取來隨手一翻是金絡索填的詞是情無半點真情有千般恨怨女呆兒拉扯無安頓蠶絲理愈紛沒來由越是聰明越是昏那壁廂梨花泣盡欄前粉這壁廂蝴蝶飛來夢裏魂堪嗟憫憐才慕色太紛紛活牽連一種癡人死纏綿一種癡魂穿不透風流陣又往下看填的前腔是藍田玉氣溫流水年華迅鶯燕樓臺容易東風盡三生石上因小溫存領略人間一刻春恁道是黃金硬鑄同心印怎曉得青草翻添不了根難蠲忿怕香銷燈灺帳黃昏夢鴛鴦一片秋雲葬鴛鴦一片秋墳誰替恁歌長恨忽然想道怕就是這一段故事便將序文檢看卻是將池北偶談李閑謝玉清一則衍出來就不看了里間荷生說到南北兩營潰散大帥跑上番舶大家俱笑吟吟坐聽都忘卻癡珠只秋痕看見癡珠出去外間半日靜悄悄的便起來將簾子一掀只見癡珠手上拿一本書那兩隻眼睛直注在書皮上呆呆的瞧秋痕不知其故向前說道怎的癡珠也不答應荷生也跟出來見癡珠坐著發呆秋痕站著發急倒好笑得很忍著笑道瞧什麽這樣出神也向前來看癡珠將書撂在案上說道汝們都不懂得秋痕便扯過癡珠的手道不要講夢話了癡珠又不答應荷生也覺駭然便叫道癡珠你瘋麽此時紅豆小丫鬟都站在一旁采秋聽荷生叫得大聲也出來瞧只見癡珠笑道我那裏是瘋我記那碑文荷生三人見他好端端說話便也好笑都問道是什麽碑文癡珠道我四月間草涼驛作了一夢見個雙鴛祠碑記當時默了出來只忘一半至夢中光景合著眼便見那個人那個地方自潼關以後病了兩場把夢通忘了這會碑文也只記得則有家傳漢相派衍蘇州十字你道可恨不可恨荷生道你既然默了一半便有底了記他作甚秋痕道這有什麽要緊事也值得這樣用心去想人家說我傻我卻不傻你喚作癡珠不真個癡麽采秋道這夢也奇確確鑿鑿有篇碑記荷生笑道你信他鬼話不過是他有這一篇遊戲筆墨編這謊話騙人癡珠道我要編個謊什麽編不得卻編個不完不全的夢你不信我明天檢那碑記給你瞧還是草涼驛飯店五更天寫的采秋道這碑記就說的是姓韋卻也古怪秋痕道那碑記說這姓韋是怎樣呢癡珠道這姓韋的也同我們一樣吧就中敘的曲折我通忘了正說著丫鬟們揣上飯四人小飲到了二更方散這一晚癡珠心上總把金絡索兩支填詞反復吟詠不想秋痕另有無數的話要向癡珠講卻燈下躊躇枕邊吐茹總不好自己直說出來忽然問著癡珠道妓女不受人污辱算得是節不算是節癡珠道怎麽不算得是節元未毛惜惜明末葛嫩楚雲瓊枝那個敢說他不是節秋痕道你曉得我這個人怎樣結果癡珠道我自己結果也不知道那裏曉得你你今日不聽荷生說那江南光景給我看來普天下的人也不知作何結果何況我與你呢秋痕便默然不說癡珠枕上聽著階畔窗前蟲吟唧唧反來覆去一息難安吟道人生半哀樂天地有順逆秋痕在枕邊便將哀樂順逆字字要癡珠講出癡珠含笑不語一會做成秋子夜三章雲寒蛩啼不住鐵馬風力緊明月入羅幃夢破鴛鴦冷捐棄素羅衣制就合歡帳一串